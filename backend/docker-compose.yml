# docker-compose.yml — Local development stack for Tsundoku.
#
# Services:
#   backend  — the Go/Echo API server
#   postgres — PostgreSQL 17 database
#
# Usage:
#   docker compose up        # start all services
#   docker compose up -d     # start in background
#   docker compose down -v   # stop and remove volumes

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9833:9833"
    environment:
      TSUNDOKU_DATABASE_HOST: postgres
      TSUNDOKU_DATABASE_PORT: "5432"
      TSUNDOKU_DATABASE_USER: tsundoku
      TSUNDOKU_DATABASE_PASSWORD: tsundoku
      TSUNDOKU_DATABASE_NAME: tsundoku
      TSUNDOKU_DATABASE_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tsundoku
      POSTGRES_PASSWORD: tsundoku
      POSTGRES_DB: tsundoku
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsundoku"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
