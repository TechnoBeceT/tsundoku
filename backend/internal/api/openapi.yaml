        - name: url
          in: query
          required: false
          description: >-
            Source-relative manga URL (P2 Suwayomi-removal). Optional on the
            wire for backward compatibility, but the backend requires a
            non-empty value and responds 400 when it is missing.
          schema:
            type: string
      responses:
        "200":
          description: The enriched manga candidate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchCandidate"
        "400":
          description: Missing url.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown source ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The engine host failed to fetch the manga details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

