openapi: "3.1.0"

info:
  title: Tsundoku API
  version: "0.1.0"
  description: |
    Tsundoku backend API — single-owner manga tracker.
    Authentication: Bearer token obtained from /api/owner/claim or /api/owner/login.

servers:
  - url: /
    description: Same-origin server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT Bearer token issued by /api/owner/claim or /api/owner/login.

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Always "ok" when the server is healthy.
          example: ok

    ClaimRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Desired owner username.
          example: owner
        password:
          type: string
          description: Desired owner password (minimum 8 characters).
          minLength: 8
          example: "s3cret!!"

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Owner username.
          example: owner
        password:
          type: string
          description: Owner password.
          example: "s3cret!!"

    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Signed Bearer JWT for the authenticated owner.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    MeResponse:
      type: object
      required:
        - ownerId
      properties:
        ownerId:
          type: string
          format: uuid
          description: The authenticated owner's UUID.

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable error description.
          example: owner already exists

    ChapterCounts:
      type: object
      required:
        - total
        - downloaded
        - wanted
        - failed
        - unread
      properties:
        total:
          type: integer
          description: Total number of chapters in the series.
        downloaded:
          type: integer
          description: Chapters currently in the downloaded state.
        wanted:
          type: integer
          description: Chapters currently in the wanted state.
        failed:
          type: integer
          description: Chapters currently in the failed state.
        unread:
          type: integer
          description: >-
            Downloaded chapters the owner has not read yet — what can be read right now,
            deliberately not every chapter a source knows about.

    SeriesSummary:
      type: object
      required:
        - id
        - title
        - displayName
        - slug
        - category
        - coverUrl
        - monitored
        - completed
        - needsSource
        - chapterCounts
        - createdAt
        - lastChapterDownloadedAt
      properties:
        id:
          type: string
          format: uuid
          description: Series identifier.
        title:
          type: string
          description: Canonical series title (used for slug derivation and disk layout).
        displayName:
          type: string
          description: Resolved display title from the metadata source provider (falls back to title).
        slug:
          type: string
          description: Deterministic URL-safe series slug.
        category:
          type: string
          description: Name of the user-defined category the series is filed under.
        coverUrl:
          type: string
          description: >-
            Series cover proxy path ("/api/series/{id}/cover?v=<version>"); empty when no provider
            has a cover. The v param is the CONTENT version of the cached image (a hash of its
            bytes), so the URL changes exactly when the cover does; the endpoint answers such a
            request with "Cache-Control: private, max-age=31536000, immutable" and the browser
            never re-requests a cover it already holds. Use the value VERBATIM — a request
            without it (or with a stale one) still serves the image, but only as revalidatable
            no-cache. A cover that is not cached locally yet has no version and its path carries
            no v.
        monitored:
          type: boolean
          description: Whether the series is actively tracked for new chapters.
        completed:
          type: boolean
          description: Whether the owner has marked the series finished (excluded from refresh + health).
        needsSource:
          type: boolean
          description: >-
            True when the series has NO live download source (zero providers with a real Suwayomi
            id — every provider is disk-origin). COVER-INDEPENDENT: a series can carry a metadata
            cover while still needing a real source matched (the Kaizoku-migration case).
        chapterCounts:
          $ref: "#/components/schemas/ChapterCounts"
        createdAt:
          type: string
          format: date-time
          description: When the series entered the library. Powers the "recently added" sort.
        lastChapterDownloadedAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            When this series' newest chapter became readable — MAX(first_downloaded_at) across
            its chapters. Powers the "recently updated" sort. Null when no chapter ever carried a
            first-downloaded time. NOT MAX(download_date): a download_date is a fetch timestamp a
            convergence upgrade rewrites on an old chapter, which would float a series to the top
            with nothing new to read. Always present as a key; its value may be null.

    Chapter:
      type: object
      required:
        - id
        - chapterKey
        - number
        - name
        - state
        - filename
        - pageCount
        - read
        - lastReadPage
        - readAt
        - pageVersion
      properties:
        id:
          type: string
          format: uuid
          description: Chapter UUID — the identifier the reader's page-bytes and progress endpoints key on.
        chapterKey:
          type: string
          description: Stable per-series chapter identity (never the number).
        number:
          type: [number, "null"]
          description: Display/sort number; null when unknown. Never identity.
        name:
          type: string
          description: Chapter display title from the best provider's feed (may be empty).
        state:
          type: string
          description: Chapter download state.
        filename:
          type: string
          description: Rendered CBZ filename (empty until downloaded).
        pageCount:
          type: [integer, "null"]
          description: Page count; null until the chapter is downloaded.
        read:
          type: boolean
          description: In-app reader progress — true when the owner has marked the chapter fully read.
        lastReadPage:
          type: integer
          description: In-app reader progress — 0-based index of the last page the owner viewed.
        readAt:
          type: [string, "null"]
          format: date-time
          description: When the chapter was marked read; null until then (cleared when read flips back to false).
        pageVersion:
          type: string
          description: |
            Reader page-bytes cache buster, derived from filename + download_date
            (empty for a not-yet-downloaded chapter). The client appends it as
            ?v= on every page request so a Library-Convergence upgrade that
            replaces the CBZ mid-read is never served from a stale cache entry.

    ChapterProgress:
      type: object
      required:
        - id
        - read
        - lastReadPage
        - readAt
      properties:
        id:
          type: string
          description: Chapter UUID.
        read:
          type: boolean
          description: Whether the chapter is marked fully read.
        lastReadPage:
          type: integer
          description: 0-based index of the last page the owner viewed.
        readAt:
          type: [string, "null"]
          format: date-time
          description: When the chapter was marked read; null when not read.

    ChapterProgressUpdate:
      type: object
      required:
        - lastReadPage
        - read
      properties:
        lastReadPage:
          type: integer
          minimum: 0
          description: 0-based index of the last page the owner viewed.
        read:
          type: boolean
          description: Mark the chapter fully read (true) or unread (false).

    Provider:
      type: object
      required:
        - id
        - provider
        - providerName
        - title
        - coverUrl
        - isMetadataSource
        - linked
        - mangaId
        - chapterCount
        - feedCount
        - feedRanges
        - hasFeed
        - fractionalCount
        - fractionalChapters
        - ignoreFractional
        - scanlator
        - language
        - importance
        - health
        - chaptersBehind
        - lastError
      properties:
        id:
          type: string
          format: uuid
          description: SeriesProvider UUID (used by re-rank and metadata-source pin).
        provider:
          type: string
          description: Raw Suwayomi source-ID identity key (e.g. 7537715367149829912).
        providerName:
          type: string
          description: Human-readable source display name (e.g. WebToon); falls back to the id when unresolved. Shown in the UI in place of the id.
        title:
          type: string
          description: This provider's own title for the series (may be empty).
        coverUrl:
          type: string
          description: Provider-level cover proxy path ("/api/series/{id}/providers/{pid}/cover"); empty when no cover.
        isMetadataSource:
          type: boolean
          description: True for the provider currently supplying DisplayName and CoverURL for this series.
        linked:
          type: boolean
          description: >-
            False for a disk-origin provider (an unlinked/unknown group created by
            library import — no real Suwayomi source attached yet); true once a
            real source is attached (via adopt, add-source, or Match). Unlinked
            groups are Match candidates (POST .../providers/{providerId}/match).
        mangaId:
          type: integer
          description: Source's Suwayomi manga id; 0 = unlinked disk provider.
        chapterCount:
          type: integer
          description: How many of the series' chapters this provider currently satisfies (Chapter.satisfied_by) — i.e. how many downloaded files came from this source. NOT how many chapters the source offers (see feedCount).
        feedCount:
          type: integer
          description: How many chapters this provider OFFERS — the size of its stored ProviderChapter feed. Served from our own DB; reading it makes no call to the source.
        feedRanges:
          type: string
          description: The stored feed's coverage as a gap-collapsed display string (e.g. "1-90, 92-101"); empty when the feed is empty or carries no chapter numbers.
        hasFeed:
          type: boolean
          description: True when this provider has a non-empty availability feed (≥1 ProviderChapter). Mirrors the backend drift-merge feed gate.
        fractionalCount:
          type: integer
          description: >-
            How many chapters in this provider's stored feed carry a fractional
            number (5.1, 5.5 — number != floor(number)). Computed in memory from
            the feed we already hold: no extra query, no call to the source.
        fractionalChapters:
          type: array
          items:
            type: string
          description: >-
            Those fractional chapter numbers, ascending, as display strings
            ("1.1", "5.5"). This is the EVIDENCE the owner needs before setting
            ignoreFractional: a mirror that re-uploads whole chapters under an
            "N.1" suffix shows a long SYSTEMATIC run (1.1, 2.1, 3.1, …), whereas a
            source carrying a genuine side-chapter (omake) shows a lone 5.5 — and
            ".5" is by far the most common fractional in a real library. The
            backend cannot tell those two apart, so it never guesses; the owner
            decides from this list. Always present, empty ([]) for a source with no
            fractional chapters — never null.
        ignoreFractional:
          type: boolean
          description: >-
            The owner's per-(series, source) switch marking this source as a
            fractional re-uploader: when set, the source contributes no
            fractional-numbered chapters to this series (they are dropped at ingest
            and excluded from candidacy). It deletes nothing, and an ignored source
            still reports its fractionalChapters here, so the decision stays
            reviewable and reversible.
        scanlator:
          type: string
          description: Scanlation group (may be empty).
        language:
          type: string
          description: Language code (e.g. en).
        importance:
          type: integer
          description: Priority/quality rank — higher is preferred.
        health:
          type: string
          enum: [ok, stale, erroring]
          description: Computed source health within this series.
        chaptersBehind:
          type: integer
          description: How many of the series' chapters this source lacks (informational).
        newestChapterAt:
          type: string
          format: date-time
          nullable: true
          description: Newest chapter upload date this source carries (null if unknown).
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
          description: When a refresh last successfully fetched this source (null if never).
        lastError:
          type: string
          description: Last refresh error for this source (empty if none).

    SeriesDetail:
      type: object
      required:
        - id
        - title
        - displayName
        - slug
        - category
        - coverUrl
        - monitored
        - completed
        - needsSource
        - chapterCounts
        - createdAt
        - lastChapterDownloadedAt
        - chapters
        - providers
        - status
        - description
        - genres
        - tags
        - altTitles
        - authors
        - year
        - links
        - metadataSource
        - coverSource
        - metadataLocked
      properties:
        id:
          type: string
          format: uuid
          description: Series identifier.
        title:
          type: string
          description: Canonical series title (used for slug derivation and disk layout).
        displayName:
          type: string
          description: Resolved display title from the metadata source provider (falls back to title).
        slug:
          type: string
          description: Deterministic URL-safe series slug.
        category:
          type: string
          description: Name of the user-defined category the series is filed under.
        coverUrl:
          type: string
          description: >-
            Series cover proxy path ("/api/series/{id}/cover?v=<version>"); empty when no provider
            has a cover. The v param is the CONTENT version of the cached image (a hash of its
            bytes), so the URL changes exactly when the cover does; the endpoint answers such a
            request with "Cache-Control: private, max-age=31536000, immutable" and the browser
            never re-requests a cover it already holds. Use the value VERBATIM — a request
            without it (or with a stale one) still serves the image, but only as revalidatable
            no-cache. A cover that is not cached locally yet has no version and its path carries
            no v.
        monitored:
          type: boolean
          description: Whether the series is actively tracked for new chapters.
        completed:
          type: boolean
          description: Whether the owner has marked the series finished (excluded from refresh + health).
        needsSource:
          type: boolean
          description: >-
            True when the series has NO live download source (zero providers with a real Suwayomi
            id — every provider is disk-origin). COVER-INDEPENDENT: a series can carry a metadata
            cover while still needing a real source matched (the Kaizoku-migration case).
        chapterCounts:
          $ref: "#/components/schemas/ChapterCounts"
        createdAt:
          type: string
          format: date-time
          description: When the series entered the library. Powers the "recently added" sort.
        lastChapterDownloadedAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            When this series' newest chapter became readable — MAX(first_downloaded_at) across
            its chapters. Powers the "recently updated" sort. Null when no chapter ever carried a
            first-downloaded time. NOT MAX(download_date): a download_date is a fetch timestamp a
            convergence upgrade rewrites on an old chapter, which would float a series to the top
            with nothing new to read. Always present as a key; its value may be null.
        chapters:
          type: array
          description: The series' chapters, ordered by number then chapter key.
          items:
            $ref: "#/components/schemas/Chapter"
        providers:
          type: array
          description: The series' providers.
          items:
            $ref: "#/components/schemas/Provider"
        status:
          type: string
          description: >-
            Phase-1 metadata-engine normalized publication status
            ("ongoing"|"completed"|"hiatus"|"cancelled"|""). Distinct from
            `completed` above (the owner's own manual toggle) — status is
            descriptive (what the metadata provider reports), completed is
            prescriptive (what the owner decided refresh/health should do).
            "" on a series never identified against a metadata provider.
        description:
          type: string
          description: >-
            Phase-1 metadata-engine merged synopsis (see internal/metadatasvc's persist step). ""
            on a series never identified against a metadata provider.
        genres:
          type: array
          items:
            type: string
          description: Merged metadata-engine genre collection (union across every matched provider). [] when unidentified.
        tags:
          type: array
          items:
            type: string
          description: Merged metadata-engine tag collection. [] when unidentified.
        altTitles:
          type: array
          items:
            $ref: "#/components/schemas/AltTitle"
          description: Merged alternate titles. [] when unidentified.
        authors:
          type: array
          items:
            $ref: "#/components/schemas/Author"
          description: Merged writer/artist credits. [] when unidentified.
        year:
          type: integer
          description: Merged first-publication year; 0 = unknown/unidentified.
        links:
          type: array
          items:
            $ref: "#/components/schemas/SeriesLink"
          description: Merged external reference links. [] when unidentified.
        metadataSource:
          allOf:
            - $ref: "#/components/schemas/SourceRef"
          nullable: true
          description: Provenance of the merged rich metadata; null until the series is identified.
        coverSource:
          allOf:
            - $ref: "#/components/schemas/SourceRef"
          nullable: true
          description: Provenance of the chosen cover; null until the owner explicitly picks one via the metadata engine.
        metadataLocked:
          type: boolean
          description: >-
            True once the owner has hand-curated this series' rich metadata via a
            manual Identify/IdentifyMerge pick — the background AutoIdentify pass
            never overwrites a locked series.

    Category:
      type: object
      required:
        - id
        - name
        - sortOrder
        - protected
        - isDefault
        - count
      properties:
        id:
          type: string
          format: uuid
          description: Category identifier.
        name:
          type: string
          description: Display label and on-disk folder name.
        sortOrder:
          type: integer
          description: Owner-chosen display order (ascending; ties break by name).
        protected:
          type: boolean
          description: True for the seeded "Other" — it can never be renamed.
        isDefault:
          type: boolean
          description: >-
            True for the single default landing category (new / uncategorized
            series file here). It can never be deleted; promote another category
            (PATCH /api/categories/{id}/default) to make this one deletable.
        count:
          type: integer
          description: Number of series filed under this category.

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: New category name (unique, filesystem-safe; becomes the folder name).
        sortOrder:
          type: integer
          description: Optional display order (defaults to 0).

    UpdateCategoryRequest:
      type: object
      description: At least one of name or sortOrder must be present.
      properties:
        name:
          type: string
          description: New name (renames the category and moves its on-disk folder).
        sortOrder:
          type: integer
          description: New display order (DB-only, no disk change).

    SetCategoryRequest:
      type: object
      required:
        - categoryId
      properties:
        categoryId:
          type: string
          format: uuid
          description: UUID of the target Category to file the series under.

    SetMonitoredRequest:
      type: object
      required:
        - monitored
      properties:
        monitored:
          type: boolean
          description: Whether the series should be actively tracked for new chapters.

    SetCompletedRequest:
      type: object
      required:
        - completed
      properties:
        completed:
          type: boolean
          description: Whether the series is finished (no more chapters expected).

    SetIgnoreFractionalRequest:
      type: object
      required:
        - ignoreFractional
      properties:
        ignoreFractional:
          type: boolean
          description: |
            Whether this source is a fractional re-uploader for this series: when true it
            contributes no fractional-numbered chapters (they are dropped at ingest and
            excluded from candidacy); when false the source is restored. Required — an
            omitted field is a 400, never a silent false.

    ProviderRank:
      type: object
      required:
        - id
        - importance
      properties:
        id:
          type: string
          format: uuid
          description: SeriesProvider UUID to update.
        importance:
          type: integer
          minimum: 0
          description: New priority/quality rank (non-negative; higher = preferred).

    ReorderProvidersRequest:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          description: Ordered list of (provider id, importance) pairs to apply all-or-nothing.
          minItems: 1
          items:
            $ref: "#/components/schemas/ProviderRank"

    DownloadChapter:
      type: object
      required:
        - id
        - seriesId
        - seriesTitle
        - seriesCategory
        - seriesCoverUrl
        - chapterKey
        - number
        - name
        - state
        - provider
        - providerName
        - upgradeTarget
        - retries
        - nextAttemptAt
        - lastError
        - errorCategory
        - filename
        - pageCount
        - downloadDate
      properties:
        id:
          type: string
          format: uuid
          description: Chapter identifier.
        seriesId:
          type: string
          format: uuid
          description: Identifier of the series this chapter belongs to.
        seriesTitle:
          type: string
          description: Resolved series display title (metadata-source title, falls back to canonical title).
        seriesCategory:
          type: string
          enum: [Manga, Manhwa, Manhua, Comic, Other]
          description: Library category of the series.
        seriesCoverUrl:
          type: string
          description: >-
            Series cover proxy path ("/api/series/{id}/cover?v=<version>"); empty when no provider
            has a cover. The v param is the CONTENT version of the cached image (a hash of its
            bytes), so the URL changes exactly when the cover does; the endpoint answers such a
            request with "Cache-Control: private, max-age=31536000, immutable" and the browser
            never re-requests a cover it already holds. Use the value VERBATIM — a request
            without it (or with a stale one) still serves the image, but only as revalidatable
            no-cache. A cover that is not cached locally yet has no version and its path carries
            no v.
        chapterKey:
          type: string
          description: Stable per-series chapter identity (never the number).
        number:
          type: [number, "null"]
          description: Display/sort number; null when unknown. Never identity.
        name:
          type: string
          description: Chapter display title from the best provider's feed (empty when no provider titles it).
        state:
          type: string
          enum: [wanted, downloading, downloaded, upgrade_available, upgrading, failed, permanently_failed, superseded]
          description: Chapter download state.
        provider:
          type: string
          description: >-
            Raw Suwayomi source-ID key (SeriesProvider.provider) of the source this chapter is
            ACTUALLY coming from, resolved in three steps: (1) the source that SATISFIED it
            (satisfied_by) — true provenance, where the file on disk came from; (2) else the
            highest-importance source whose FEED CARRIES this chapter_key — the source the
            engine is fetching from (the scheduler's own primary-source rule); (3) else empty,
            when NO source carries the key: nothing is fetching this chapter and the UI renders
            an em-dash. NOT the series' top-ranked source — that lies whenever the top source
            has a feed gap. Step 2 is a UI HINT, not engine state: the engine additionally
            excludes retry-exhausted, cooled-down, or circuit-broken sources, which this read
            model does not know about, so it may name a source the engine defers this cycle.
            A downloaded chapter whose satisfier was cleared (the owner removed that source —
            the CBZ is kept) also resolves via step 2 or 3.
        providerName:
          type: string
          description: >-
            Human-readable source display name of the source resolved by `provider` (same three
            steps, same caveat); falls back to the id when unresolved, and is empty exactly when
            `provider` is. Shown in the UI in place of the id.
        upgradeTarget:
          type: string
          description: >-
            Display name of the source this chapter is upgrading TO — the highest-importance
            source (other than the current one) whose feed carries the chapter and which
            outranks it. Empty for every chapter not in upgrade_available/upgrading. The UI
            renders "providerName → upgradeTarget". It is the INTENDED target: the engine
            additionally excludes retry-exhausted, cooled-down, or circuit-broken sources,
            which this read model does not know about, so it may name a source the engine
            defers this cycle.
        retries:
          type: integer
          description: Number of download attempts so far (0 when never attempted or after a retry reset).
        nextAttemptAt:
          type: string
          format: date-time
          nullable: true
          description: Scheduled next retry time; only set on failed chapters under backoff, else null.
        lastError:
          type: string
          description: Last download error for this chapter (empty if none).
        errorCategory:
          type: string
          description: Coarse error classification (e.g. "network"); empty if none.
        filename:
          type: string
          description: Rendered CBZ filename (empty until downloaded).
        pageCount:
          type: [integer, "null"]
          description: Page count; null until the chapter is downloaded.
        downloadDate:
          type: string
          format: date-time
          nullable: true
          description: When the chapter was downloaded; null until downloaded.

    DownloadList:
      type: object
      required:
        - total
        - items
      properties:
        total:
          type: integer
          description: Total chapters matching the state filter across the whole library (not just the page).
        items:
          type: array
          description: The requested page of enriched chapters.
          items:
            $ref: "#/components/schemas/DownloadChapter"

    RetryAllResult:
      type: object
      required:
        - retried
      properties:
        retried:
          type: integer
          description: Number of chapters reset back to wanted by the bulk retry.

    DedupeFilesResult:
      type: object
      required:
        - removed
      properties:
        removed:
          type: integer
          description: >-
            Number of superseded duplicate CBZ files removed from disk by the
            owner-triggered dedupe-files sweep. Winning files are never removed.

    FractionalCleanupChapter:
      type: object
      required:
        - chapterId
        - number
        - pageCount
        - provider
        - filename
      properties:
        chapterId:
          type: string
          format: uuid
          description: Chapter UUID — the id the cleanup POST names.
        number:
          type: number
          format: double
          description: The chapter number. Always fractional (5.1, 181.5 …).
          example: 181.5
        pageCount:
          type: integer
          nullable: true
          description: >-
            How many pages the downloaded file has, or null when never recorded.
            This is the EVIDENCE: a 1-page "chapter" is a notice page; a 132-page
            one is a full-size chapter that merely carries a ".5" number. Judge by
            this, never by the number.
        provider:
          type: string
          description: >-
            Display label of the source that satisfies this chapter (where the file
            came from); "" when that source has since been removed.
        filename:
          type: string
          description: The CBZ filename that will be deleted.

    FractionalCleanupPreview:
      type: object
      required:
        - typicalPageCount
        - chapters
      properties:
        typicalPageCount:
          type: integer
          description: >-
            MEDIAN page count of the series' WHOLE (non-fractional) downloaded
            chapters — the yardstick the fractionals are judged against. 0 when no
            whole downloaded chapter carries a page count.
          example: 96
        chapters:
          type: array
          description: The removable fractional chapters; empty when there is nothing to clean.
          items:
            $ref: "#/components/schemas/FractionalCleanupChapter"

    FractionalCleanupRequest:
      type: object
      required:
        - chapterIds
      properties:
        chapterIds:
          type: array
          minItems: 1
          description: >-
            The Chapter UUIDs the owner ticked. A SELECTION from the preview, never
            an authorisation: the server re-computes the removable set and rejects
            (400) any id outside it.
          items:
            type: string
            format: uuid

    FractionalCleanupResult:
      type: object
      required:
        - removed
      properties:
        removed:
          type: integer
          description: >-
            Number of fractional chapters removed (CBZ file + Chapter row). The
            source feed rows are kept, so un-ticking the ignore-fractional toggle
            restores them.

    Source:
      type: object
      required:
        - id
        - name
        - lang
      properties:
        id:
          type: string
          description: Suwayomi source identifier (64-bit integer serialised as string).
          example: "1998416842837112832"
        name:
          type: string
          description: Human-readable source name (e.g. "MangaDex").
          example: MangaDex
        lang:
          type: string
          description: BCP-47 content language tag for this source (e.g. "en", "ko").
          example: en

    SearchCandidate:
      type: object
      required:
        - source
        - sourceName
        - lang
        - mangaId
        - title
        - url
        - thumbnailUrl
        - author
        - artist
        - description
        - genres
      properties:
        source:
          type: string
          description: Suwayomi source ID from which this candidate came.
        sourceName:
          type: string
          description: Human-readable source name.
        lang:
          type: string
          description: Content language of this source.
        mangaId:
          type: integer
          description: Suwayomi-internal manga identifier within this source.
        title:
          type: string
          description: Manga display title as returned by the source.
        url:
          type: string
          description: Provider-canonical URL for this manga (powers the "View on source" link); empty string when not provided.
        thumbnailUrl:
          type: string
          description: |
            Tsundoku's own cover-proxy path ("/api/sources/{source}/manga/{mangaId}/cover"),
            never Suwayomi's raw thumbnail URL. Empty string when the source provided no
            thumbnail at all.
        author:
          type: string
          description: Manga's writing credit; empty string when not provided.
        artist:
          type: string
          description: Manga's art credit; empty string when not provided.
        description:
          type: string
          description: Synopsis/summary text; empty string when not provided.
        genres:
          type: array
          description: Genre/tag list; empty array when the source provides none.
          items:
            type: string

    BrowseResult:
      type: object
      description: One page of a source's catalog browse (Popular/Latest) — a flat candidate list in source order plus pagination metadata.
      required:
        - manga
        - hasNextPage
        - page
      properties:
        manga:
          type: array
          description: Candidates on this page, in source order.
          items:
            $ref: "#/components/schemas/SearchCandidate"
        hasNextPage:
          type: boolean
          description: Whether another page exists (drives pagination).
        page:
          type: integer
          description: The 1-based page number returned.

    SearchGroup:
      type: object
      required:
        - title
        - candidates
      properties:
        title:
          type: string
          description: Representative display title chosen by the grouping logic.
        candidates:
          type: array
          description: Every source hit that belongs to this group.
          items:
            $ref: "#/components/schemas/SearchCandidate"

    ChapterInspect:
      type: object
      required:
        - number
        - name
        - scanlator
      properties:
        number:
          type: [number, "null"]
          description: Parsed chapter number (e.g. 1.5); null when not available.
        name:
          type: string
          description: Chapter display name (e.g. "Chapter 1").
        scanlator:
          type: string
          description: Scanlation group credited for this chapter; empty string when untagged.

    AdoptProvider:
      type: object
      required:
        - source
        - mangaId
        - importance
      properties:
        source:
          type: string
          description: Suwayomi source ID (e.g. "mangadex").
        mangaId:
          type: integer
          description: Suwayomi-internal manga identifier within the source.
        importance:
          type: integer
          minimum: 0
          description: Provider rank for this series (higher = preferred).
        scanlator:
          type: string
          description: |
            Selects which scanlation group's chapters this provider tracks; omit or send ""
            for "all chapters from this source". The same source may appear more than once
            under different scanlators, each with its own importance.

    ScanlatorCoverage:
      type: object
      description: One scanlator's chapter coverage for a source-manga.
      required:
        - scanlator
        - count
        - ranges
      properties:
        scanlator:
          type: string
          description: Group name; the source name when chapters carry no scanlator tag.
        count:
          type: integer
          description: Number of chapters this scanlator has published.
        ranges:
          type: string
          description: Human-readable coverage string, e.g. "1-90, 92-101".

    SourceBreakdown:
      type: object
      description: |
        Per-scanlator breakdown of a source-manga's chapters, used by the adopt UI to
        auto-split a source into per-scanlator rows with counts + ranges.
      required:
        - total
        - scanlators
      properties:
        total:
          type: integer
          description: Total chapter count across all scanlators.
        scanlators:
          type: array
          description: Per-scanlator breakdown, sorted by count descending (ties by name ascending).
          items:
            $ref: "#/components/schemas/ScanlatorCoverage"

    AdoptRequest:
      type: object
      required:
        - title
        - providers
      properties:
        title:
          type: string
          description: Canonical series title; all providers attach to the series slug derived from this.
        category:
          type: string
          description: Target category by NAME (user-defined; free string).
        providers:
          type: array
          description: Ordered list of (source, manga) pairs to adopt; must have at least one entry.
          minItems: 1
          items:
            $ref: "#/components/schemas/AdoptProvider"

    SetMetadataSourceRequest:
      type: object
      properties:
        providerId:
          type: [string, "null"]
          format: uuid
          description: |
            SeriesProvider UUID to pin as the metadata source, or null/absent to reset
            to automatic resolution (highest-importance provider). A malformed UUID
            yields 400.

    AltTitle:
      type: object
      required: [name, type, lang]
      properties:
        name:
          type: string
        type:
          type: string
          description: One of ROMAJI, LOCALIZED, NATIVE, SYNONYM (provider-defined).
        lang:
          type: string

    Author:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
        role:
          type: string
          description: One of WRITER, ARTIST, STORY, ART, ... (provider-defined).

    SeriesLink:
      type: object
      required: [label, url]
      properties:
        label:
          type: string
        url:
          type: string

    SourceRef:
      type: object
      required: [kind, ref, remoteId, remoteUrl]
      properties:
        kind:
          type: string
          description: '"metadata" (v1) | "source" | "tracker" (later).'
        ref:
          type: string
          description: Metadata provider Key() | SeriesProvider UUID | tracker id.
        remoteId:
          type: string
        remoteUrl:
          type: string

    MetadataSearchResult:
      type: object
      required: [provider, remoteId, title, url, coverUrl, year]
      properties:
        provider:
          type: string
          description: Owning metadata provider's Key() (e.g. "anilist").
        remoteId:
          type: string
        title:
          type: string
        url:
          type: string
        coverUrl:
          type: string
        year:
          type: integer
          description: First-publication year; 0 = unknown.

    CoverCandidate:
      type: object
      required: [sourceKind, sourceRef, coverUrl, label]
      properties:
        sourceKind:
          type: string
          enum: [metadata, source]
        sourceRef:
          type: string
          description: >-
            Metadata provider Key() when sourceKind is "metadata", or the
            SeriesProvider UUID string when sourceKind is "source".
        coverUrl:
          type: string
        label:
          type: string

    MetadataIdentifyRequest:
      type: object
      description: >-
        Either the legacy single-pick shape ({provider, remoteId}) or the
        multi-select merge shape ({selections: [...]}). When selections is
        non-empty it wins outright and the legacy fields are ignored. At
        least one of the two forms is required.
      properties:
        provider:
          type: string
          description: Metadata provider Key() (e.g. "anilist"). Legacy single-pick shape; ignored when selections is non-empty.
        remoteId:
          type: string
          description: The provider's own identifier for the picked series. Legacy single-pick shape; ignored when selections is non-empty.
        selections:
          type: array
          items:
            $ref: "#/components/schemas/MetadataSelection"
          description: >-
            Multi-select merge picks, in priority order — selections[0] is
            primary (anchors scalar precedence + the resulting
            metadataSource). Two or more entries route through the
            multi-select merge (union collections, no auto-matching beyond
            the given picks); a single entry behaves like the legacy shape
            (auto-matches every other registered provider too).

    MetadataSelection:
      type: object
      required: [provider, remoteId]
      properties:
        provider:
          type: string
          description: Metadata provider Key() (e.g. "anilist").
        remoteId:
          type: string
          description: The provider's own identifier for the picked series.

    SetCoverRequest:
      type: object
      required: [sourceKind, sourceRef, coverUrl]
      properties:
        sourceKind:
          type: string
          description: '"metadata" or "source" (see CoverCandidate).'
        sourceRef:
          type: string
          description: >-
            Metadata provider Key() when sourceKind is "metadata", or the
            SeriesProvider UUID string when sourceKind is "source".
        coverUrl:
          type: string
          description: Absolute http(s) URL the cover bytes are fetched from.

    LibraryHealth:
      type: object
      required: [series]
      properties:
        series:
          type: array
          items:
            $ref: "#/components/schemas/SeriesHealth"

    SeriesHealth:
      type: object
      required: [id, title, slug, sources]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Provider"

    System:
      type: object
      required: [storageFolder, serverPort, database]
      properties:
        storageFolder:
          type: string
          description: Absolute path to the manga library on disk.
          example: /data/manga
        serverPort:
          type: string
          description: TCP port the HTTP server listens on.
          example: "9833"
        database:
          type: string
          description: |
            Credential-free display string for the PostgreSQL target:
            "host:port/name". Password and username are never included.
          example: "127.0.0.1:5432/tsundoku"

    Setting:
      type: object
      required: [key, value, default, type, unit]
      properties:
        key:
          type: string
          description: The tunable key (an allowlisted dotted key).
          example: jobs.download_interval
        value:
          type: string
          description: The current resolved value (DB override if set, else the default).
          example: 15m0s
        default:
          type: string
          description: The env-config default for this key.
          example: 15m0s
        type:
          type: string
          description: Value representation — "duration" (Go duration string), "int", or "bool".
          enum: [duration, int, bool]
        unit:
          type: string
          description: Semantic unit hint for the UI (e.g. "duration", "count", "days").
          example: duration

    SettingsUpdateRequest:
      type: object
      required: [settings]
      properties:
        settings:
          type: array
          description: |
            Batch of key/value updates applied all-or-nothing — an unknown key or an
            out-of-bounds value rejects the whole batch with 400 naming the bad key.
          minItems: 1
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
                example: jobs.download_interval
              value:
                type: string
                example: 30m

    SourceMetric:
      type: object
      description: |
        One source's rolling search-performance snapshot. "isSlow" is derived at
        read time (ewmaLatencyMs > the current slow threshold), never stored — so
        the threshold can be re-tuned without a migration.
      required:
        - sourceId
        - sourceName
        - ewmaLatencyMs
        - lastLatencyMs
        - searchCount
        - successCount
        - failCount
        - lastError
        - updatedAt
        - isSlow
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id.
        sourceName:
          type: string
          description: The source's display name (denormalized).
        ewmaLatencyMs:
          type: integer
          description: Exponentially-weighted rolling search latency, in milliseconds.
        lastLatencyMs:
          type: integer
          description: Most recent measured search latency, in milliseconds.
        searchCount:
          type: integer
          description: Lifetime number of recorded searches against this source.
        successCount:
          type: integer
          description: Lifetime number of successful searches.
        failCount:
          type: integer
          description: Lifetime number of failed/timed-out searches.
        lastError:
          type: string
          description: Most recent failure reason ("" when none).
        lastErrorAt:
          type: string
          format: date-time
          description: When the most recent failure occurred (absent if never failed).
        lastSuccessAt:
          type: string
          format: date-time
          description: When the most recent success occurred (absent if never succeeded).
        lastWarmedAt:
          type: string
          format: date-time
          description: When the source was last warmed (absent if never warmed).
        updatedAt:
          type: string
          format: date-time
          description: When this snapshot was last written.
        isSlow:
          type: boolean
          description: |
            Derived flag — true when the source has never been measured OR its
            ewmaLatencyMs exceeds the current slow threshold.

    SourceWarmStarted:
      type: object
      required: [started]
      properties:
        started:
          type: boolean
          description: |
            Always true — acknowledges the warm-up pass was kicked off in the
            background. The pass runs detached (it takes minutes over slow
            anti-bot sources); its per-source outcome surfaces in
            GET /api/sources/metrics (lastWarmedAt / lastError), not here.
          example: true

    RunDownloadsResult:
      type: object
      required: [started]
      properties:
        started:
          type: boolean
          description: |
            Always true — acknowledges an immediate download cycle was
            triggered. The trigger is non-blocking + cap-1 coalescing, so this
            response does not distinguish a freshly-started cycle from one that
            was already running; watch the cycle.start/cycle.done/download.*
            SSE stream for actual progress.
          example: true

    SuwayomiSettings:
      type: object
      description: |
        The FlareSolverr (Cloudflare-bypass) + SOCKS-proxy subset of Suwayomi's
        server-global settings, proxied verbatim from the active Suwayomi (embed
        or external). Tsundoku stores none of these values.
      required: [flareSolverr, socksProxy]
      properties:
        flareSolverr:
          $ref: "#/components/schemas/FlareSolverrSettings"
        socksProxy:
          $ref: "#/components/schemas/SocksProxySettings"

    FlareSolverrSettings:
      type: object
      required: [enabled, url, timeout, sessionName, sessionTtl, asResponseFallback]
      properties:
        enabled:
          type: boolean
          description: Toggles the FlareSolverr Cloudflare-bypass proxy.
        url:
          type: string
          description: The FlareSolverr endpoint (e.g. http://host:8191).
          example: http://localhost:8191
        timeout:
          type: integer
          description: Per-request timeout in seconds.
          example: 60
        sessionName:
          type: string
          description: The FlareSolverr session identifier.
        sessionTtl:
          type: integer
          description: Session time-to-live in minutes.
          example: 15
        asResponseFallback:
          type: boolean
          description: Use FlareSolverr only as a fallback for blocked requests.

    SocksProxySettings:
      type: object
      required: [enabled, version, host, port, username, password]
      properties:
        enabled:
          type: boolean
          description: Toggles routing source traffic through the SOCKS proxy.
        version:
          type: integer
          description: SOCKS protocol version (4 or 5).
          enum: [4, 5]
          example: 5
        host:
          type: string
          description: Proxy hostname or IP.
        port:
          type: string
          description: Proxy port (numeric string; Suwayomi types it as a String).
          example: "1080"
        username:
          type: string
          description: Optional proxy username.
        password:
          type: string
          description: Optional proxy password.

    SuwayomiSettingsUpdate:
      type: object
      description: |
        A PARTIAL update of the FlareSolverr + SOCKS subset. Both groups and every
        field within them are optional: an omitted group or field is left
        untouched, so no unset setting is clobbered. At least one field must be
        present (an empty body is a 400).
      properties:
        flareSolverr:
          $ref: "#/components/schemas/FlareSolverrUpdate"
        socksProxy:
          $ref: "#/components/schemas/SocksProxyUpdate"

    FlareSolverrUpdate:
      type: object
      description: Partial FlareSolverr group; omitted fields are untouched.
      properties:
        enabled:
          type: boolean
        url:
          type: string
          description: Absolute http(s) URL, or empty string to clear.
        timeout:
          type: integer
          description: Per-request timeout in seconds (non-negative).
        sessionName:
          type: string
        sessionTtl:
          type: integer
          description: Session TTL in minutes (non-negative).
        asResponseFallback:
          type: boolean

    SocksProxyUpdate:
      type: object
      description: Partial SOCKS-proxy group; omitted fields are untouched.
      properties:
        enabled:
          type: boolean
        version:
          type: integer
          description: SOCKS protocol version (4 or 5).
          enum: [4, 5]
        host:
          type: string
        port:
          type: string
          description: Numeric string in 1..65535.
        username:
          type: string
        password:
          type: string

    Extension:
      type: object
      description: |
        A Suwayomi extension (a Tachiyomi/Mihon source plugin), proxied verbatim
        from the active Suwayomi (embed or external). Tsundoku stores none of
        this. The identity is pkgName (there is no numeric id); the install/nsfw/
        obsolete flags use Suwayomi's isInstalled/isNsfw/isObsolete naming.
      required:
        - pkgName
        - name
        - lang
        - versionName
        - versionCode
        - iconUrl
        - repo
        - isInstalled
        - hasUpdate
        - isNsfw
        - isObsolete
      properties:
        pkgName:
          type: string
          description: The extension package name — its stable identity.
          example: eu.kanade.tachiyomi.extension.en.mangadex
        name:
          type: string
          description: Human-readable display name.
          example: MangaDex
        lang:
          type: string
          description: BCP-47 language tag the extension serves.
          example: en
        versionName:
          type: string
          description: Human-readable version string.
          example: 1.4.2
        versionCode:
          type: integer
          description: Integer version code.
          example: 42
        iconUrl:
          type: string
          description: Tsundoku same-origin icon proxy path ("/api/suwayomi/extensions/{pkgName}/icon"), not Suwayomi's own raw (cross-origin) icon URL.
        repo:
          type: string
          description: Source repo URL this extension came from; "" when null.
        isInstalled:
          type: boolean
          description: Whether the extension is currently installed.
        hasUpdate:
          type: boolean
          description: Whether an installed extension has a newer version available.
        isNsfw:
          type: boolean
          description: Whether the extension is flagged not-safe-for-work.
        isObsolete:
          type: boolean
          description: Whether the extension is orphaned (no longer in any repo).

    ExtensionRepos:
      type: object
      description: The configured extension repo URL list.
      required: [repos]
      properties:
        repos:
          type: array
          description: Extension repo URLs (empty array when none configured).
          items:
            type: string

    ExtensionReposUpdate:
      type: object
      description: |
        REPLACES the extension repo URL list (PUT = replace, not merge). repos
        must be present (a JSON array); an empty array clears all repos. Each
        entry must be an absolute http(s) URL with a host.
      required: [repos]
      properties:
        repos:
          type: array
          items:
            type: string
            description: Absolute http(s) URL.
          example:
            - https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json

    SourcePreference:
      type: object
      description: |
        One configurable preference of a Suwayomi source (a Tachiyomi/Mihon
        source setting), flattened from the GraphQL Preference union. Read `type`
        first: it decides how `currentValue`/`default` are typed —
        CheckBoxPreference/SwitchPreference are booleans, ListPreference/
        EditTextPreference are strings (List also carries entries/entryValues),
        MultiSelectListPreference are string arrays. `position` is the 0-based
        array index and is the ONLY write selector; it must come from a FRESH read
        (the array order can shift server-side — never cache positions).
      required:
        - type
        - position
        - key
        - title
        - summary
        - currentValue
        - default
        - entries
        - entryValues
      properties:
        type:
          type: string
          description: The union variant (Suwayomi __typename).
          enum:
            - CheckBoxPreference
            - SwitchPreference
            - ListPreference
            - MultiSelectListPreference
            - EditTextPreference
        position:
          type: integer
          description: 0-based array index — the (position-indexed) write selector.
        key:
          type: string
          description: Source-internal preference key ("" when null).
        title:
          type: string
          description: Human-readable label ("" when null).
        summary:
          type: string
          description: Human-readable help text ("" when null).
        currentValue:
          nullable: true
          description: |
            Current value; null when unset. A boolean for CheckBox/Switch, a
            string for List/EditText, an array of strings for MultiSelectList.
          oneOf:
            - type: boolean
            - type: string
            - type: array
              items:
                type: string
        default:
          nullable: true
          description: |
            Default value; null when unset. Same per-variant typing as currentValue.
          oneOf:
            - type: boolean
            - type: string
            - type: array
              items:
                type: string
        entries:
          type: array
          description: Human-readable option labels (List/MultiSelect only; [] otherwise).
          items:
            type: string
        entryValues:
          type: array
          description: Stored option values matching entries by index (List/MultiSelect only; [] otherwise).
          items:
            type: string

    SourcePreferencesGroup:
      type: object
      description: One source's preferences within a grouped extension response (one source per language).
      required:
        - sourceId
        - sourceName
        - lang
        - enabled
        - preferences
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id (the write body's sourceId).
        sourceName:
          type: string
          description: Human-readable source name.
        lang:
          type: string
          description: BCP-47 language tag.
        enabled:
          type: boolean
          description: |
            The per-language enable/disable toggle. A disabled source is hidden
            from Tsundoku's Discover/Search/Browse source lists but keeps
            updating any series already adopted from it. Toggled via
            PATCH /api/suwayomi/sources/{sourceId}/enabled.
        preferences:
          type: array
          description: This source's configurable preferences, in array order.
          items:
            $ref: "#/components/schemas/SourcePreference"

    SourceEnabled:
      type: object
      description: The authoritative per-language enable/disable state, re-read after a write (§16 round-trip).
      required:
        - sourceId
        - enabled
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id.
        enabled:
          type: boolean
          description: The enable/disable state as re-read after the write.

    SetSourceEnabledRequest:
      type: object
      description: Set the per-language enable/disable state for one source.
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: The new enable/disable state.

    SourcePreferencesBySource:
      type: object
      description: An extension's per-source preferences, grouped by the (per-language) source they belong to.
      required:
        - sources
      properties:
        sources:
          type: array
          description: The extension's sources, each with its own preference list.
          items:
            $ref: "#/components/schemas/SourcePreferencesGroup"

    SetSourcePreferenceRequest:
      type: object
      description: |
        Write one source preference by POSITION. `value`'s JSON type must match the
        variant at that position (boolean → CheckBox/Switch, string → List/EditText,
        array of strings → MultiSelectList) — a mismatch is a 400. position must be
        taken from a fresh read (positions can shift server-side).
      required:
        - sourceId
        - position
        - value
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id the preference belongs to.
        position:
          type: integer
          minimum: 0
          description: 0-based array index of the preference to write.
        value:
          nullable: true
          description: New value — a boolean, a string, or an array of strings (by variant).
          oneOf:
            - type: boolean
            - type: string
            - type: array
              items:
                type: string

    ScanStarted:
      type: object
      description: Result of a POST /api/library/scan call — whether this call launched the background scan (202) or one was already in flight (409).
      required:
        - started
      properties:
        started:
          type: boolean
          description: true if this call launched the scan; false if a scan was already running (single-flight guard).

    LibraryDedupStarted:
      type: object
      description: Result of a POST /api/library/dedup-providers call — the library-wide dedup sweep has been launched in the background.
      required:
        - started
      properties:
        started:
          type: boolean
          description: Always true — the library-wide dedup sweep has been launched in the background.

    FoundSeries:
      type: object
      description: One row of a library scan's staging result — a series discovered on disk (whether or not it is already imported into the DB).
      required:
        - path
        - title
        - category
        - chapterCount
        - providers
        - status
        - alreadyInDb
      properties:
        path:
          type: string
          description: Absolute on-disk path to the series folder.
        title:
          type: string
          description: Series title as read from disk (ComicInfo.xml/sidecar or folder name).
        category:
          type: string
          description: Category folder name this series was found under.
        chapterCount:
          type: integer
          description: Number of chapter files found on disk for this series.
        providers:
          type: array
          description: Provider keys recorded in the sidecar for this series (empty when no provenance is known).
          items:
            type: string
        status:
          type: string
          description: Staging status of this entry (pending/imported/skipped).
        alreadyInDb:
          type: boolean
          description: Whether a Series row with this title/slug already exists in the DB.

    ProviderRef:
      type: object
      description: |
        Identifies one Suwayomi source+manga+scanlator to attach to a series.
        Carries no importance — the batch attach (library.AddProviders)
        assigns importances itself, each strictly below the series' existing
        providers (decision E), in list order.
      required:
        - source
        - mangaId
      properties:
        source:
          type: string
          description: Suwayomi source ID the chosen candidate came from.
        mangaId:
          type: integer
          description: Suwayomi-internal manga identifier within that source.
        scanlator:
          type: string
          description: |
            Selects which scanlation group's chapters this provider tracks; omit or send ""
            for "all chapters from this source". The same source may be attached again
            under a different scanlator.

    ImportRequest:
      type: object
      description: Registers a staged library-scan entry as already downloaded (no re-download), optionally attaching a list of owner-matched Suwayomi sources.
      required:
        - path
      properties:
        path:
          type: string
          description: The staged entry's on-disk path (as returned by a prior scan/list).
        matches:
          type: array
          description: |
            Owner-chosen Suwayomi sources to attach at import time (empty/absent = disk-only
            import, no attach). Each lands at an importance strictly below the disk provider's
            (decision E) via library.AddProviders — no upgrade re-download fires.
          items:
            $ref: "#/components/schemas/ProviderRef"

    SkipRequest:
      type: object
      description: Marks a staged library-scan entry as skipped — leave it on disk, stop showing it as pending.
      required:
        - path
      properties:
        path:
          type: string
          description: The staged entry's on-disk path (as returned by a prior scan/list).

    BatchImportRequest:
      type: object
      description: |
        Bulk "import all remaining as disk-only" request — one call instead
        of N sequential POST /api/library/import calls for a 1000+ series
        migration. Every path is imported disk-only (no match attached).
      required:
        - paths
      properties:
        paths:
          type: array
          description: Staged entries' on-disk paths (as returned by a prior scan/list). Capped at 500 per request.
          items:
            type: string

    BatchImportFailure:
      type: object
      description: One path's failure within a batch import.
      required:
        - path
        - message
      properties:
        path:
          type: string
          description: The on-disk path that failed to import.
        message:
          type: string
          description: The underlying error message for this path.

    BatchImportResult:
      type: object
      description: |
        Result of a batch import — partial success by design: a bad path is
        recorded in `failed` and never aborts the rest of the batch.
      required:
        - imported
        - failed
      properties:
        imported:
          type: integer
          description: Number of paths that imported successfully.
        failed:
          type: array
          description: Per-path failures (empty if every path imported successfully).
          items:
            $ref: "#/components/schemas/BatchImportFailure"

    AddProvidersRequest:
      type: object
      description: |
        Attaches several Suwayomi sources to an existing series in one call
        (Slice P batch attach). Ordered best-first — each entry lands at an
        importance strictly below the series' existing providers (decision
        E), assigned by the server, not the caller.
      required:
        - providers
      properties:
        providers:
          type: array
          minItems: 1
          description: The sources to attach, best-first.
          items:
            $ref: "#/components/schemas/ProviderRef"

    AddProviderRequest:
      type: object
      description: Attaches an additional Suwayomi source to an existing series.
      required:
        - source
        - mangaId
        - importance
      properties:
        source:
          type: string
          description: Suwayomi source ID the chosen candidate came from.
        mangaId:
          type: integer
          description: Suwayomi-internal manga identifier within that source.
        importance:
          type: integer
          description: Provider importance to assign (higher number = higher priority).
        scanlator:
          type: string
          description: |
            Selects which scanlation group's chapters this provider tracks; omit or send ""
            for "all chapters from this source". The same source may be attached again
            under a different scanlator.

    ProviderDedupResult:
      type: object
      description: |
        Result of an owner-triggered provider dedup: how many drifted
        disk/live source pairs were merged, how many were skipped, and the
        refreshed series detail after the cleanup.
      required:
        - merged
        - skipped
        - series
      properties:
        merged:
          type: integer
          description: Number of drifted disk/live source pairs folded into one row.
        skipped:
          type: integer
          description: >-
            Number of matching pairs left untouched because the linked twin has
            no fetched chapters yet (merging would orphan the disk chapters).
        series:
          $ref: "#/components/schemas/SeriesDetail"

    Tracker:
      type: object
      description: |
        One registered native tracker's connect status (AniList, MAL, Kitsu,
        MangaUpdates — spec/trackers-oauth-phase3). Every registered tracker
        is always listed, including a disabled/unconfigured OAuth tracker
        (blank client-id) — it is reported with isLoggedIn=false rather than
        omitted.
      required:
        - id
        - name
        - needsOAuth
        - isLoggedIn
        - isTokenExpired
        - username
      properties:
        id:
          type: integer
          description: The tracker's stable numeric registry id (MAL=1, AniList=2, Kitsu=3, MangaUpdates=7).
          example: 2
        name:
          type: string
          description: Human-display name.
          example: AniList
        needsOAuth:
          type: boolean
          description: True for AniList/MAL (OAuth redirect); false for Kitsu/MangaUpdates (direct username/password).
        isLoggedIn:
          type: boolean
          description: Whether a connected account exists for this tracker.
        isTokenExpired:
          type: boolean
          description: Whether the connected account's token has expired and needs a fresh login. Always false when isLoggedIn is false.
        username:
          type: string
          description: The connected account's display username ("" when not logged in).

    TrackerAuthURL:
      type: object
      description: A freshly built OAuth authorize URL for one tracker login attempt.
      required:
        - authUrl
      properties:
        authUrl:
          type: string
          description: The URL to send the owner's browser to.

    OAuthLoginRequest:
      type: object
      description: |
        Completes the OAuth round-trip an authorize URL started. callbackUrl
        is the FULL callback URL the SPA's own OAuth callback route received
        — carrying "state" plus either "code" (MAL) or "access_token"
        (AniList; the SPA extracts the browser's URL fragment into a query
        param before posting here, since a server never sees a fragment).
      required:
        - callbackUrl
      properties:
        callbackUrl:
          type: string

    CredentialLoginRequest:
      type: object
      description: A direct username/password login for a credential-based tracker (Kitsu, MangaUpdates).
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    TrackSearchResult:
      type: object
      description: |
        One tracker's search hit for a manga. status/totalChapters are the
        tracker's OWN native vocabulary/scale — never normalized (spec §2).
      required:
        - remoteId
        - title
        - url
        - coverUrl
        - status
        - totalChapters
      properties:
        remoteId:
          type: string
          description: The tracker's manga id.
        title:
          type: string
        url:
          type: string
        coverUrl:
          type: string
        status:
          type: string
          description: The tracker's own native status vocabulary (e.g. AniList RELEASING/FINISHED).
        totalChapters:
          type: integer
          description: The tracker's reported total chapter count; 0 = unknown/ongoing.

    TrackBinding:
      type: object
      description: |
        A series↔tracker binding — the remote link and reading progress on
        one tracker's own account. status/score/lastChapterRead are the
        tracker's OWN native scale (spec §2 — converted only at display).
      required:
        - id
        - seriesId
        - trackerId
        - trackerName
        - remoteId
        - remoteUrl
        - libraryId
        - title
        - status
        - lastChapterRead
        - totalChapters
        - score
        - scoreFormat
        - startDate
        - finishDate
        - private
      properties:
        id:
          type: string
          format: uuid
        seriesId:
          type: string
          format: uuid
        trackerId:
          type: integer
        trackerName:
          type: string
        remoteId:
          type: string
          description: The tracker's manga id.
        remoteUrl:
          type: string
          description: The canonical link to the remote entry ("" when not derivable).
        libraryId:
          type: string
          description: The AniList MediaList entry id ("" for MAL / trackers without one).
        title:
          type: string
          description: The remote entry's title.
        status:
          type: string
          description: The tracker's own native status code.
        lastChapterRead:
          type: number
          description: The furthest chapter read (fractional-safe).
        totalChapters:
          type: integer
          description: The remote total; 0 = unknown/ongoing.
        score:
          type: number
          description: Reading score on the tracker's native scale.
        scoreFormat:
          type: string
          description: |
            The native scale `score` is stored/must be written on for this
            binding's tracker (e.g. "POINT_100" for AniList's default 0-100
            scale, "KITSU_RATING_TWENTY" for Kitsu's 0-20 scale, "MAL" for
            MyAnimeList's fixed 0-10 scale). Resolved from the connected
            account's own captured format (AniList) or a per-tracker
            default. "" only for a binding whose tracker is unregistered.
        startDate:
          type: string
          format: date-time
          nullable: true
        finishDate:
          type: string
          format: date-time
          nullable: true
        private:
          type: boolean

    BindRequest:
      type: object
      description: The owner's picked tracker + remote entry (from the search results) to bind the series to.
      required:
        - trackerId
        - remoteId
      properties:
        trackerId:
          type: integer
        remoteId:
          type: string

    UpdateTrackRequest:
      type: object
      description: |
        The owner's manual tracking-sheet edit (spec/trackers-sync-phase4 §2
        trigger (c)). Every field is optional — a field left out (or set to
        null) is left unchanged on the binding; at least one field must be
        present. Every patched field is pushed to the tracker's own account
        before being persisted locally.
      minProperties: 1
      properties:
        status:
          type: string
          description: The tracker's own native status vocabulary. Non-empty when provided.
        lastChapterRead:
          type: number
          minimum: 0
        score:
          type: number
          minimum: 0
        startDate:
          type: string
          format: date-time
          nullable: true
        finishDate:
          type: string
          format: date-time
          nullable: true
        private:
          type: boolean

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns HTTP 200 with {"status":"ok"} when the server is running. No authentication required.
      tags:
        - system
      responses:
        "200":
          description: Server is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/owner/claim:
    post:
      operationId: claimOwner
      summary: First-run owner claim
      description: |
        Creates the single owner account. Succeeds exactly once — if any owner
        already exists the request is rejected with 409 Conflict (fail-closed).
        Concurrent claims are serialised; only one will succeed.
      tags:
        - owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimRequest"
      responses:
        "200":
          description: Owner created. Returns a signed Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: An owner already exists; claim is permanently rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/owner/login:
    post:
      operationId: loginOwner
      summary: Owner login
      description: |
        Authenticates with username and password and returns a signed Bearer token.
        Returns 401 for wrong credentials without revealing which field was wrong.
      tags:
        - owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Credentials accepted. Returns a signed Bearer token and sets an HttpOnly session cookie.
          headers:
            Set-Cookie:
              description: HttpOnly session cookie (tsundoku_session).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/owner/logout:
    post:
      operationId: logoutOwner
      summary: Clear the owner session cookie.
      tags:
        - owner
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Logged out (session cookie cleared).
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/owner/me:
    get:
      operationId: getOwner
      summary: The authenticated owner's identity.
      tags:
        - owner
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The authenticated owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/progress:
    get:
      operationId: streamProgress
      summary: SSE progress stream
      description: |
        Server-Sent Events stream delivering real-time progress events.
        Requires a valid Bearer token sent via the Authorization header
        (not via query-string — QCAT-018). The client must use a fetch-based
        SSE implementation, not the browser EventSource API, to support
        custom headers.
      tags:
        - sse
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SSE stream opened. Events are pushed as `text/event-stream`.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Newline-delimited SSE frames. Each frame carries a `data:` field
                  containing a JSON-encoded progress event. The `event:` field names
                  the event type (e.g. `chapter.downloaded`, `series.synced`,
                  `scan.start`/`scan.progress`/`scan.done` — emitted by the async
                  library scan, see POST /api/library/scan).
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series:
    get:
      operationId: listSeries
      summary: List library series
      description: |
        Returns a title-ascending page of series summaries with per-series
        chapter-state rollups. Optionally filtered by category and paginated.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          description: Restrict to a single category by NAME (user-defined; free string).
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Page size (default 50, capped at 200).
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          required: false
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: A page of series summaries.
          headers:
            X-Total-Count:
              description: Total number of series matching the filter (across all pages).
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Invalid category or pagination parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adoptSeries
      summary: Adopt / import a manga into the library
      description: |
        Groups one or more (source, manga) candidates under a single canonical title
        and merges them into ONE Series with N importance-ranked providers, ingesting
        all their chapters. On success, returns the full SeriesDetail of the newly
        created series so the caller sees the persisted state without a refetch (§16).
      tags:
        - imports
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdoptRequest"
      responses:
        "201":
          description: Series adopted. Returns the full series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Validation error (blank title, empty providers, invalid category, duplicate provider pair, negative importance).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}:
    get:
      operationId: getSeries
      summary: Get series detail
      description: Returns the full detail of one series — summary fields, chapters, and providers.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteSeries
      summary: Delete a whole series
      description: |
        Permanently removes a series and all its tracking data (providers, chapter
        feeds, sync state, chapters). When deleteFiles=true the downloaded CBZs and
        the series' library folder are also removed from disk (permanent — recover
        by re-adopting from source). When deleteFiles=false the CBZs are kept on
        disk (only DB tracking is removed; a later reconcile can rebuild the series
        from the on-disk sidecar). Returns 204 No Content.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: deleteFiles
          in: query
          required: true
          description: Whether to also delete the downloaded CBZ files + folder from disk.
          schema:
            type: boolean
      responses:
        "204":
          description: Series deleted.
        "400":
          description: Malformed id or missing/invalid deleteFiles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/category:
    patch:
      operationId: setSeriesCategory
      summary: Recategorize a series
      description: |
        Files the series under a new category. The on-disk series folder is moved
        before the database is updated (with compensation) so the DB and disk
        never drift. Returns the updated series summary.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCategoryRequest"
      responses:
        "200":
          description: Recategorized. Returns the updated series summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Malformed id, malformed categoryId, or unknown category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/monitored:
    patch:
      operationId: setSeriesMonitored
      summary: Toggle series monitoring
      description: |
        Sets the monitored flag for a series. When monitored is true the download
        ticker will pick up new chapters; when false the series is paused. Returns
        the updated series summary so the caller sees the new state without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMonitoredRequest"
      responses:
        "200":
          description: Monitoring flag updated. Returns the updated series summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Malformed id or missing monitored field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/completed:
    patch:
      operationId: setSeriesCompleted
      summary: Mark a series completed (finished)
      description: |
        Sets the completed flag for a series. A completed series is excluded from
        the refresh sweep and from source-health. Reversible (completed=false
        re-opens it). Returns the updated series summary so the caller sees the new
        state without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCompletedRequest"
      responses:
        "200":
          description: Completed flag updated. Returns the updated series summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Malformed id or missing completed field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers:
    patch:
      operationId: reorderSeriesProviders
      summary: Re-rank series providers
      description: |
        Updates the importance values for a series' providers in a single
        all-or-nothing transaction. A higher importance means the provider is
        preferred when selecting the best chapter source. Returns the updated
        series detail so importances are reflected without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderProvidersRequest"
      responses:
        "200":
          description: Provider importances updated. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed id, invalid provider UUID, empty list, or provider not in series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: addSeriesProvider
      summary: Attach an additional source to an existing series
      description: |
        Adds a Suwayomi source {source, mangaId, importance} as a new provider
        on an existing series (upgrade-aware — the new source's chapter feed
        is ingested and ranked against the series' existing sources). Returns
        the refreshed series detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProviderRequest"
      responses:
        "200":
          description: Provider attached. Returns the refreshed series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed id, or an invalid/missing source, mangaId, or importance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id, or no such Suwayomi source/manga.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The source is already attached to this series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/batch:
    post:
      operationId: addSeriesProviders
      summary: Attach several sources to an existing series in one call
      description: |
        Batch counterpart of POST /api/series/{id}/providers (Slice P): attaches
        several Suwayomi sources {source, mangaId, scanlator} to an existing
        series in one request, ordered best-first. Each source is ingested and
        lands at an importance strictly below the series' existing providers
        (decision E), assigned by the server. Returns the refreshed series
        detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProvidersRequest"
      responses:
        "200":
          description: All providers attached. Returns the refreshed series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed id, empty providers list, or an invalid/missing source or mangaId in one of the entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id, or no such Suwayomi source/manga for one of the entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: One of the sources is already attached to this series (sources attached before the failing entry are NOT rolled back).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/{providerId}/match:
    post:
      operationId: matchDiskProvider
      summary: Attribute existing on-disk chapters to a real source without re-downloading
      description: |
        Attributes a series' EXISTING imported/on-disk chapters — currently
        satisfied by the UNLINKED disk-origin provider at {providerId} (see
        Provider.linked) — to a real Suwayomi source {source, mangaId,
        scanlator, importance} WITHOUT re-downloading them. The real source is
        attached, every chapter it also offers is re-pointed onto it (so no
        upgrade is ever triggered for them), its CBZ is renamed + its embedded
        ComicInfo rewritten to the source's identity, and the now-empty disk
        provider is deleted. A chapter the disk group had but the new source
        lacks keeps its prior watermark (never re-downloaded, never dropped).
        Returns the refreshed series detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: path
          required: true
          description: The disk-origin (unlinked) SeriesProvider UUID to match away from.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProviderRequest"
      responses:
        "200":
          description: Chapters re-attributed. Returns the refreshed series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: >-
            Malformed id/providerId, invalid/missing source, mangaId, or
            importance, the provider does not belong to the series, or the
            provider is already a real (linked) source, not a disk-origin one.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id, or no such Suwayomi source/manga.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/dedup:
    post:
      operationId: dedupSeriesProviders
      summary: Merge already-drifted disk/live source pairs on a series
      description: |
        Cleans up source-identity drift that already happened: a series carrying
        BOTH an unlinked disk-origin provider AND a real linked provider that are
        actually the same physical source (same display name + scanlator). Each
        such pair is folded into one row WITHOUT re-downloading — the disk
        chapters are relabeled onto the linked source and the drained disk row is
        deleted. A pair whose linked twin has no fetched chapters yet is skipped
        (merging would orphan the disk chapters). Idempotent: with no drifted
        pairs it changes nothing. Returns the merged/skipped counts plus the
        refreshed series detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dedup complete. Returns counts and the refreshed series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDedupResult"
        "400":
          description: Malformed series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/dedupe-files:
    post:
      operationId: dedupeSeriesFiles
      summary: Remove superseded duplicate CBZ files for a series
      description: |
        Owner-triggered duplicate-CBZ sweep. For every downloaded chapter it
        removes any OTHER CBZ in the series folder that shares that chapter's
        number, keeping the chapter's winning file — converging the on-disk state
        to one file per chapter number (the Komga contract). This is the bulk
        counterpart to the automatic per-convergence cleanup on upgrade; it
        cleans up a library that accumulated duplicates before convergence
        existed (e.g. an imported Kaizoku library). Performs NO DB writes and
        never deletes a winning file. Returns the number of files removed.
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Sweep complete. Returns the number of files removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DedupeFilesResult"
        "400":
          description: Malformed series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/fractional-cleanup:
    get:
      operationId: previewFractionalCleanup
      summary: Preview the series' removable fractional chapters
      description: |
        Lists the already-downloaded FRACTIONAL chapters that are safe to remove —
        the files left behind when the owner ticked "ignore fractional chapters" on
        a source (that toggle stops NEW fractional downloads and deletes nothing).

        A chapter is removable only when its number is fractional, it HAS a file
        (downloaded with a filename), and EVERY source whose feed carries its
        chapter key has ignore_fractional set. That last rule is the resurrection
        guard: a fractional a non-ignored source still carries would simply be
        re-ingested and re-downloaded by the next refresh sweep.

        Each entry carries the evidence the owner judges from (page count, the
        satisfying source, the filename), alongside typicalPageCount — the MEDIAN
        page count of the series' whole (non-fractional) downloaded chapters — so a
        1-page notice page and a 132-page full chapter numbered ".5" are told apart
        by measurement, not by name. This endpoint deletes nothing.
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The removable set (possibly empty) and the page-count yardstick.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FractionalCleanupPreview"
        "400":
          description: Malformed series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: removeFractionalChapters
      summary: Remove the selected fractional chapters (files + rows)
      description: |
        Owner-triggered removal of the fractional chapters selected in the cleanup
        dialog: each chapter's CBZ file and its Chapter row are deleted. The source
        feed rows (ProviderChapter) are KEPT — the feed is the source's offering,
        not the owner's library, so un-ticking the ignore-fractional toggle restores
        the chapter on the next ingest.

        The removable set is RE-COMPUTED server-side: any chapterId outside it (a
        whole chapter, a fractional a live source still carries, a chapter of another
        series) is rejected with 400 and NOTHING is deleted (all-or-nothing). Nothing
        automatic ever calls this endpoint.
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FractionalCleanupRequest"
      responses:
        "200":
          description: Removal complete. Returns the number of chapters removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FractionalCleanupResult"
        "400":
          description: >-
            Malformed series id or body, an empty chapterIds list, or a chapter that
            is not in the server-recomputed removable set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/{providerId}:
    delete:
      operationId: removeSeriesProvider
      summary: Remove a source from a series
      description: |
        Removes one source (provider) from a series: deletes the provider, its
        chapter availability feed, and its sync state, and clears the
        satisfied-by link on any chapters it had satisfied — while keeping every
        downloaded CBZ on disk. Removing the last source leaves a zero-provider
        series in place. Returns the updated series detail (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: path
          required: true
          description: SeriesProvider UUID to remove.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Source removed. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed series or provider UUID, or provider not in series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/{providerId}/ignore-fractional:
    patch:
      operationId: setProviderIgnoreFractional
      summary: Flag a source as a fractional re-uploader for this series
      description: |
        Marks one of the series' sources as a fractional re-uploader — a mirror that
        republishes whole chapter N as a lone "N.1" under its own URL — or clears the
        flag. A flagged source contributes no fractional-numbered chapters (5.1, 5.5 …)
        to THIS series: they are dropped at ingest and excluded from download candidacy.
        Its whole chapters are unaffected.

        The flag is per (series, provider) and is an explicit owner decision, never a
        heuristic: a ".5" omake source also hosts the whole chapter, so any automatic
        rule would suppress genuine side-chapters. Decide from the source's
        `fractionalChapters` evidence list in the series detail.

        Flipping the flag DELETES NOTHING: fractional feed rows already ingested and any
        CBZ already downloaded are kept, and un-ticking restores the source immediately.
        Returns the updated series detail (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: path
          required: true
          description: SeriesProvider UUID to flag.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetIgnoreFractionalRequest"
      responses:
        "200":
          description: Flag updated. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: |
            Malformed series or provider UUID, missing ignoreFractional field, or the
            provider does not belong to this series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/cover:
    get:
      operationId: getSeriesCover
      summary: Series cover image
      description: |
        Streams the cover image for the series' resolved metadata source provider.
        Served from the on-disk cache whenever it is current; only a cover the library
        does not hold locally is fetched from Suwayomi. Returns 404 when the series has
        no cover, 502 when Suwayomi fails to fetch it.

        Clients should use the `coverUrl` from the series DTO VERBATIM: it carries a `v`
        content version (a hash of the cover's bytes). A request whose `v` matches the
        current version is answered `Cache-Control: private, max-age=31536000, immutable`
        — safe precisely because the URL changes whenever the image does. A request with
        no `v`, or a stale one, serves the same image but only as `private, no-cache`, so
        an un-versioned URL can never be permanently cached.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The cover image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Series not found or no cover available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the cover image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: setSeriesCover
      summary: Set series cover (metadata engine)
      description: |
        The owner's explicit cover pick, from either the metadata-provider cover
        gallery (GET .../metadata/covers) or a library source's own cover. Fetches
        coverUrl's bytes, caches them via the Local Cover Cache, and records
        cover_source independently of metadata_source (a cover pick never implies a
        metadata re-merge). Returns the refreshed series detail (§16).
      tags:
        - metadata
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCoverRequest"
      responses:
        "200":
          description: Cover updated. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed series id, or a missing/invalid sourceKind, sourceRef, or coverUrl.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/{providerId}/cover:
    get:
      operationId: getProviderCover
      summary: Provider cover image
      description: |
        Streams the cover image for a specific provider within a series. The image is
        fetched from Suwayomi and returned as a binary blob. Returns 404 when the
        provider has no cover or does not belong to the series, 502 on a Suwayomi
        fetch failure.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: path
          required: true
          description: SeriesProvider UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The cover image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Series or provider not found, or no cover available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the cover image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/metadata-source:
    patch:
      operationId: setSeriesMetadataSource
      summary: Pin metadata source
      description: |
        Pins the series' metadata source to the given provider (providerId non-null) or
        resets to automatic resolution (highest-importance provider) when providerId is
        null or absent. Returns the full series detail so isMetadataSource is reflected
        without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMetadataSourceRequest"
      responses:
        "200":
          description: Metadata source updated. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed series id, malformed providerId UUID, or providerId does not belong to the series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/metadata/search:
    get:
      operationId: searchMetadata
      summary: Cross-provider metadata candidate search
      description: |
        Fans a free-text query out across every registered metadata provider (or a
        named subset via ?providers) and returns the raw candidate gallery. Nothing
        is persisted — this feeds the owner's Identify picker;
        POST /api/series/{id}/metadata/identify performs the actual write.
      tags:
        - metadata
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string; must be non-empty.
          schema:
            type: string
        - name: providers
          in: query
          required: false
          description: Comma-separated list of metadata provider keys to restrict the search to.
          schema:
            type: string
      responses:
        "200":
          description: Cross-provider candidate gallery.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetadataSearchResult"
        "400":
          description: Missing or empty q parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/metadata/identify:
    post:
      operationId: identifySeriesMetadata
      summary: Identify a series against one or more metadata providers
      description: |
        Accepts either the legacy single-pick {provider, remoteId} body or the
        multi-select {selections: [...]} body. A single resolved pick becomes the
        series' primary metadata_source ("anchor-then-aggregate"): the engine
        auto-matches every OTHER registered provider by the primary's own title
        and merges the result (union collections + primary-anchored scalar
        gap-fill, QCAT-228). Two or more selections merge EXACTLY the owner's own
        picks instead — no auto-matching beyond them. Either way the series'
        metadataLocked is set true (hand-curation — the background AutoIdentify
        pass never overwrites it). Returns the refreshed series detail (§16).
      tags:
        - metadata
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataIdentifyRequest"
      responses:
        "200":
          description: Identified. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: >-
            Malformed series id, missing provider/remoteId (or a blank entry inside
            selections), an empty selections array, or an unknown provider key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/metadata/covers:
    get:
      operationId: getSeriesMetadataCovers
      summary: Aggregated metadata cover-candidate gallery
      description: |
        Returns every metadata provider's cover for the series' own title — the
        gallery behind the owner's cover-picker modal. Nothing is persisted; see
        POST /api/series/{id}/cover for the pick itself.
      tags:
        - metadata
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Aggregated cover candidates.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoverCandidate"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/categories:
    get:
      operationId: listCategories
      summary: List categories
      description: Returns every user-defined category ordered by sort order then name, each with its current series count.
      tags:
        - categories
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All categories.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCategory
      summary: Create a category
      description: Creates a new, empty category. The name must be unique and filesystem-safe (it becomes the on-disk folder name).
      tags:
        - categories
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Created. Returns the new category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Invalid category name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A category with that name already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/categories/{id}:
    patch:
      operationId: updateCategory
      summary: Rename and/or reorder a category
      description: |
        Renames the category (moving its on-disk folder, with compensation so DB
        and disk never drift) and/or updates its sort order. At least one of name
        or sortOrder must be present. The protected default ("Other") cannot be
        renamed. Returns the updated category.
      tags:
        - categories
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Updated. Returns the category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Malformed id, empty body, invalid name, or the protected default.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No category with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Another category already uses that name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCategory
      summary: Delete an empty category
      description: |
        Deletes a category only when no series is filed under it. The protected
        default ("Other") can never be deleted. No series or CBZ is removed.
      tags:
        - categories
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category UUID.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted.
        "400":
          description: Malformed id or the protected default.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No category with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The category still has series filed under it.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/categories/{id}/default:
    patch:
      operationId: setDefaultCategory
      summary: Set the default landing category
      description: |
        Promotes the category to be the single default that new / uncategorized
        series are filed under, demoting the previous default in the same
        transaction. The default can never be deleted; the previously-default
        category becomes deletable. No series or folder is moved. Returns the
        updated category.
      tags:
        - categories
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated. Returns the now-default category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Malformed id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No category with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources:
    get:
      operationId: listSources
      summary: List Suwayomi sources
      description: Returns all installed Suwayomi sources (extensions) as a flat list.
      tags:
        - imports
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All available sources.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/search:
    get:
      operationId: searchManga
      summary: Multi-source manga search
      description: |
        Fans out a search query to all sources (or a named subset) in parallel,
        groups results by title similarity, and returns []SearchGroup. Per-source
        errors are logged and skipped — partial results are returned with a nil error
        so a single misbehaving source does not block the whole response.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string; must be non-empty.
          schema:
            type: string
        - name: sources
          in: query
          required: false
          description: |
            Comma-separated list of source IDs to restrict the search to.
            Unknown IDs are silently dropped by the service.
          schema:
            type: string
      responses:
        "200":
          description: Grouped search results.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchGroup"
        "400":
          description: Missing or empty q parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/browse:
    get:
      operationId: browseSource
      summary: Browse a source's Popular/Latest catalog
      description: |
        Returns one page of a single source's catalog listing (Popular or Latest)
        as a flat BrowseResult. Unlike search there is no cross-source fan-out or
        grouping — Popular/Latest are per-source listings. The result carries
        hasNextPage so the client can paginate. Some sources do not support the
        Latest listing; an upstream failure surfaces as 500.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID to browse.
          schema:
            type: string
        - name: type
          in: query
          required: true
          description: Which catalog listing to fetch.
          schema:
            type: string
            enum: [popular, latest]
        - name: page
          in: query
          required: false
          description: 1-based page number; defaults to 1, must be >= 1.
          schema:
            type: integer
            default: 1
            minimum: 1
      responses:
        "200":
          description: One page of the source's catalog browse.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowseResult"
        "400":
          description: Missing/invalid type, or a non-integer / out-of-range page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown source ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/chapters:
    get:
      operationId: inspectChapters
      summary: Preview a manga's chapter list
      description: |
        Triggers a live chapter-list fetch from the source and returns a lightweight
        preview as []ChapterInspect. This contacts the upstream provider and
        populates Suwayomi's internal chapter cache — use before adopting to
        confirm the chapter count.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID.
          schema:
            type: string
        - name: mangaId
          in: path
          required: true
          description: Suwayomi-internal manga identifier (integer).
          schema:
            type: integer
      responses:
        "200":
          description: Chapter list for the manga.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChapterInspect"
        "400":
          description: Non-integer mangaId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/details:
    get:
      operationId: getMangaDetails
      summary: On-demand rich manga details
      description: |
        FORCES Suwayomi to fetch full metadata (author/artist/genre/description)
        for this manga from its upstream source, then returns the enriched
        candidate in the same shape as Search/Browse. Suwayomi's Search/Browse
        results are lightweight (title/cover/url only) — call this once per
        manga a Discover card is hovered to fill in the rich fields; never for
        every row of a search/browse page (each call is a real request to the
        source).
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID.
          schema:
            type: string
        - name: mangaId
          in: path
          required: true
          description: Suwayomi-internal manga identifier (integer).
          schema:
            type: integer
      responses:
        "200":
          description: The enriched manga candidate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchCandidate"
        "400":
          description: Non-integer mangaId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown source ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the manga details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/breakdown:
    get:
      operationId: getSourceBreakdown
      summary: Per-scanlator chapter coverage breakdown
      description: |
        Fetches the live chapter feed for this source-manga and groups it by scanlator,
        returning per-group counts and display ranges — powers the adopt UI's auto-split
        of a source into per-scanlator rows, each adoptable with its own importance.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID.
          schema:
            type: string
        - name: mangaId
          in: path
          required: true
          description: Suwayomi-internal manga identifier (integer).
          schema:
            type: integer
      responses:
        "200":
          description: The per-scanlator breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceBreakdown"
        "400":
          description: Non-integer mangaId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown source ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the chapter feed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/cover:
    get:
      operationId: getMangaCover
      summary: Source-manga cover image
      description: |
        Streams a Discover/Search candidate's cover image, proxied from Suwayomi's
        own REST thumbnail endpoint. The image is returned as a binary blob. Returns
        502 when Suwayomi fails to fetch it. This is a same-origin, authed proxy —
        it exists because a source's raw GraphQL thumbnailUrl is Suwayomi-relative
        and 404s if rendered directly against Tsundoku's own origin.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID (accepted for route symmetry; not used to resolve the thumbnail).
          schema:
            type: string
        - name: mangaId
          in: path
          required: true
          description: Suwayomi-internal manga identifier (integer).
          schema:
            type: integer
      responses:
        "200":
          description: The cover image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: Non-integer mangaId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the cover image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/health:
    get:
      operationId: getLibraryHealth
      summary: Library source-health scan
      description: Returns every series that has at least one stale or erroring source.
      tags:
        - series
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The sick series and their sick sources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryHealth"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/downloads:
    get:
      operationId: listDownloads
      summary: Cross-library chapter activity by state
      description: |
        Returns a paginated list of chapters across the whole library filtered by
        download state, each enriched with its series display title + cover and the
        resolved chapter name + provider. The `state` parameter is a REQUIRED
        comma-separated list of raw chapter states (multiple values = OR); the FE
        composes the Active / Failed / Queued views from these raw states.
      tags:
        - downloads
      security:
        - BearerAuth: []
      parameters:
        - name: state
          in: query
          required: true
          description: Comma-separated chapter states to include (OR-matched). Required.
          schema:
            type: string
          example: failed,permanently_failed
        - name: limit
          in: query
          required: false
          description: Page size (default 50, capped at 200).
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          required: false
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
        - name: q
          in: query
          required: false
          description: Free-text filter on the series title (case-insensitive contains).
          schema:
            type: string
      responses:
        "200":
          description: A page of enriched chapters plus the total matching count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadList"
        "400":
          description: Missing/empty or unknown state, or an invalid pagination value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/downloads/retry-all:
    post:
      operationId: retryAllDownloads
      summary: Bulk-reset failed chapters to wanted
      description: |
        Resets every chapter in the given retryable states back to wanted (clearing
        last_error, error_category, retries and next_attempt_at) so the next download
        cycle re-attempts them. `state` defaults to failed + permanently_failed when
        omitted; supplying a non-retryable state is rejected. Optionally scoped to one
        series. Returns the number of chapters reset. On success this also triggers an
        immediate download cycle (the same coalescing trigger as POST
        /api/downloads/run) so the reset chapters do not wait for the next timer tick.
      tags:
        - downloads
      security:
        - BearerAuth: []
      parameters:
        - name: state
          in: query
          required: false
          description: Comma-separated retryable states to reset (default failed,permanently_failed). A non-retryable state is rejected.
          schema:
            type: string
          example: permanently_failed
        - name: series_id
          in: query
          required: false
          description: Restrict the reset to a single series.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The number of chapters reset to wanted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryAllResult"
        "400":
          description: A non-retryable or unknown state, or an invalid series_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chapters/{id}/retry:
    post:
      operationId: retryChapter
      summary: Reset one failed chapter to wanted
      description: |
        Resets a single failed or permanently_failed chapter back to wanted so the
        next download cycle re-attempts it, clearing the failure bookkeeping
        (last_error, error_category, retries, next_attempt_at). This is a state reset,
        never a delete (the never-auto-delete invariant holds — a failed chapter has no
        downloaded file). Returns 409 when the chapter is not in a retryable state. On
        success this also triggers an immediate download cycle (the same coalescing
        trigger as POST /api/downloads/run) so the chapter does not wait for the next
        timer tick.
      tags:
        - downloads
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Chapter UUID.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Chapter reset to wanted.
        "400":
          description: Malformed chapter id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No chapter with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Chapter is not in a retryable state (only failed/permanently_failed may be retried).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chapters/{id}/progress:
    patch:
      operationId: setChapterProgress
      summary: Set chapter reading progress
      description: |
        Records the in-app reader's progress for one chapter: the last page the
        owner viewed and whether the chapter is fully read. `readAt` is stamped to
        the current time when `read` is true and cleared when false. Progress is
        pure owner UI state — it has no disk/sidecar effect and never influences
        downloads. Returns the updated progress subset.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Chapter UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterProgressUpdate"
      responses:
        "200":
          description: Updated reading progress.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterProgress"
        "400":
          description: Malformed chapter id or invalid body (negative lastReadPage, missing field).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No chapter with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/chapters/{chapterId}/pages/{n}:
    get:
      operationId: getChapterPage
      summary: Stream one CBZ page image (in-app reader)
      description: |
        Streams the raw bytes of the n-th page (0-based, natural page order) of a
        downloaded chapter's CBZ as an image blob, for the in-app long-strip
        reader. The chapter must belong to the series.

        `v` is an optional content-version cache buster (the chapter's
        `pageVersion`, see the `Chapter` schema): a request whose `v` matches the
        chapter's CURRENT version gets `Cache-Control: private, max-age=86400`;
        an absent or stale `v` gets `Cache-Control: private, no-cache`. `v` never
        changes which bytes are served — it only selects the caching policy. The
        response also carries an `ETag` (identifying this exact page + version),
        so a repeat `If-None-Match` request answers 304 without the server
        opening the CBZ. Deliberately NOT `immutable`: the version is derived
        from DB fields (filename + download_date), not a hash of the bytes, so a
        bounded cache lets a drifted version self-heal within a day instead of
        pinning stale pages forever.

        Returns 404 when the chapter, its CBZ, or the requested page index does
        not exist, and 502 when the archive is present but cannot be decoded.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: chapterId
          in: path
          required: true
          description: Chapter UUID (must belong to the series).
          schema:
            type: string
            format: uuid
        - name: n
          in: path
          required: true
          description: 0-based page index in natural page order.
          schema:
            type: integer
            minimum: 0
        - name: v
          in: query
          required: false
          description: |
            Content-version cache buster (the chapter's `pageVersion`). When it
            matches the chapter's current version the response is cached for a
            day; otherwise it is revalidatable only. Never affects which bytes
            are served.
          schema:
            type: string
      responses:
        "200":
          description: Page image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: Malformed series/chapter id or non-integer page index.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown chapter/series, missing CBZ, or page index out of range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The CBZ exists but a page could not be decoded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/downloads/run:
    post:
      operationId: runDownloads
      summary: Trigger an immediate download cycle ("Download now")
      description: |
        Starts a download cycle immediately instead of waiting for the next
        `jobs.download_interval` timer tick — the manual counterpart to the
        automatic triggers already fired by Adopt, provider re-rank, and the
        retry endpoints. The underlying trigger is non-blocking and cap-1
        coalescing, so repeated calls (e.g. a double-click) collapse into at
        most one extra cycle. This does NOT bypass the per-source circuit
        breaker or backoff — a cooled-down/blocked source's chapters still wait
        out their cooldown; it only starts the cycle sooner. Returns 202
        immediately; the cycle itself runs in the background (progress is
        visible via the existing cycle.start/cycle.done/download.* SSE stream).
      tags:
        - downloads
      security:
        - BearerAuth: []
      responses:
        "202":
          description: The download cycle was accepted and is starting in the background.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDownloadsResult"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/scan:
    post:
      operationId: scanLibrary
      summary: Launch an async scan of on-disk storage for importable series
      description: |
        Launches a background walk of the storage root that upserts one
        staging row per on-disk series (never downgrading an already-imported
        row). Use this to discover series that exist on disk but are not yet
        tracked in the DB (e.g. after a Kaizoku.GO migration).

        The scan runs asynchronously and streams progress over the
        `/api/progress` SSE stream as `scan.start` (fired once, when the walk
        begins), `scan.progress` (fired after each series is staged, carrying
        `processed`/`total`/`path`), and `scan.done` (fired once, carrying the
        final `total`/`found`, or `error` if the walk itself failed) — this
        avoids blocking the request for a 1000+ series NFS walk, which could
        otherwise trip a gateway timeout (e.g. a Cloudflare Tunnel's edge
        limit). Only one scan may run at a time; see the 409 response.
      tags:
        - library
      security:
        - BearerAuth: []
      responses:
        "202":
          description: The scan was launched; watch /api/progress for scan.* events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStarted"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A scan is already in flight (single-flight guard).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStarted"

  /api/library/dedup-providers:
    post:
      operationId: dedupAllProviders
      summary: Merge drifted duplicate sources across the whole library (fire-and-forget)
      description: |
        Runs the per-series provider dedup across every series, folding
        already-drifted disk/live source pairs into one row without
        re-downloading. Returns 202 immediately; the sweep runs in the
        background and per-series results appear as each series is next viewed.
      tags:
        - library
      security:
        - BearerAuth: []
      responses:
        "202":
          description: Dedup sweep started in the background.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryDedupStarted"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/imports:
    get:
      operationId: listImports
      summary: List staged library-import entries
      description: |
        Returns a page of the staged entries from a prior scan, optionally
        filtered by status. An empty/absent status returns every staged
        entry. Paginated via limit/offset so a 1000+ series library loads
        incrementally.
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter to one staging status.
          schema:
            type: string
            enum: [pending, imported, skipped]
        - name: limit
          in: query
          required: false
          description: Page size (default 50, capped at 200).
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          required: false
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: The staged entries matching the filter, paginated.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoundSeries"
        "400":
          description: Unknown status value, or an invalid pagination value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/imports/match:
    get:
      operationId: matchImport
      summary: Search Suwayomi sources for a staged entry's title
      description: |
        Searches every Suwayomi source for the staged entry's title and
        returns the grouped candidates, so the owner can pick one to pass as
        `match` on the subsequent import call. `path` is a REQUIRED query
        param (a filesystem path, never a URL path segment).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: path
          in: query
          required: true
          description: The staged entry's on-disk path (as returned by scan/list).
          schema:
            type: string
        - name: sources
          in: query
          required: false
          description: |
            Comma-separated list of source IDs to restrict the search to.
            Unknown IDs are silently dropped by the service.
          schema:
            type: string
      responses:
        "200":
          description: Cross-source search results, grouped by title similarity.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchGroup"
        "400":
          description: Missing or empty path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/imports/skip:
    post:
      operationId: skipImport
      summary: Skip a staged library-import entry
      description: |
        Marks a staged entry as "skipped" — the owner's "leave this on disk,
        don't import it" action. Purely a status flip: no disk I/O, no row
        deletion. Idempotent (skipping an already-skipped entry is a no-op
        success).
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkipRequest"
      responses:
        "204":
          description: Entry marked skipped.
        "400":
          description: Missing or empty path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No staged entry with that path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/import:
    post:
      operationId: importSeries
      summary: Import a staged entry without re-downloading
      description: |
        Registers a staged entry's on-disk chapters as already downloaded (no
        re-download), optionally attaching an owner-matched Suwayomi source
        via `match`, and marks the entry imported. Idempotent: re-importing
        the same path re-runs the reconcile without creating a duplicate
        series. Returns the imported series detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRequest"
      responses:
        "200":
          description: Entry imported. Returns the imported series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Missing path, or an invalid/incomplete match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No staged entry with that path, or no such Suwayomi source/manga.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The matched source is already attached to this series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/import/batch:
    post:
      operationId: importBatch
      summary: Bulk disk-only import of many staged entries
      description: |
        Disk-only imports every path in `paths` (mirrors POST
        /api/library/import with no `match`) — a single request for a
        1000+ series migration instead of N sequential calls. Partial
        success by design: a bad path (e.g. never staged by a prior scan) is
        recorded in the response's `failed` list and never aborts the rest
        of the batch. Always 200 for a well-formed request — the per-path
        failures ARE the result, not a top-level error.
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchImportRequest"
      responses:
        "200":
          description: Batch processed. See `imported`/`failed` for the per-path outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportResult"
        "400":
          description: Empty paths list, or more than 500 paths in one request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/settings:
    get:
      operationId: listSettings
      summary: List runtime-tunable settings
      description: |
        Returns the closed allowlist of runtime-tunable settings, each with its
        current resolved value (DB override if set, else the env-config default),
        the default, and type + unit metadata for the UI. Structural settings
        (storage, DB, auth, Suwayomi) are env-only and not listed here.
      tags:
        - settings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The tunable allowlist in stable order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSettings
      summary: Update runtime-tunable settings
      description: |
        Applies a batch of key/value updates to the runtime tunables, all-or-nothing:
        an unknown key (outside the allowlist) or an out-of-bounds value rejects the
        whole batch with 400 naming the offending key — no partial write lands. A
        change takes effect on the next cycle without a restart (read-at-use). Returns
        the updated settings list so the caller sees the persisted values without a
        refetch (§16).
      tags:
        - settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdateRequest"
      responses:
        "200":
          description: Settings updated. Returns the full updated settings list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
        "400":
          description: An unknown key, an out-of-bounds value, or an empty batch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/metrics:
    get:
      operationId: listSourceMetrics
      summary: List per-source search-performance metrics
      description: |
        Returns every source's rolling search-performance snapshot (slowest first),
        each with a derived "isSlow" flag computed against the current slow
        threshold. Backs the source-metrics screen and the anti-bot warm-up
        decision (which sources are cold/slow).
      tags:
        - sources
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The per-source metrics, sorted by EWMA latency descending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceMetric"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/warmup:
    post:
      operationId: warmupSources
      summary: Trigger an anti-bot session warm-up pass
      description: |
        Kicks off a full warm-up pass over every enabled source (a cheap Browse
        call that refreshes each source's cached anti-bot challenge clearance), so
        interactive search stays fast. The pass warms sources SERIALLY and — with
        slow anti-bot sources — runs for MINUTES, so it runs on a detached,
        time-bounded background goroutine: this endpoint returns 202 immediately
        with {started:true} and never blocks on the pass. Per-source progress and
        failures surface in GET /api/sources/metrics (lastWarmedAt / lastError),
        not in this response.
      tags:
        - sources
      security:
        - BearerAuth: []
      responses:
        "202":
          description: The warm-up pass was accepted and is running in the background.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceWarmStarted"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/system:
    get:
      operationId: getSystem
      summary: Read-only env-structural system information
      description: |
        Returns credential-free structural configuration values for the Settings
        → Library pane's System-info card. Structural settings (storage path,
        server port, database host:port/name) are env-only and not runtime-tunable.
        Password and username are intentionally excluded from the database field.
      tags:
        - settings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Credential-free structural configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/System"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/settings:
    get:
      operationId: getSuwayomiSettings
      summary: Read Suwayomi FlareSolverr/SOCKS settings
      description: |
        Returns the FlareSolverr (Cloudflare-bypass) + SOCKS-proxy subset of the
        active Suwayomi's server-global settings. A pure passthrough — Tsundoku
        stores none of these values. An upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The current FlareSolverr + SOCKS settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuwayomiSettings"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSuwayomiSettings
      summary: Update Suwayomi FlareSolverr/SOCKS settings
      description: |
        Applies a PARTIAL update of the FlareSolverr + SOCKS subset: only the
        provided fields are sent to Suwayomi, so no unset setting is clobbered.
        The settings are RE-READ after the write and returned so the caller sees
        the persisted values without a refetch (§16). A validation failure
        (bad SOCKS version/port, malformed URL, empty body) is a 400; an upstream
        Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuwayomiSettingsUpdate"
      responses:
        "200":
          description: Settings updated. Returns the refreshed FlareSolverr + SOCKS settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuwayomiSettings"
        "400":
          description: A validation failure (bad SOCKS version/port, malformed URL, or empty body).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions:
    get:
      operationId: listExtensions
      summary: List Suwayomi extensions
      description: |
        Returns every Suwayomi extension (installed + available). A pure
        passthrough — Tsundoku stores none of this. An upstream Suwayomi failure
        is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The full extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/refresh:
    post:
      operationId: refreshExtensions
      summary: Refresh available extensions from repos
      description: |
        Re-fetches the available-extensions list from the configured repos
        ("check for updates") and returns the refreshed list. An upstream
        Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/repos:
    get:
      operationId: getExtensionRepos
      summary: Read extension repo URLs
      description: Returns the configured extension repo URL list.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The configured repo URL list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionRepos"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: setExtensionRepos
      summary: Replace extension repo URLs
      description: |
        REPLACES the extension repo URL list (replace, not merge). An empty array
        clears all repos. Each entry must be an absolute http(s) URL. The list is
        RE-READ after the write and returned (§16). A validation failure is a 400;
        an upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtensionReposUpdate"
      responses:
        "200":
          description: Repos replaced. Returns the refreshed repo URL list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionRepos"
        "400":
          description: A validation failure (missing/null repos, blank or non-absolute URL).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}/install:
    post:
      operationId: installExtension
      summary: Install an extension
      description: |
        Installs the extension identified by pkgName, then RE-READS and returns
        the full extension list so the caller observes the post-mutation state
        (§16). A blank pkgName is a 400; an upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: Installed. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}/update:
    post:
      operationId: updateExtension
      summary: Update an extension
      description: |
        Updates the installed extension identified by pkgName, then RE-READS and
        returns the full extension list (§16). A blank pkgName is a 400; an
        upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: Updated. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}:
    delete:
      operationId: uninstallExtension
      summary: Uninstall an extension
      description: |
        Uninstalls the extension identified by pkgName, then RE-READS and returns
        the full extension list (§16) — the uninstalled entry may drop out. A
        blank pkgName is a 400; an upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: Uninstalled. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/extensions/{pkgName}/icon:
    get:
      operationId: getExtensionIcon
      summary: Extension icon image
      description: |
        Streams the extension's icon image, proxied from Suwayomi. Suwayomi's own
        iconUrl is a cross-origin URL the browser cannot load directly, so this
        endpoint looks the extension up by pkgName among Extensions() and streams
        that entry's own reported icon (Suwayomi's REST icon path, confirmed live:
        "/api/v1/extension/icon/{apkFileName}") as a binary blob. Returns 404 when
        pkgName is unknown, 502 when Suwayomi fails to fetch the icon.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: The icon image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No extension with that pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable, returned a GraphQL error, or failed to fetch the icon.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/sources/{sourceId}/enabled:
    patch:
      operationId: setSourceEnabled
      summary: Toggle a source's per-language enable/disable state
      description: |
        Writes the CLIENT-CONVENTION enable/disable flag for one source (Suwayomi
        has no server-side "disabled source" concept — the flag lives in a
        per-source metadata key). Disabling hides the source from Tsundoku's
        Discover/Search/Browse source lists but does NOT stop refreshing a series
        already adopted from it, and does NOT delete the flag on re-enable.
        Applies the write then RE-READS the authoritative state (§16 round-trip).
        A blank sourceId or a missing `enabled` field is a 400; a sourceId absent
        from the post-write re-read is a 404; any upstream Suwayomi failure
        (the write or the re-read) is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: The Suwayomi source id.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSourceEnabledRequest"
      responses:
        "200":
          description: The authoritative enable/disable state after the write.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceEnabled"
        "400":
          description: A blank sourceId, invalid JSON body, or a missing `enabled` field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The source was absent from the post-write re-read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/extensions/{pkgName}/preferences:
    get:
      operationId: getExtensionPreferences
      summary: List an extension's per-source preferences
      description: |
        Resolves the extension's sources (one per language) and returns each
        source's configurable preferences, grouped by source. A pure passthrough —
        Tsundoku stores none of this. Preferences are POSITION-indexed for writes;
        the FE must use a fresh read's positions and never cache them. A blank
        pkgName is a 400; any upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: The extension's preferences grouped by source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcePreferencesBySource"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: setExtensionPreference
      summary: Write one source preference by position
      description: |
        Writes a single preference (identified by sourceId + position) and returns
        the FULL refreshed preference list for that source (§16 round-trip — the FE
        re-derives fresh positions from it). value's JSON type must match the
        variant at that position (boolean → CheckBox/Switch, string → List/EditText,
        array → MultiSelectList); a mismatch or an out-of-range position is a 400.
        Any upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSourcePreferenceRequest"
      responses:
        "200":
          description: The refreshed preference list for the written source.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourcePreference"
        "400":
          description: A validation failure (blank sourceId, missing/negative or out-of-range position, or a value whose type doesn't match the variant).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers:
    get:
      operationId: listTrackers
      summary: List tracker connect status
      description: |
        Returns every registered native tracker (AniList, MAL, Kitsu,
        MangaUpdates) with its connect status. A disabled/unconfigured OAuth
        tracker (blank client-id) is still listed, with isLoggedIn=false —
        never omitted. This endpoint does NOT build an authorize URL (see
        GET /api/trackers/{id}/auth-url) — it only reads connect state, so
        it never stashes a pending OAuth login.
      tags:
        - trackers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Every registered tracker's connect status.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tracker"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/auth-url:
    get:
      operationId: getTrackerAuthURL
      summary: Build a fresh OAuth authorize URL
      description: |
        Builds a FRESH authorize URL on demand: generates a random state and
        stashes any PKCE verifier (MAL) server-side, keyed to that state.
        Kept separate from GET /api/trackers so a plain status list never
        stashes a pending login the owner does not complete. Fails closed
        (400) when the tracker doesn't support OAuth, its app client-id
        isn't configured, or this instance's public URL isn't configured yet
        (spec/trackers-oauth-phase3 §2 — the whole subsystem is dormant
        until activated).
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
      responses:
        "200":
          description: A fresh authorize URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackerAuthURL"
        "400":
          description: This tracker doesn't support OAuth, its client-id isn't configured, or the instance public URL isn't configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/login/oauth:
    post:
      operationId: loginTrackerOAuth
      summary: Complete an OAuth login callback
      description: |
        Finishes the OAuth round-trip the authorize URL started: exchanges
        the callback's code (MAL) or access_token (AniList) for a token,
        best-effort captures the account's username/score-format, and
        upserts the result into this tracker's connection. Returns the
        refreshed Tracker (§16 round-trip).
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthLoginRequest"
      responses:
        "200":
          description: Login completed. Returns the refreshed tracker connect status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tracker"
        "400":
          description: Missing callbackUrl, or an invalid/expired/missing login state, code, or access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker's token exchange failed (network or upstream rejection).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/login/credentials:
    post:
      operationId: loginTrackerCredentials
      summary: Direct username/password tracker login
      description: |
        A direct username/password (Kitsu password grant) or session
        (MangaUpdates) login for a credential-based tracker. Returns the
        refreshed Tracker (§16 round-trip). The password is never logged or
        echoed back.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialLoginRequest"
      responses:
        "200":
          description: Login completed. Returns the refreshed tracker connect status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tracker"
        "400":
          description: Missing username/password, or this tracker connects via OAuth (not credentials).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The credential login failed (network or bad credentials rejected upstream).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/logout:
    post:
      operationId: logoutTracker
      summary: Disconnect a tracker account
      description: |
        Deletes this tracker's connected account, discarding its stored
        token. Idempotent — logging out an already-disconnected tracker is
        still a 204.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
      responses:
        "204":
          description: Logged out (or already disconnected).
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/search:
    get:
      operationId: searchTracker
      summary: Authed tracker search
      description: |
        Searches trackerId's manga catalog using the connected account's
        token — the candidate list an owner picks from when binding a
        series.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
        - name: q
          in: query
          required: true
          description: Free-text search query.
          schema:
            type: string
      responses:
        "200":
          description: Search hits.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackSearchResult"
        "400":
          description: Missing/blank q, or the tracker has no connected account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker search failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking:
    get:
      operationId: listSeriesTracking
      summary: List a series' tracker bindings
      description: Returns every tracker binding for the series.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The series' tracker bindings.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackBinding"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createSeriesTracking
      summary: Bind a series to a tracker entry
      description: |
        Binds the series to trackerId's remoteId entry, registering a fresh
        entry on the tracker's own account when it isn't already tracked
        there. Re-binding an already-bound tracker re-points it to the new
        remoteId. Returns the created/updated TrackBinding.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindRequest"
      responses:
        "201":
          description: The bound TrackBinding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackBinding"
        "400":
          description: Missing trackerId/remoteId, or the tracker has no connected account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id, or unknown trackerId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker fetch/create-entry call failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking/{recordId}:
    delete:
      operationId: deleteSeriesTracking
      summary: Unbind a series' tracker entry
      description: |
        Removes the binding. When deleteRemote=true the remote entry is ALSO
        deleted from the tracker's own account first — a partial unbind
        never leaves the local row deleted while a failed remote deletion
        hides a still-live remote entry.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          description: TrackBinding UUID.
          schema:
            type: string
            format: uuid
        - name: deleteRemote
          in: query
          required: false
          description: Whether to also delete the entry from the tracker's own account. Defaults to false.
          schema:
            type: boolean
      responses:
        "204":
          description: Unbound.
        "400":
          description: Malformed id, or deleteRemote is present but not true/false.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No binding with the given recordId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: deleteRemote=true and the remote deletion failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking/{recordId}/refresh:
    post:
      operationId: refreshSeriesTracking
      summary: Re-pull a binding's remote entry
      description: |
        Re-pulls the binding's remote entry from the tracker's own account
        and writes the fresh status/progress/score/dates. When the remote
        entry has since vanished from the account's list, the existing row
        is returned UNCHANGED rather than zeroed.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          description: TrackBinding UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The refreshed TrackBinding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackBinding"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No binding with the given recordId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker fetch-entry call failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking/{recordId}/update:
    post:
      operationId: updateSeriesTracking
      summary: Owner's manual tracking-sheet edit
      description: |
        Applies the owner's manual edit (spec/trackers-sync-phase4 §2
        trigger (c)) to recordId's binding: every patched field is pushed to
        the tracker's own account in one call, then persisted locally.
        Unlike the reading-triggered push/sync paths, a failure here IS
        returned to the caller — the owner explicitly asked for this edit.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          description: TrackBinding UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrackRequest"
      responses:
        "200":
          description: The updated TrackBinding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackBinding"
        "400":
          description: Missing/invalid request body, or the binding's tracker is not connected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No binding with the given recordId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker update-entry call failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking/sync:
    post:
      operationId: syncSeriesTracking
      summary: Pull + converge every tracker binding for a series
      description: |
        Pulls every one of the series' TrackBinding entries from its
        tracker's own account and converges local↔remote per the umbrella
        spec §6 "conflict = MAX wins BOTH directions" rule. One binding's own
        sync failure is logged and that binding's pre-sync row is kept
        unchanged — it never aborts syncing the series' other bindings. An
        unknown series id is not an error: zero bindings are found and an
        empty list is returned.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The series' refreshed binding set.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackBinding"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
