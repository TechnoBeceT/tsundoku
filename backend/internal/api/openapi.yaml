  /api/sources/{sourceId}/cover:
    get:
      operationId: getSourceCover
      summary: Source-manga cover proxy
      description: |
        Streams a source-manga cover image, re-fetched through the engine host
        (mirrors getProviderCover's coverproxy.StreamEngine primitive).
        Discover/Search cards otherwise point an <img> straight at the raw
        thumbnailUrl, which a Cloudflare/hotlink-protected source rejects with
        a 403 to a plain browser request; the engine host's outbound HTTP
        client already carries that source's cf_clearance. Returns 502 when
        the engine fetch fails.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Engine-host source ID, stringified decimal int64.
          schema:
            type: string
        - name: url
          in: query
          required: true
          description: The raw cover/thumbnail URL to re-fetch (as returned by Search/Browse's SearchCandidate.thumbnailUrl).
          schema:
            type: string
      responses:
        "200":
          description: The cover image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: Malformed sourceId, or missing/blank url.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The engine host failed to fetch the cover image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/enabled:
    patch:
      operationId: setSourceEnabled
      summary: Enable or disable a source (per-language toggle)
      description: |
        Sets a source's TSUNDOKU-SIDE enable/disable state (the Configure
        dialog's per-language Switch). Disabling hides the source from the
        Discover/Search/Browse pickers so it is not offered for new
        adopts/searches; it does NOT stop refreshing a series already adopted
        from it, and it is NEVER pushed to the engine (a Tsundoku-only UI
        flag). Applies the write then re-reads the authoritative state.
      tags:
        - extensions
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Engine-host source ID, stringified decimal int64.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceEnabledUpdate"
      responses:
        "200":
          description: The authoritative post-write enable/disable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceEnabled"
        "400":
          description: Malformed sourceId, or a missing `enabled` field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The disabled-source store read/write failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/ignore-scanlator:
    patch:
      operationId: setSourceIgnoreScanlator
      summary: Flag or unflag a source as ignore-scanlator
      description: |
        Sets a source's TSUNDOKU-SIDE ignore-scanlator flag (the Configure
        dialog's per-source toggle). Flagging ON collapses the source's
        per-uploader providers into one [Source] provider on FUTURE adopts (an
        uploader-in-scanlator source, e.g. Hive Scans). APPLY-FORWARD ONLY: it
        never migrates an already-adopted per-uploader series or its files, and
        is NEVER pushed to the engine (a Tsundoku-only interpretation flag).
        Applies the write then re-reads the authoritative state.
      tags:
        - extensions
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Engine-host source ID, stringified decimal int64.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceIgnoreScanlatorUpdate"
      responses:
        "200":
          description: The authoritative post-write ignore-scanlator state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceIgnoreScanlator"
        "400":
          description: Malformed sourceId, or a missing `ignoreScanlator` field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The ignore-scanlator store read/write failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/health:
    get:
      operationId: getLibraryHealth
      summary: Library source-health scan
      description: Returns every series that has at least one stale, erroring, or unavailable source.
      tags:
        - series
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The sick series and their sick sources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryHealth"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/fractionals:
    get:
      operationId: getLibraryFractionals
      summary: Library-wide list of series with downloaded fractional chapters
      description: |
        Returns every series that has at least one DOWNLOADED fractional chapter,
        regardless of ignore state, so the owner can set the ignore-fractional
        policy and clean the leftover files from one place. Each row carries the
        fractional vs removable counts and the whole-series ignore-policy state.
        Sorted most-actionable first (removableCount desc, fractionalCount desc,
        title). It deletes nothing.
      tags:
        - library
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The series with downloaded fractionals (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryFractionals"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/downloads:
    get:
      operationId: listDownloads
      summary: Cross-library chapter activity by state
      description: |
        Returns a paginated list of chapters across the whole library filtered by
        download state, each enriched with its series display title + cover and the
        resolved chapter name + provider. The `state` parameter is a REQUIRED
        comma-separated list of raw chapter states (multiple values = OR); the FE
        composes the Active / Failed / Queued views from these raw states.
      tags:
        - downloads
      security:
        - BearerAuth: []
      parameters:
        - name: state
          in: query
          required: true
          description: Comma-separated chapter states to include (OR-matched). Required.
          schema:
            type: string
          example: failed,permanently_failed
        - name: limit
          in: query
          required: false
          description: Page size (default 50, capped at 200).
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          required: false
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
        - name: q
          in: query
          required: false
          description: Free-text filter on the series title (case-insensitive contains).
          schema:
            type: string
      responses:
        "200":
          description: A page of enriched chapters plus the total matching count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadList"
        "400":
          description: Missing/empty or unknown state, or an invalid pagination value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/downloads/retry-all:
    post:
      operationId: retryAllDownloads
      summary: Bulk-reset failed chapters to wanted
      description: |
        Resets every chapter in the given retryable states back to wanted (clearing
        last_error, error_category, retries and next_attempt_at) so the next download
        cycle re-attempts them. `state` defaults to failed + permanently_failed when
        omitted; supplying a non-retryable state is rejected. Optionally scoped to one
        series. Returns the number of chapters reset. On success this also triggers an
        immediate download cycle (the same coalescing trigger as POST
        /api/downloads/run) so the reset chapters do not wait for the next timer tick.
      tags:
        - downloads
      security:
        - BearerAuth: []
      parameters:
        - name: state
          in: query
          required: false
          description: Comma-separated retryable states to reset (default failed,permanently_failed). A non-retryable state is rejected.
          schema:
            type: string
          example: permanently_failed
        - name: series_id
          in: query
          required: false
          description: Restrict the reset to a single series.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The number of chapters reset to wanted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryAllResult"
        "400":
          description: A non-retryable or unknown state, or an invalid series_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chapters/{id}/retry:
    post:
      operationId: retryChapter
      summary: Reset one failed chapter to wanted
      description: |
        Resets a single failed or permanently_failed chapter back to wanted so the
        next download cycle re-attempts it, clearing the failure bookkeeping
        (last_error, error_category, retries, next_attempt_at). This is a state reset,
        never a delete (the never-auto-delete invariant holds — a failed chapter has no
        downloaded file). Returns 409 when the chapter is not in a retryable state. On
        success this also triggers an immediate download cycle (the same coalescing
        trigger as POST /api/downloads/run) so the chapter does not wait for the next
        timer tick.
      tags:
        - downloads
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Chapter UUID.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Chapter reset to wanted.
        "400":
          description: Malformed chapter id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No chapter with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Chapter is not in a retryable state (only failed/permanently_failed may be retried).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chapters/{id}/progress:
    patch:
      operationId: setChapterProgress
      summary: Set chapter reading progress
      description: |
        Records the in-app reader's progress for one chapter: the last page the
        owner viewed and whether the chapter is fully read. `readAt` is stamped to
        the current time when `read` is true and cleared when false. Progress is
        pure owner UI state — it has no disk/sidecar effect and never influences
        downloads. Returns the updated progress subset.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Chapter UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterProgressUpdate"
      responses:
        "200":
          description: Updated reading progress.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterProgress"
        "400":
          description: Malformed chapter id or invalid body (negative lastReadPage, missing field).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No chapter with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/chapters/{chapterId}/pages/{n}:
    get:
      operationId: getChapterPage
      summary: Stream one CBZ page image (in-app reader)
      description: |
        Streams the raw bytes of the n-th page (0-based, natural page order) of a
        downloaded chapter's CBZ as an image blob, for the in-app long-strip
        reader. The chapter must belong to the series.

        `v` is an optional content-version cache buster (the chapter's
        `pageVersion`, see the `Chapter` schema): a request whose `v` matches the
        chapter's CURRENT version gets `Cache-Control: private, max-age=86400`;
        an absent or stale `v` gets `Cache-Control: private, no-cache`. `v` never
        changes which bytes are served — it only selects the caching policy. The
        response also carries an `ETag` (identifying this exact page + version),
        so a repeat `If-None-Match` request answers 304 without the server
        opening the CBZ. Deliberately NOT `immutable`: the version is derived
        from DB fields (filename + download_date), not a hash of the bytes, so a
        bounded cache lets a drifted version self-heal within a day instead of
        pinning stale pages forever.

        Returns 404 when the chapter, its CBZ, or the requested page index does
        not exist, and 502 when the archive is present but cannot be decoded.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: chapterId
          in: path
          required: true
          description: Chapter UUID (must belong to the series).
          schema:
            type: string
            format: uuid
        - name: n
          in: path
          required: true
          description: 0-based page index in natural page order.
          schema:
            type: integer
            minimum: 0
        - name: v
          in: query
          required: false
          description: |
            Content-version cache buster (the chapter's `pageVersion`). When it
            matches the chapter's current version the response is cached for a
            day; otherwise it is revalidatable only. Never affects which bytes
            are served.
          schema:
            type: string
      responses:
        "200":
          description: Page image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: Malformed series/chapter id or non-integer page index.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown chapter/series, missing CBZ, or page index out of range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The CBZ exists but a page could not be decoded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/downloads/run:
    post:
      operationId: runDownloads
      summary: Trigger an immediate download cycle ("Download now")
      description: |
        Starts a download cycle immediately instead of waiting for the next
        `jobs.download_interval` timer tick — the manual counterpart to the
        automatic triggers already fired by Adopt, provider re-rank, and the
        retry endpoints. The underlying trigger is non-blocking and cap-1
        coalescing, so repeated calls (e.g. a double-click) collapse into at
        most one extra cycle. This does NOT bypass the per-source circuit
        breaker or backoff — a cooled-down/blocked source's chapters still wait
        out their cooldown; it only starts the cycle sooner. Returns 202
        immediately; the cycle itself runs in the background (progress is
        visible via the existing cycle.start/cycle.done/download.* SSE stream).
      tags:
        - downloads
      security:
        - BearerAuth: []
      responses:
        "202":
          description: The download cycle was accepted and is starting in the background.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDownloadsResult"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/scan:
    post:
      operationId: scanLibrary
      summary: Launch an async scan of on-disk storage for importable series
      description: |
        Launches a background walk of the storage root that upserts one
        staging row per on-disk series (never downgrading an already-imported
        row). Use this to discover series that exist on disk but are not yet
        tracked in the DB (e.g. after a Kaizoku.GO migration).

        The scan runs asynchronously and streams progress over the
        `/api/progress` SSE stream as `scan.start` (fired once, when the walk
        begins), `scan.progress` (fired after each series is staged, carrying
        `processed`/`total`/`path`), and `scan.done` (fired once, carrying the
        final `total`/`found`, or `error` if the walk itself failed) — this
        avoids blocking the request for a 1000+ series NFS walk, which could
        otherwise trip a gateway timeout (e.g. a Cloudflare Tunnel's edge
        limit). Only one scan may run at a time; see the 409 response.
      tags:
        - library
      security:
        - BearerAuth: []
      responses:
        "202":
          description: The scan was launched; watch /api/progress for scan.* events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStarted"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A scan is already in flight (single-flight guard).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStarted"

  /api/library/prefs:
    get:
      operationId: getLibraryPrefs
      summary: Get the owner's library-list view preferences
      description: |
        Returns the persisted library-list view state — sort field, direction,
        and the active toggle-filters (downloaded / unread / completed /
        needs-source). A single-owner server-side preference so the chosen sort
        + filters survive a refresh/restart and are shared cross-device. When
        nothing has been saved yet, the defaults (title / asc / no filters) are
        returned.
      tags:
        - library
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The current (or default) library preferences.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryPrefs"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: setLibraryPrefs
      summary: Replace the owner's library-list view preferences
      description: |
        Persists the library-list view state. The frontend saves this
        best-effort (debounced) whenever the owner changes the sort or a filter,
        so a failure here never blocks the UI. An unknown sortKey or a direction
        other than asc/desc is rejected with 400 (fail-closed — nothing is
        written). Returns the stored value (round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryPrefs"
      responses:
        "200":
          description: The stored library preferences.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryPrefs"
        "400":
          description: Unknown sortKey or invalid direction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/dedup-providers:
    post:
      operationId: dedupAllProviders
      summary: Merge drifted duplicate sources across the whole library (fire-and-forget)
      description: |
        Runs the per-series provider dedup across every series, folding
        already-drifted disk/live source pairs into one row without
        re-downloading. Returns 202 immediately; the sweep runs in the
        background and per-series results appear as each series is next viewed.
      tags:
        - library
      security:
        - BearerAuth: []
      responses:
        "202":
          description: Dedup sweep started in the background.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryDedupStarted"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/imports:
    get:
      operationId: listImports
      summary: List staged library-import entries
      description: |
        Returns a page of the staged entries from a prior scan, optionally
        filtered by status and/or a case-insensitive title search. An
        empty/absent status returns every staging status; an empty/absent q
        applies no title filter. The q filter is applied by the backend across
        the full staged set (not just the loaded page), so it finds a series
        anywhere in a 1000+ entry migration, and composes with status.
        Paginated via limit/offset so a large library loads incrementally.
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter to one staging status.
          schema:
            type: string
            enum: [pending, imported, skipped]
        - name: q
          in: query
          required: false
          description: >-
            Case-insensitive title substring filter (ILIKE %q%). Empty/absent
            applies no title filter.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Page size (default 50, capped at 200).
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          required: false
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: The staged entries matching the filter, paginated.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoundSeries"
        "400":
          description: Unknown status value, or an invalid pagination value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/imports/match:
    get:
      operationId: matchImport
      summary: Search Suwayomi sources for a staged entry's title
      description: |
        Searches every Suwayomi source for the staged entry's title and
        returns the grouped candidates, so the owner can pick one to pass as
        `match` on the subsequent import call. `path` is a REQUIRED query
        param (a filesystem path, never a URL path segment).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: path
          in: query
          required: true
          description: The staged entry's on-disk path (as returned by scan/list).
          schema:
            type: string
        - name: sources
          in: query
          required: false
          description: |
            Comma-separated list of source IDs to restrict the search to.
            Unknown IDs are silently dropped by the service.
          schema:
            type: string
      responses:
        "200":
          description: Cross-source search results, grouped by title similarity.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchGroup"
        "400":
          description: Missing or empty path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/imports/skip:
    post:
      operationId: skipImport
      summary: Skip a staged library-import entry
      description: |
        Marks a staged entry as "skipped" — the owner's "leave this on disk,
        don't import it" action. Purely a status flip: no disk I/O, no row
        deletion. Idempotent (skipping an already-skipped entry is a no-op
        success).
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkipRequest"
      responses:
        "204":
          description: Entry marked skipped.
        "400":
          description: Missing or empty path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No staged entry with that path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/import:
    post:
      operationId: importSeries
      summary: Import a staged entry without re-downloading
      description: |
        Registers a staged entry's on-disk chapters as already downloaded (no
        re-download), optionally attaching an owner-matched Suwayomi source
        via `match`, and marks the entry imported. Idempotent: re-importing
        the same path re-runs the reconcile without creating a duplicate
        series. Returns the imported series detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRequest"
      responses:
        "200":
          description: Entry imported. Returns the imported series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Missing path, or an invalid/incomplete match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No staged entry with that path, or no such Suwayomi source/manga.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The matched source is already attached to this series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/import/batch:
    post:
      operationId: importBatch
      summary: Bulk disk-only import of many staged entries
      description: |
        Disk-only imports every path in `paths` (mirrors POST
        /api/library/import with no `match`) — a single request for a
        1000+ series migration instead of N sequential calls. Partial
        success by design: a bad path (e.g. never staged by a prior scan) is
        recorded in the response's `failed` list and never aborts the rest
        of the batch. Always 200 for a well-formed request — the per-path
        failures ARE the result, not a top-level error.
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchImportRequest"
      responses:
        "200":
          description: Batch processed. See `imported`/`failed` for the per-path outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportResult"
        "400":
          description: Empty paths list, or more than 500 paths in one request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/settings:
    get:
      operationId: listSettings
      summary: List runtime-tunable settings
      description: |
        Returns the closed allowlist of runtime-tunable settings, each with its
        current resolved value (DB override if set, else the env-config default),
        the default, and type + unit metadata for the UI. Structural settings
        (storage, DB, auth, Suwayomi) are env-only and not listed here.
      tags:
        - settings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The tunable allowlist in stable order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSettings
      summary: Update runtime-tunable settings
      description: |
        Applies a batch of key/value updates to the runtime tunables, all-or-nothing:
        an unknown key (outside the allowlist) or an out-of-bounds value rejects the
        whole batch with 400 naming the offending key — no partial write lands. A
        change takes effect on the next cycle without a restart (read-at-use). Returns
        the updated settings list so the caller sees the persisted values without a
        refetch (§16).
      tags:
        - settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdateRequest"
      responses:
        "200":
          description: Settings updated. Returns the full updated settings list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
        "400":
          description: An unknown key, an out-of-bounds value, or an empty batch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/metrics:
    get:
      operationId: listSourceMetrics
      summary: List per-source search-performance metrics
      description: |
        Returns every source's rolling search-performance snapshot (slowest first),
        each with a derived "isSlow" flag computed against the current slow
        threshold. Backs the source-metrics screen and the anti-bot warm-up
        decision (which sources are cold/slow).
      tags:
        - sources
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The per-source metrics, sorted by EWMA latency descending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceMetric"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/warmup:
    post:
      operationId: warmupSources
      summary: Trigger an anti-bot session warm-up pass
      description: |
        Kicks off a full warm-up pass over every enabled source (a cheap Browse
        call that refreshes each source's cached anti-bot challenge clearance), so
        interactive search stays fast. The pass warms sources SERIALLY and — with
        slow anti-bot sources — runs for MINUTES, so it runs on a detached,
        time-bounded background goroutine: this endpoint returns 202 immediately
        with {started:true} and never blocks on the pass. Per-source progress and
        failures surface in GET /api/sources/metrics (lastWarmedAt / lastError),
        not in this response.
      tags:
        - sources
      security:
        - BearerAuth: []
      responses:
        "202":
          description: The warm-up pass was accepted and is running in the background.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceWarmStarted"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/reset-breaker:
    post:
      operationId: resetSourceBreaker
      summary: Reset a source's anti-bot circuit-breaker
      description: |
        Clears a source's tripped circuit-breaker so it is immediately available
        again (consecutive_failures back to 0, no cooldown). This is a deliberate
        owner override of the anti-bot cooldown for ONE source — every other
        source's gating is untouched. Idempotent (a no-op when the source has no
        breaker row). Returns the refreshed breaker state (breaker absent once
        cleared).
      tags:
        - sources
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
          description: The Suwayomi source id whose breaker to reset.
      responses:
        "200":
          description: The breaker was reset; the refreshed state is returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceBreakerReset"
        "400":
          description: The sourceId is not a valid numeric id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No source with that id is loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The engine host could not be reached to resolve the source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/push/vapid-key:
    get:
      operationId: getVapidKey
      summary: Get the server's Web Push VAPID public key
      description: |
        Returns the server's VAPID public key so a browser can create a Web Push
        subscription (pushManager.subscribe applicationServerKey). Generated once
        at boot and stable thereafter.
      tags:
        - push
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The server VAPID public key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapidKey"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/push/subscriptions:
    post:
      operationId: subscribePush
      summary: Register this device's Web Push subscription
      description: |
        Upserts this device's Web Push subscription by endpoint (idempotent). The
        notifier fans new-chapter notifications to every stored subscription.
      tags:
        - push
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscriptionRequest"
      responses:
        "204":
          description: The subscription was stored.
        "400":
          description: Invalid subscription body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unsubscribePush
      summary: Remove this device's Web Push subscription
      description: |
        Removes this device's Web Push subscription by endpoint. Removing an
        unknown endpoint is a no-op (still 204).
      tags:
        - push
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushUnsubscribeRequest"
      responses:
        "204":
          description: The subscription was removed (or was already absent).
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/engine/topology-status:
    get:
      operationId: getEngineTopologyStatus
      summary: Read-only captured engine-topology status
      description: |
        Returns a read-only snapshot of how much of the engine topology Tsundoku
        has captured into its own durable store — harvested extension repos,
        extensions and how many have their .apk bytes cached for offline recovery,
        the library's live-source universe and how many sources have their
        preferences captured, and how many sources' preferences were read
        successfully vs. failed. Every number is computed from DB counts alone (no engine
        call), so a fresh install with nothing adopted is a valid all-zero 200,
        not an error. `gaps` carries human-readable notes naming what is still
        outstanding (empty when nothing is).
      tags:
        - engine
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The captured engine-topology status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineTopologyStatus"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/system:
    get:
      operationId: getSystem
      summary: Read-only env-structural system information
      description: |
        Returns credential-free structural configuration values for the Settings
        → Library pane's System-info card. Structural settings (storage path,
        server port, database host:port/name) are env-only and not runtime-tunable.
        Password and username are intentionally excluded from the database field.
      tags:
        - settings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Credential-free structural configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/System"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/flaresolverr/settings:
    get:
      operationId: getFlareSolverrSettings
      summary: Read Tsundoku-owned FlareSolverr settings
      description: |
        Returns Tsundoku's OWN FlareSolverr (Cloudflare-bypass) settings — a
        runtime setting on Tsundoku's settings overlay (QCAT-238), NOT read
        from the download engine and NOT an env var. Reuses the same shape as
        the retired Suwayomi settings-proxy's FlareSolverr group so a client
        can rebind from one endpoint to the other with no field changes.
      tags:
        - flaresolverr
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The current Tsundoku-owned FlareSolverr settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlareSolverrSettings"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFlareSolverrSettings
      summary: Update Tsundoku-owned FlareSolverr settings
      description: |
        Applies a PARTIAL update to Tsundoku's own FlareSolverr settings
        (only the provided fields change; an empty body is a 400). On
        success, the full resulting state is ALSO best-effort mirrored down
        to the engine host's own FlareSolverr config so its source-scraping
        stays in sync — an engine-down mirror failure is logged and NEVER
        fails this request, since the Tsundoku save already persisted. The
        settings are RE-READ after the write and returned so the caller sees
        the persisted values without a refetch (§16).
      tags:
        - flaresolverr
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlareSolverrUpdate"
      responses:
        "200":
          description: Settings updated (and best-effort mirrored to the engine host). Returns the refreshed FlareSolverr settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlareSolverrSettings"
        "400":
          description: A validation failure (malformed URL, out-of-bounds timeout/sessionTtl, or empty body).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/extensions:
    get:
      operationId: listExtensions
      summary: List Suwayomi extensions
      description: |
        Returns every Suwayomi extension (installed + available). A pure
        passthrough — Tsundoku stores none of this. An upstream Suwayomi failure
        is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The full extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/refresh:
    post:
      operationId: refreshExtensions
      summary: Refresh available extensions from repos
      description: |
        Re-fetches the available-extensions list from the configured repos
        ("check for updates") and returns the refreshed list. An upstream
        Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/repos:
    get:
      operationId: getExtensionRepos
      summary: Read extension repo URLs
      description: Returns the configured extension repo URL list.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The configured repo URL list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionRepos"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: setExtensionRepos
      summary: Replace extension repo URLs
      description: |
        REPLACES the extension repo URL list (replace, not merge). An empty array
        clears all repos. Each entry must be an absolute http(s) URL. The list is
        RE-READ after the write and returned (§16). A validation failure is a 400;
        an upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtensionReposUpdate"
      responses:
        "200":
          description: Repos replaced. Returns the refreshed repo URL list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionRepos"
        "400":
          description: A validation failure (missing/null repos, blank or non-absolute URL).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}/install:
    post:
      operationId: installExtension
      summary: Install an extension
      description: |
        Installs the extension identified by pkgName, then RE-READS and returns
        the full extension list so the caller observes the post-mutation state
        (§16). A blank pkgName is a 400; an upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: Installed. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}/update:
    post:
      operationId: updateExtension
      summary: Update an extension
      description: |
        Updates the installed extension identified by pkgName, then RE-READS and
        returns the full extension list (§16). A blank pkgName is a 400; an
        upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: Updated. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}/reinstall:
    post:
      operationId: reinstallExtension
      summary: Reinstall a held (older) extension version
      description: |
        Reinstalls a HELD (older) cached .apk version of the extension — the
        reversible-update rollback path. The version must be present in the
        extension's cachedVersions AND still on disk (else a 404). The engine
        host installs it from Tsundoku's own apk cache (no upstream re-download),
        then the durable store pins it as the installed version. RE-READS and
        returns the full extension list (§16). A missing/invalid versionCode is a
        400; an upstream engine failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtensionReinstallRequest"
      responses:
        "200":
          description: Reinstalled. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName or a missing/invalid versionCode.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No cached apk exists for that extension version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The engine host was unreachable or returned an error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}:
    delete:
      operationId: uninstallExtension
      summary: Uninstall an extension
      description: |
        Uninstalls the extension identified by pkgName, then RE-READS and returns
        the full extension list (§16) — the uninstalled entry may drop out. A
        blank pkgName is a 400; an upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: Uninstalled. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/extensions/{pkgName}/preferences:
    get:
      operationId: getExtensionPreferences
      summary: List an extension's per-source preferences
      description: |
        Resolves the extension's sources (one per language, embedded on the
        extension itself) and returns each source's configurable preferences,
        grouped by source. A pure passthrough — Tsundoku stores none of this.
        Preferences are KEY-addressed for writes (see the PATCH operation). A
        blank pkgName is a 400; an unknown pkgName is a 404; any upstream
        engine failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: The extension's preferences grouped by source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcePreferencesBySource"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No extension with that pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The engine host was unreachable or returned an error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: setExtensionPreference
      summary: Write one source preference by key
      description: |
        Writes a single preference (identified by sourceId + key) and returns
        the FULL refreshed preference list for that source (§16 round-trip).
        value's JSON type must match the variant at that key (boolean →
        CheckBox/Switch, string → List/EditText, array → MultiSelectList); a
        mismatch or an unknown key is a 400. Any upstream engine failure is a
        502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSourcePreferenceRequest"
      responses:
        "200":
          description: The refreshed preference list for the written source.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourcePreference"
        "400":
          description: A validation failure (blank/non-numeric sourceId, blank key, an unknown key, or a value whose type doesn't match the variant).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The engine host was unreachable or returned an error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers:
    get:
      operationId: listTrackers
      summary: List tracker connect status
      description: |
        Returns every registered native tracker (AniList, MAL, Kitsu,
        MangaUpdates) with its connect status. A disabled/unconfigured OAuth
        tracker (blank client-id) is still listed, with isLoggedIn=false —
        never omitted. This endpoint does NOT build an authorize URL (see
        GET /api/trackers/{id}/auth-url) — it only reads connect state, so
        it never stashes a pending OAuth login.
      tags:
        - trackers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Every registered tracker's connect status.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tracker"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/auth-url:
    get:
      operationId: getTrackerAuthURL
      summary: Build a fresh OAuth authorize URL
      description: |
        Builds a FRESH authorize URL on demand: generates a random state and
        stashes any PKCE verifier (MAL) server-side, keyed to that state.
        Kept separate from GET /api/trackers so a plain status list never
        stashes a pending login the owner does not complete. Fails closed
        (400) when the tracker doesn't support OAuth, its app client-id
        isn't configured, or this instance's public URL isn't configured yet
        (spec/trackers-oauth-phase3 §2 — the whole subsystem is dormant
        until activated).
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
      responses:
        "200":
          description: A fresh authorize URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackerAuthURL"
        "400":
          description: This tracker doesn't support OAuth, its client-id isn't configured, or the instance public URL isn't configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/login/oauth:
    post:
      operationId: loginTrackerOAuth
      summary: Complete an OAuth login callback
      description: |
        Finishes the OAuth round-trip the authorize URL started: exchanges
        the callback's code (MAL) or access_token (AniList) for a token,
        best-effort captures the account's username/score-format, and
        upserts the result into this tracker's connection. Returns the
        refreshed Tracker (§16 round-trip).
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthLoginRequest"
      responses:
        "200":
          description: Login completed. Returns the refreshed tracker connect status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tracker"
        "400":
          description: Missing callbackUrl, or an invalid/expired/missing login state, code, or access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker's token exchange failed (network or upstream rejection).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/login/credentials:
    post:
      operationId: loginTrackerCredentials
      summary: Direct username/password tracker login
      description: |
        A direct username/password (Kitsu password grant) or session
        (MangaUpdates) login for a credential-based tracker. Returns the
        refreshed Tracker (§16 round-trip). The password is never logged or
        echoed back.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialLoginRequest"
      responses:
        "200":
          description: Login completed. Returns the refreshed tracker connect status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tracker"
        "400":
          description: Missing username/password, or this tracker connects via OAuth (not credentials).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The credential login failed (network or bad credentials rejected upstream).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/logout:
    post:
      operationId: logoutTracker
      summary: Disconnect a tracker account
      description: |
        Deletes this tracker's connected account, discarding its stored
        token. Idempotent — logging out an already-disconnected tracker is
        still a 204.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
      responses:
        "204":
          description: Logged out (or already disconnected).
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trackers/{id}/search:
    get:
      operationId: searchTracker
      summary: Authed tracker search
      description: |
        Searches trackerId's manga catalog using the connected account's
        token — the candidate list an owner picks from when binding a
        series.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The tracker's numeric registry id.
          schema:
            type: integer
        - name: q
          in: query
          required: true
          description: Free-text search query.
          schema:
            type: string
      responses:
        "200":
          description: Search hits.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackSearchResult"
        "400":
          description: Missing/blank q, or the tracker has no connected account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tracker id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker search failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking:
    get:
      operationId: listSeriesTracking
      summary: List a series' tracker bindings
      description: Returns every tracker binding for the series.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The series' tracker bindings.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackBinding"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createSeriesTracking
      summary: Bind a series to a tracker entry
      description: |
        Binds the series to trackerId's remoteId entry, registering a fresh
        entry on the tracker's own account when it isn't already tracked
        there. Re-binding an already-bound tracker re-points it to the new
        remoteId. Returns the created/updated TrackBinding.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindRequest"
      responses:
        "201":
          description: The bound TrackBinding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackBinding"
        "400":
          description: Missing trackerId/remoteId, or the tracker has no connected account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id, or unknown trackerId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker fetch/create-entry call failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking/{recordId}:
    delete:
      operationId: deleteSeriesTracking
      summary: Unbind a series' tracker entry
      description: |
        Removes the binding. When deleteRemote=true the remote entry is ALSO
        deleted from the tracker's own account first — a partial unbind
        never leaves the local row deleted while a failed remote deletion
        hides a still-live remote entry.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          description: TrackBinding UUID.
          schema:
            type: string
            format: uuid
        - name: deleteRemote
          in: query
          required: false
          description: Whether to also delete the entry from the tracker's own account. Defaults to false.
          schema:
            type: boolean
      responses:
        "204":
          description: Unbound.
        "400":
          description: Malformed id, or deleteRemote is present but not true/false.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No binding with the given recordId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: deleteRemote=true and the remote deletion failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking/{recordId}/refresh:
    post:
      operationId: refreshSeriesTracking
      summary: Re-pull a binding's remote entry
      description: |
        Re-pulls the binding's remote entry from the tracker's own account
        and writes the fresh status/progress/score/dates. When the remote
        entry has since vanished from the account's list, the existing row
        is returned UNCHANGED rather than zeroed.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          description: TrackBinding UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The refreshed TrackBinding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackBinding"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No binding with the given recordId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker fetch-entry call failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking/{recordId}/update:
    post:
      operationId: updateSeriesTracking
      summary: Owner's manual tracking-sheet edit
      description: |
        Applies the owner's manual edit (spec/trackers-sync-phase4 §2
        trigger (c)) to recordId's binding: every patched field is pushed to
        the tracker's own account in one call, then persisted locally.
        Unlike the reading-triggered push/sync paths, a failure here IS
        returned to the caller — the owner explicitly asked for this edit.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          description: TrackBinding UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrackRequest"
      responses:
        "200":
          description: The updated TrackBinding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackBinding"
        "400":
          description: Missing/invalid request body, or the binding's tracker is not connected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No binding with the given recordId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The tracker update-entry call failed upstream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/tracking/sync:
    post:
      operationId: syncSeriesTracking
      summary: Pull + converge every tracker binding for a series
      description: |
        Pulls every one of the series' TrackBinding entries from its
        tracker's own account and converges local↔remote per the umbrella
        spec §6 "conflict = MAX wins BOTH directions" rule. One binding's own
        sync failure is logged and that binding's pre-sync row is kept
        unchanged — it never aborts syncing the series' other bindings. An
        unknown series id is not an error: zero bindings are found and an
        empty list is returned.
      tags:
        - trackers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The series' refreshed binding set.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackBinding"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/network/endpoints:
    get:
      operationId: listNetworkEndpoints
      summary: List network endpoints
      description: Returns every reusable SOCKS/FlareSolverr egress endpoint (passwords omitted), ordered by name.
      tags:
        - network
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The defined endpoints.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkEndpoint"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createNetworkEndpoint
      summary: Create a network endpoint
      description: Creates a reusable SOCKS or FlareSolverr endpoint and returns the persisted endpoint (password omitted).
      tags:
        - network
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkEndpointCreate"
      responses:
        "201":
          description: The created endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkEndpoint"
        "400":
          description: Invalid endpoint (unknown kind, blank name, or a bad SOCKS/FlareSolverr field).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/network/endpoints/{id}:
    patch:
      operationId: updateNetworkEndpoint
      summary: Update a network endpoint
      description: Partially updates an endpoint (omitted fields untouched; an omitted password is kept) and returns the persisted endpoint.
      tags:
        - network
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Endpoint UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkEndpointUpdate"
      responses:
        "200":
          description: The updated endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkEndpoint"
        "400":
          description: Invalid endpoint id or a bad merged field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No endpoint with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNetworkEndpoint
      summary: Delete a network endpoint
      description: Deletes an endpoint. Blocked with 409 when at least one binding still references it (the message lists the referencing source ids).
      tags:
        - network
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Endpoint UUID.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Endpoint deleted.
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No endpoint with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The endpoint is referenced by at least one binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/network/bindings:
    get:
      operationId: listNetworkBindings
      summary: List per-source network bindings
      description: Returns every per-source network binding (drives the assignment table). Unbound sources have no row and use the global default.
      tags:
        - network
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The per-source bindings.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceNetworkBinding"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/network/sources/{sourceId}/binding:
    put:
      operationId: setNetworkBinding
      summary: Assign a source's network route
      description: Upserts the source's binding (one binding per source) and returns the persisted binding.
      tags:
        - network
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Engine-host source ID, stringified decimal int64.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceNetworkBindingUpdate"
      responses:
        "200":
          description: The persisted binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceNetworkBinding"
        "400":
          description: Malformed sourceId/UUID, or an invalid binding (missing/kind-mismatched endpoint, inconsistent flareMode).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: clearNetworkBinding
      summary: Clear a source's network route
      description: Removes the source's binding, reverting it to the global default.
      tags:
        - network
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Engine-host source ID, stringified decimal int64.
          schema:
            type: string
      responses:
        "204":
          description: Binding cleared.
        "400":
          description: Malformed sourceId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The source had no binding to clear.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
