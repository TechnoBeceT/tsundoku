openapi: "3.1.0"

info:
  title: Tsundoku API
  version: "0.1.0"
  description: |
    Tsundoku backend API — single-owner manga tracker.
    Authentication: Bearer token obtained from /api/owner/claim or /api/owner/login.

servers:
  - url: /
    description: Same-origin server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT Bearer token issued by /api/owner/claim or /api/owner/login.

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Always "ok" when the server is healthy.
          example: ok

    ClaimRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Desired owner username.
          example: owner
        password:
          type: string
          description: Desired owner password (minimum 8 characters).
          minLength: 8
          example: "s3cret!!"

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Owner username.
          example: owner
        password:
          type: string
          description: Owner password.
          example: "s3cret!!"

    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Signed Bearer JWT for the authenticated owner.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    MeResponse:
      type: object
      required:
        - ownerId
      properties:
        ownerId:
          type: string
          format: uuid
          description: The authenticated owner's UUID.

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable error description.
          example: owner already exists

    ChapterCounts:
      type: object
      required:
        - total
        - downloaded
        - wanted
        - failed
        - unread
      properties:
        total:
          type: integer
          description: Total number of chapters in the series.
        downloaded:
          type: integer
          description: Chapters currently in the downloaded state.
        wanted:
          type: integer
          description: Chapters currently in the wanted state.
        failed:
          type: integer
          description: Chapters currently in the failed state.
        unread:
          type: integer
          description: >-
            Downloaded chapters the owner has not read yet — what can be read right now,
            deliberately not every chapter a source knows about.

    SeriesSummary:
      type: object
      required:
        - id
        - title
        - displayName
        - slug
        - category
        - coverUrl
        - monitored
        - completed
        - needsSource
        - chapterCounts
        - createdAt
        - lastChapterDownloadedAt
      properties:
        id:
          type: string
          format: uuid
          description: Series identifier.
        title:
          type: string
          description: Canonical series title (used for slug derivation and disk layout).
        displayName:
          type: string
          description: Resolved display title from the metadata source provider (falls back to title).
        slug:
          type: string
          description: Deterministic URL-safe series slug.
        category:
          type: string
          description: Name of the user-defined category the series is filed under.
        coverUrl:
          type: string
          description: >-
            Series cover proxy path ("/api/series/{id}/cover?v=<version>"); empty when no provider
            has a cover. The v param is the CONTENT version of the cached image (a hash of its
            bytes), so the URL changes exactly when the cover does; the endpoint answers such a
            request with "Cache-Control: private, max-age=31536000, immutable" and the browser
            never re-requests a cover it already holds. Use the value VERBATIM — a request
            without it (or with a stale one) still serves the image, but only as revalidatable
            no-cache. A cover that is not cached locally yet has no version and its path carries
            no v.
        monitored:
          type: boolean
          description: Whether the series is actively tracked for new chapters.
        completed:
          type: boolean
          description: Whether the owner has marked the series finished (excluded from refresh + health).
        needsSource:
          type: boolean
          description: >-
            True when the series has NO live download source (zero providers with a real Suwayomi
            id — every provider is disk-origin). COVER-INDEPENDENT: a series can carry a metadata
            cover while still needing a real source matched (the Kaizoku-migration case).
        chapterCounts:
          $ref: "#/components/schemas/ChapterCounts"
        createdAt:
          type: string
          format: date-time
          description: When the series entered the library. Powers the "recently added" sort.
        lastChapterDownloadedAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            When this series' newest chapter became readable — MAX(first_downloaded_at) across
            its chapters. Powers the "recently updated" sort. Null when no chapter ever carried a
            first-downloaded time. NOT MAX(download_date): a download_date is a fetch timestamp a
            convergence upgrade rewrites on an old chapter, which would float a series to the top
            with nothing new to read. Always present as a key; its value may be null.

    Chapter:
      type: object
      required:
        - id
        - chapterKey
        - number
        - name
        - state
        - filename
        - pageCount
        - read
        - lastReadPage
        - readAt
        - pageVersion
      properties:
        id:
          type: string
          format: uuid
          description: Chapter UUID — the identifier the reader's page-bytes and progress endpoints key on.
        chapterKey:
          type: string
          description: Stable per-series chapter identity (never the number).
        number:
          type: [number, "null"]
          description: Display/sort number; null when unknown. Never identity.
        name:
          type: string
          description: Chapter display title from the best provider's feed (may be empty).
        state:
          type: string
          description: Chapter download state.
        filename:
          type: string
          description: Rendered CBZ filename (empty until downloaded).
        pageCount:
          type: [integer, "null"]
          description: Page count; null until the chapter is downloaded.
        read:
          type: boolean
          description: In-app reader progress — true when the owner has marked the chapter fully read.
        lastReadPage:
          type: integer
          description: In-app reader progress — 0-based index of the last page the owner viewed.
        readAt:
          type: [string, "null"]
          format: date-time
          description: When the chapter was marked read; null until then (cleared when read flips back to false).
        pageVersion:
          type: string
          description: |
            Reader page-bytes cache buster, derived from filename + download_date
            (empty for a not-yet-downloaded chapter). The client appends it as
            ?v= on every page request so a Library-Convergence upgrade that
            replaces the CBZ mid-read is never served from a stale cache entry.

    ChapterProgress:
      type: object
      required:
        - id
        - read
        - lastReadPage
        - readAt
      properties:
        id:
          type: string
          description: Chapter UUID.
        read:
          type: boolean
          description: Whether the chapter is marked fully read.
        lastReadPage:
          type: integer
          description: 0-based index of the last page the owner viewed.
        readAt:
          type: [string, "null"]
          format: date-time
          description: When the chapter was marked read; null when not read.

    ChapterProgressUpdate:
      type: object
      required:
        - lastReadPage
        - read
      properties:
        lastReadPage:
          type: integer
          minimum: 0
          description: 0-based index of the last page the owner viewed.
        read:
          type: boolean
          description: Mark the chapter fully read (true) or unread (false).

    Provider:
      type: object
      required:
        - id
        - provider
        - providerName
        - title
        - coverUrl
        - isMetadataSource
        - linked
        - mangaId
        - chapterCount
        - feedCount
        - feedRanges
        - hasFeed
        - fractionalCount
        - fractionalChapters
        - ignoreFractional
        - scanlator
        - language
        - importance
        - health
        - chaptersBehind
        - lastError
      properties:
        id:
          type: string
          format: uuid
          description: SeriesProvider UUID (used by re-rank and metadata-source pin).
        provider:
          type: string
          description: Raw Suwayomi source-ID identity key (e.g. 7537715367149829912).
        providerName:
          type: string
          description: Human-readable source display name (e.g. WebToon); falls back to the id when unresolved. Shown in the UI in place of the id.
        title:
          type: string
          description: This provider's own title for the series (may be empty).
        coverUrl:
          type: string
          description: Provider-level cover proxy path ("/api/series/{id}/providers/{pid}/cover"); empty when no cover.
        isMetadataSource:
          type: boolean
          description: True for the provider currently supplying DisplayName and CoverURL for this series.
        linked:
          type: boolean
          description: >-
            False for a disk-origin provider (an unlinked/unknown group created by
            library import — no real Suwayomi source attached yet); true once a
            real source is attached (via adopt, add-source, or Match). Unlinked
            groups are Match candidates (POST .../providers/{providerId}/match).
        mangaId:
          type: integer
          description: Source's Suwayomi manga id; 0 = unlinked disk provider.
        chapterCount:
          type: integer
          description: How many of the series' chapters this provider currently satisfies (Chapter.satisfied_by) — i.e. how many downloaded files came from this source. NOT how many chapters the source offers (see feedCount).
        feedCount:
          type: integer
          description: How many chapters this provider OFFERS — the size of its stored ProviderChapter feed. Served from our own DB; reading it makes no call to the source.
        feedRanges:
          type: string
          description: The stored feed's coverage as a gap-collapsed display string (e.g. "1-90, 92-101"); empty when the feed is empty or carries no chapter numbers.
        hasFeed:
          type: boolean
          description: True when this provider has a non-empty availability feed (≥1 ProviderChapter). Mirrors the backend drift-merge feed gate.
        fractionalCount:
          type: integer
          description: >-
            How many chapters in this provider's stored feed carry a fractional
            number (5.1, 5.5 — number != floor(number)). Computed in memory from
            the feed we already hold: no extra query, no call to the source.
        fractionalChapters:
          type: array
          items:
            type: string
          description: >-
            Those fractional chapter numbers, ascending, as display strings
            ("1.1", "5.5"). This is the EVIDENCE the owner needs before setting
            ignoreFractional: a mirror that re-uploads whole chapters under an
            "N.1" suffix shows a long SYSTEMATIC run (1.1, 2.1, 3.1, …), whereas a
            source carrying a genuine side-chapter (omake) shows a lone 5.5 — and
            ".5" is by far the most common fractional in a real library. The
            backend cannot tell those two apart, so it never guesses; the owner
            decides from this list. Always present, empty ([]) for a source with no
            fractional chapters — never null.
        ignoreFractional:
          type: boolean
          description: >-
            The owner's per-(series, source) switch marking this source as a
            fractional re-uploader: when set, the source contributes no
            fractional-numbered chapters to this series (they are dropped at ingest
            and excluded from candidacy). It deletes nothing, and an ignored source
            still reports its fractionalChapters here, so the decision stays
            reviewable and reversible.
        scanlator:
          type: string
          description: Scanlation group (may be empty).
        language:
          type: string
          description: Language code (e.g. en).
        importance:
          type: integer
          description: Priority/quality rank — higher is preferred.
        health:
          type: string
          enum: [ok, stale, erroring, unavailable]
          description: >-
            Computed source health within this series. `unavailable` means the
            source's extension is no longer loaded in the engine (it was
            uninstalled/removed) — reinstall the extension or remove the source.
            It dominates `erroring`/`stale` (there is nothing to fetch from).
        chaptersBehind:
          type: integer
          description: How many of the series' chapters this source lacks (informational).
        newestChapterAt:
          type: string
          format: date-time
          nullable: true
          description: Newest chapter upload date this source carries (null if unknown).
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
          description: When a refresh last successfully fetched this source (null if never).
        lastError:
          type: string
          description: Last refresh error for this source (empty if none).

    SeriesDetail:
      type: object
      required:
        - id
        - title
        - displayName
        - slug
        - category
        - coverUrl
        - monitored
        - completed
        - needsSource
        - chapterCounts
        - createdAt
        - lastChapterDownloadedAt
        - chapters
        - providers
        - status
        - description
        - genres
        - tags
        - altTitles
        - authors
        - year
        - links
        - metadataSource
        - coverSource
        - metadataLocked
      properties:
        id:
          type: string
          format: uuid
          description: Series identifier.
        title:
          type: string
          description: Canonical series title (used for slug derivation and disk layout).
        displayName:
          type: string
          description: Resolved display title from the metadata source provider (falls back to title).
        slug:
          type: string
          description: Deterministic URL-safe series slug.
        category:
          type: string
          description: Name of the user-defined category the series is filed under.
        coverUrl:
          type: string
          description: >-
            Series cover proxy path ("/api/series/{id}/cover?v=<version>"); empty when no provider
            has a cover. The v param is the CONTENT version of the cached image (a hash of its
            bytes), so the URL changes exactly when the cover does; the endpoint answers such a
            request with "Cache-Control: private, max-age=31536000, immutable" and the browser
            never re-requests a cover it already holds. Use the value VERBATIM — a request
            without it (or with a stale one) still serves the image, but only as revalidatable
            no-cache. A cover that is not cached locally yet has no version and its path carries
            no v.
        monitored:
          type: boolean
          description: Whether the series is actively tracked for new chapters.
        completed:
          type: boolean
          description: Whether the owner has marked the series finished (excluded from refresh + health).
        needsSource:
          type: boolean
          description: >-
            True when the series has NO live download source (zero providers with a real Suwayomi
            id — every provider is disk-origin). COVER-INDEPENDENT: a series can carry a metadata
            cover while still needing a real source matched (the Kaizoku-migration case).
        chapterCounts:
          $ref: "#/components/schemas/ChapterCounts"
        createdAt:
          type: string
          format: date-time
          description: When the series entered the library. Powers the "recently added" sort.
        lastChapterDownloadedAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            When this series' newest chapter became readable — MAX(first_downloaded_at) across
            its chapters. Powers the "recently updated" sort. Null when no chapter ever carried a
            first-downloaded time. NOT MAX(download_date): a download_date is a fetch timestamp a
            convergence upgrade rewrites on an old chapter, which would float a series to the top
            with nothing new to read. Always present as a key; its value may be null.
        chapters:
          type: array
          description: The series' chapters, ordered by number then chapter key.
          items:
            $ref: "#/components/schemas/Chapter"
        providers:
          type: array
          description: The series' providers.
          items:
            $ref: "#/components/schemas/Provider"
        status:
          type: string
          description: >-
            Phase-1 metadata-engine normalized publication status
            ("ongoing"|"completed"|"hiatus"|"cancelled"|""). Distinct from
            `completed` above (the owner's own manual toggle) — status is
            descriptive (what the metadata provider reports), completed is
            prescriptive (what the owner decided refresh/health should do).
            "" on a series never identified against a metadata provider.
        description:
          type: string
          description: >-
            Phase-1 metadata-engine merged synopsis (see internal/metadatasvc's persist step). ""
            on a series never identified against a metadata provider.
        genres:
          type: array
          items:
            type: string
          description: Merged metadata-engine genre collection (union across every matched provider). [] when unidentified.
        tags:
          type: array
          items:
            type: string
          description: Merged metadata-engine tag collection. [] when unidentified.
        altTitles:
          type: array
          items:
            $ref: "#/components/schemas/AltTitle"
          description: Merged alternate titles. [] when unidentified.
        authors:
          type: array
          items:
            $ref: "#/components/schemas/Author"
          description: Merged writer/artist credits. [] when unidentified.
        year:
          type: integer
          description: Merged first-publication year; 0 = unknown/unidentified.
        links:
          type: array
          items:
            $ref: "#/components/schemas/SeriesLink"
          description: Merged external reference links. [] when unidentified.
        metadataSource:
          allOf:
            - $ref: "#/components/schemas/SourceRef"
          nullable: true
          description: Provenance of the merged rich metadata; null until the series is identified.
        coverSource:
          allOf:
            - $ref: "#/components/schemas/SourceRef"
          nullable: true
          description: Provenance of the chosen cover; null until the owner explicitly picks one via the metadata engine.
        metadataLocked:
          type: boolean
          description: >-
            True once the owner has hand-curated this series' rich metadata via a
            manual Identify/IdentifyMerge pick — the background AutoIdentify pass
            never overwrites a locked series.

    Category:
      type: object
      required:
        - id
        - name
        - sortOrder
        - protected
        - isDefault
        - count
      properties:
        id:
          type: string
          format: uuid
          description: Category identifier.
        name:
          type: string
          description: Display label and on-disk folder name.
        sortOrder:
          type: integer
          description: Owner-chosen display order (ascending; ties break by name).
        protected:
          type: boolean
          description: True for the seeded "Other" — it can never be renamed.
        isDefault:
          type: boolean
          description: >-
            True for the single default landing category (new / uncategorized
            series file here). It can never be deleted; promote another category
            (PATCH /api/categories/{id}/default) to make this one deletable.
        count:
          type: integer
          description: Number of series filed under this category.

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: New category name (unique, filesystem-safe; becomes the folder name).
        sortOrder:
          type: integer
          description: Optional display order (defaults to 0).

    UpdateCategoryRequest:
      type: object
      description: At least one of name or sortOrder must be present.
      properties:
        name:
          type: string
          description: New name (renames the category and moves its on-disk folder).
        sortOrder:
          type: integer
          description: New display order (DB-only, no disk change).

    SetCategoryRequest:
      type: object
      required:
        - categoryId
      properties:
        categoryId:
          type: string
          format: uuid
          description: UUID of the target Category to file the series under.

    SetMonitoredRequest:
      type: object
      required:
        - monitored
      properties:
        monitored:
          type: boolean
          description: Whether the series should be actively tracked for new chapters.

    SetCompletedRequest:
      type: object
      required:
        - completed
      properties:
        completed:
          type: boolean
          description: Whether the series is finished (no more chapters expected).

    SetIgnoreFractionalRequest:
      type: object
      required:
        - ignoreFractional
      properties:
        ignoreFractional:
          type: boolean
          description: |
            Whether this source is a fractional re-uploader for this series: when true it
            contributes no fractional-numbered chapters (they are dropped at ingest and
            excluded from candidacy); when false the source is restored. Required — an
            omitted field is a 400, never a silent false.

    ProviderRank:
      type: object
      required:
        - id
        - importance
      properties:
        id:
          type: string
          format: uuid
          description: SeriesProvider UUID to update.
        importance:
          type: integer
          minimum: 0
          description: New priority/quality rank (non-negative; higher = preferred).

    ReorderProvidersRequest:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          description: Ordered list of (provider id, importance) pairs to apply all-or-nothing.
          minItems: 1
          items:
            $ref: "#/components/schemas/ProviderRank"

    DownloadChapter:
      type: object
      required:
        - id
        - seriesId
        - seriesTitle
        - seriesCategory
        - seriesCoverUrl
        - chapterKey
        - number
        - name
        - state
        - provider
        - providerName
        - upgradeTarget
        - deferredUntil
        - deferReason
        - retries
        - nextAttemptAt
        - lastError
        - errorCategory
        - filename
        - pageCount
        - downloadDate
      properties:
        id:
          type: string
          format: uuid
          description: Chapter identifier.
        seriesId:
          type: string
          format: uuid
          description: Identifier of the series this chapter belongs to.
        seriesTitle:
          type: string
          description: Resolved series display title (metadata-source title, falls back to canonical title).
        seriesCategory:
          type: string
          enum: [Manga, Manhwa, Manhua, Comic, Other]
          description: Library category of the series.
        seriesCoverUrl:
          type: string
          description: >-
            Series cover proxy path ("/api/series/{id}/cover?v=<version>"); empty when no provider
            has a cover. The v param is the CONTENT version of the cached image (a hash of its
            bytes), so the URL changes exactly when the cover does; the endpoint answers such a
            request with "Cache-Control: private, max-age=31536000, immutable" and the browser
            never re-requests a cover it already holds. Use the value VERBATIM — a request
            without it (or with a stale one) still serves the image, but only as revalidatable
            no-cache. A cover that is not cached locally yet has no version and its path carries
            no v.
        chapterKey:
          type: string
          description: Stable per-series chapter identity (never the number).
        number:
          type: [number, "null"]
          description: Display/sort number; null when unknown. Never identity.
        name:
          type: string
          description: Chapter display title from the best provider's feed (empty when no provider titles it).
        state:
          type: string
          enum: [wanted, downloading, downloaded, upgrade_available, upgrading, failed, permanently_failed, superseded, ignored]
          description: Chapter download state.
        provider:
          type: string
          description: >-
            Raw Suwayomi source-ID key (SeriesProvider.provider) of the source this chapter is
            ACTUALLY coming from, resolved in three steps: (1) the source that SATISFIED it
            (satisfied_by) — true provenance, where the file on disk came from; (2) else the
            highest-importance source whose FEED CARRIES this chapter_key — the source the
            engine is fetching from (the scheduler's own primary-source rule); (3) else empty,
            when NO source carries the key: nothing is fetching this chapter and the UI renders
            an em-dash. NOT the series' top-ranked source — that lies whenever the top source
            has a feed gap. Step 2 is a UI HINT, not engine state: the engine additionally
            excludes retry-exhausted, cooled-down, or circuit-broken sources, which this read
            model does not know about, so it may name a source the engine defers this cycle.
            A downloaded chapter whose satisfier was cleared (the owner removed that source —
            the CBZ is kept) also resolves via step 2 or 3.
        providerName:
          type: string
          description: >-
            Human-readable source display name of the source resolved by `provider` (same three
            steps, same caveat); falls back to the id when unresolved, and is empty exactly when
            `provider` is. Shown in the UI in place of the id.
        upgradeTarget:
          type: string
          description: >-
            Display name of the source this chapter is upgrading TO — the highest-importance
            source (other than the current one) whose feed carries the chapter and which
            outranks it. Empty for every chapter not in upgrade_available/upgrading. The UI
            renders "providerName → upgradeTarget". It is the INTENDED target: the engine
            additionally excludes retry-exhausted, cooled-down, or circuit-broken sources,
            which this read model does not know about, so it may name a source the engine
            defers this cycle.
        deferredUntil:
          type: string
          format: date-time
          nullable: true
          description: >-
            Why a QUEUED chapter is not moving: the source the engine is waiting on — the
            upgrade TARGET for an upgrade_available/upgrading chapter, else the PRIMARY
            candidate for a wanted one — has a persisted per-source cooldown, and this is
            its next_attempt_at. Populated ONLY when that timestamp is genuinely in the
            FUTURE (an absent or past cooldown = the source is ready next cycle → null, never
            mislabelled as waiting). The waited-on source's NAME is already on the row
            (upgradeTarget for an upgrade defer, providerName for a wanted one), so it is not
            duplicated here. Surfaces only the PERSISTED cooldown: a chapter held back purely
            by the engine's in-memory circuit-breaker (which writes no next_attempt_at) shows
            null here and reads as plain "ready".
        deferReason:
          type: string
          description: >-
            The waited-on source's last_error, travelling with deferredUntil (meaningless
            without it). Empty when the chapter is not deferred, or when the cooldown carries
            no recorded reason.
        retries:
          type: integer
          description: Number of download attempts so far (0 when never attempted or after a retry reset).
        nextAttemptAt:
          type: string
          format: date-time
          nullable: true
          description: Scheduled next retry time; only set on failed chapters under backoff, else null.
        lastError:
          type: string
          description: Last download error for this chapter (empty if none).
        errorCategory:
          type: string
          description: Coarse error classification (e.g. "network"); empty if none.
        filename:
          type: string
          description: Rendered CBZ filename (empty until downloaded).
        pageCount:
          type: [integer, "null"]
          description: Page count; null until the chapter is downloaded.
        downloadDate:
          type: string
          format: date-time
          nullable: true
          description: When the chapter was downloaded; null until downloaded.

    DownloadList:
      type: object
      required:
        - total
        - items
      properties:
        total:
          type: integer
          description: Total chapters matching the state filter across the whole library (not just the page).
        items:
          type: array
          description: The requested page of enriched chapters.
          items:
            $ref: "#/components/schemas/DownloadChapter"

    RetryAllResult:
      type: object
      required:
        - retried
      properties:
        retried:
          type: integer
          description: Number of chapters reset back to wanted by the bulk retry.

    DedupeFilesResult:
      type: object
      required:
        - removed
      properties:
        removed:
          type: integer
          description: >-
            Number of duplicates resolved by the owner-triggered dedupe-files
            sweep: superseded/orphan duplicate CBZ files removed from disk PLUS
            engine-switch duplicate chapter rows merged (a negative-numeric
            legacy row folded into its name-keyed canonical twin). Winning files
            and canonical rows are never removed.

    DedupePlanItem:
      type: object
      required:
        - reason
        - number
        - filename
      properties:
        reason:
          type: string
          enum:
            - epilogue-merge
            - ignored-fractional
            - orphan-superseded
          description: >-
            Which removal source this item came from: `epilogue-merge` (an
            engine-switch duplicate chapter row + its CBZ), `ignored-fractional` (a
            downloaded fractional whose every carrier now ignores fractionals — row
            + CBZ), or `orphan-superseded` (a duplicate/orphan CBZ removed on disk
            only, no DB row).
        number:
          type: number
          format: double
          nullable: true
          description: >-
            The chapter number this file belongs to, or null when the removed
            chapter carries no number. A merge twin removed here is the
            negative-numeric row (it HAS a number, e.g. -1); the name-keyed
            canonical it merges into is the KEPT row and never appears as an item.
        filename:
          type: string
          description: The CBZ filename that will be deleted.

    DedupePlan:
      type: object
      required:
        - total
        - items
      properties:
        total:
          type: integer
          description: Number of removals in the plan (len(items)).
        items:
          type: array
          description: >-
            Every removal the sweep would perform, grouped by reason. Empty when
            there is nothing to clean. Provably identical to what a subsequent POST
            to this path deletes.
          items:
            $ref: "#/components/schemas/DedupePlanItem"

    FractionalCleanupChapter:
      type: object
      required:
        - chapterId
        - number
        - pageCount
        - provider
        - filename
      properties:
        chapterId:
          type: string
          format: uuid
          description: Chapter UUID — the id the cleanup POST names.
        number:
          type: number
          format: double
          description: The chapter number. Always fractional (5.1, 181.5 …).
          example: 181.5
        pageCount:
          type: integer
          nullable: true
          description: >-
            How many pages the downloaded file has, or null when never recorded.
            This is the EVIDENCE: a 1-page "chapter" is a notice page; a 132-page
            one is a full-size chapter that merely carries a ".5" number. Judge by
            this, never by the number.
        provider:
          type: string
          description: >-
            Display label of the source that satisfies this chapter (where the file
            came from); "" when that source has since been removed.
        filename:
          type: string
          description: The CBZ filename that will be deleted.

    FractionalCleanupPreview:
      type: object
      required:
        - typicalPageCount
        - chapters
      properties:
        typicalPageCount:
          type: integer
          description: >-
            MEDIAN page count of the series' WHOLE (non-fractional) downloaded
            chapters — the yardstick the fractionals are judged against. 0 when no
            whole downloaded chapter carries a page count.
          example: 96
        chapters:
          type: array
          description: The removable fractional chapters; empty when there is nothing to clean.
          items:
            $ref: "#/components/schemas/FractionalCleanupChapter"

    FractionalCleanupRequest:
      type: object
      required:
        - chapterIds
      properties:
        chapterIds:
          type: array
          minItems: 1
          description: >-
            The Chapter UUIDs the owner ticked. A SELECTION from the preview, never
            an authorisation: the server re-computes the removable set and rejects
            (400) any id outside it.
          items:
            type: string
            format: uuid

    FractionalCleanupResult:
      type: object
      required:
        - removed
      properties:
        removed:
          type: integer
          description: >-
            Number of fractional chapters removed (CBZ file + Chapter row). The
            source feed rows are kept, so un-ticking the ignore-fractional toggle
            restores them.

    Source:
      type: object
      required:
        - id
        - name
        - lang
        - degraded
        - degradedReason
      properties:
        id:
          type: string
          description: Suwayomi source identifier (64-bit integer serialised as string).
          example: "1998416842837112832"
        name:
          type: string
          description: Human-readable source name (e.g. "MangaDex").
          example: MangaDex
        lang:
          type: string
          description: BCP-47 content language tag for this source (e.g. "en", "ko").
          example: en
        degraded:
          type: boolean
          description: >-
            True when this source's anti-ban circuit-breaker is currently tripped
            (cooling down) — background fetches are being refused, so a
            search/adopt against it is likely to fail. A HINT, not a hard block:
            the picker still lets the owner select it.
          example: false
        degradedReason:
          type: string
          description: >-
            Short human explanation for the degraded state, "" when not degraded.
          example: ""

    SearchCandidate:
      type: object
      required:
        - source
        - sourceName
        - lang
        - mangaId
        - title
        - url
        - realUrl
        - thumbnailUrl
        - author
        - artist
        - description
        - genres
      properties:
        source:
          type: string
          description: Suwayomi source ID from which this candidate came.
        sourceName:
          type: string
          description: Human-readable source name.
        lang:
          type: string
          description: Content language of this source.
        mangaId:
          type: integer
          description: Suwayomi-internal manga identifier within this source.
        title:
          type: string
          description: Manga display title as returned by the source.
        url:
          type: string
          description: |
            Provider-canonical ADDRESSING url for this manga — what every adopt/
            add-source/match request must send back to identify it. NOT a
            clickable browser link; see realUrl for that. Empty string when not
            provided.
        realUrl:
          type: string
          description: |
            Fully-qualified, browser-clickable URL for this manga (Mihon's
            HttpSource.getMangaUrl); powers the "View on source" external link.
            Distinct from url (the addressing key) — never send this back to
            the backend. Empty string when the engine host could not resolve
            one.
        thumbnailUrl:
          type: string
          description: |
            The engine host's own resolved cover image URL, used verbatim (directly
            fetchable). Empty string when the source provided no thumbnail at all.
        author:
          type: string
          description: Manga's writing credit; empty string when not provided.
        artist:
          type: string
          description: Manga's art credit; empty string when not provided.
        description:
          type: string
          description: Synopsis/summary text; empty string when not provided.
        genres:
          type: array
          description: Genre/tag list; empty array when the source provides none.
          items:
            type: string

    BrowseResult:
      type: object
      description: One page of a source's catalog browse (Popular/Latest) — a flat candidate list in source order plus pagination metadata.
      required:
        - manga
        - hasNextPage
        - page
      properties:
        manga:
          type: array
          description: Candidates on this page, in source order.
          items:
            $ref: "#/components/schemas/SearchCandidate"
        hasNextPage:
          type: boolean
          description: Whether another page exists (drives pagination).
        page:
          type: integer
          description: The 1-based page number returned.

    SearchGroup:
      type: object
      required:
        - title
        - candidates
      properties:
        title:
          type: string
          description: Representative display title chosen by the grouping logic.
        candidates:
          type: array
          description: Every source hit that belongs to this group.
          items:
            $ref: "#/components/schemas/SearchCandidate"

    ChapterInspect:
      type: object
      required:
        - number
        - name
        - scanlator
      properties:
        number:
          type: [number, "null"]
          description: Parsed chapter number (e.g. 1.5); null when not available.
        name:
          type: string
          description: Chapter display name (e.g. "Chapter 1").
        scanlator:
          type: string
          description: Scanlation group credited for this chapter; empty string when untagged.

    AdoptProvider:
      type: object
      required:
        - source
        - mangaId
        - importance
      properties:
        source:
          type: string
          description: Engine-host source ID, stringified (e.g. "2").
        mangaId:
          type: integer
          description: >-
            DEPRECATED, unused by the backend — kept only for wire
            compatibility with older clients. Use url instead.
        url:
          type: string
          description: >-
            Source-relative manga URL the engine host addresses this manga
            by (P2 Suwayomi-removal). Optional on the wire for backward
            compatibility, but the backend requires a non-empty value and
            responds 400 when it is missing.
        importance:
          type: integer
          minimum: 0
          description: Provider rank for this series (higher = preferred).
        scanlator:
          type: string
          description: |
            Selects which scanlation group's chapters this provider tracks; omit or send ""
            for "all chapters from this source". The same source may appear more than once
            under different scanlators, each with its own importance.

    ScanlatorCoverage:
      type: object
      description: One scanlator's chapter coverage for a source-manga.
      required:
        - scanlator
        - count
        - ranges
      properties:
        scanlator:
          type: string
          description: Group name; the source name when chapters carry no scanlator tag.
        count:
          type: integer
          description: Number of chapters this scanlator has published.
        ranges:
          type: string
          description: Human-readable coverage string, e.g. "1-90, 92-101".

    SourceBreakdown:
      type: object
      description: |
        Per-scanlator breakdown of a source-manga's chapters, used by the adopt UI to
        auto-split a source into per-scanlator rows with counts + ranges.
      required:
        - total
        - scanlators
      properties:
        total:
          type: integer
          description: Total chapter count across all scanlators.
        scanlators:
          type: array
          description: Per-scanlator breakdown, sorted by count descending (ties by name ascending).
          items:
            $ref: "#/components/schemas/ScanlatorCoverage"

    AdoptRequest:
      type: object
      required:
        - title
        - providers
      properties:
        title:
          type: string
          description: Canonical series title; all providers attach to the series slug derived from this.
        category:
          type: string
          description: Target category by NAME (user-defined; free string).
        providers:
          type: array
          description: Ordered list of (source, manga) pairs to adopt; must have at least one entry.
          minItems: 1
          items:
            $ref: "#/components/schemas/AdoptProvider"

    SetMetadataSourceRequest:
      type: object
      properties:
        providerId:
          type: [string, "null"]
          format: uuid
          description: |
            SeriesProvider UUID to pin as the metadata source, or null/absent to reset
            to automatic resolution (highest-importance provider). A malformed UUID
            yields 400.

    SetReadingProgressRequest:
      type: object
      required:
        - chapter
      properties:
        chapter:
          type: number
          minimum: 0
          description: |
            Target chapter number (QCAT-242). Chapters numbered <= this value
            are marked read; chapters numbered > this value are marked
            unread. 0 means re-read from scratch (every chapter unread).

    AltTitle:
      type: object
      required: [name, type, lang]
      properties:
        name:
          type: string
        type:
          type: string
          description: One of ROMAJI, LOCALIZED, NATIVE, SYNONYM (provider-defined).
        lang:
          type: string

    Author:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
        role:
          type: string
          description: One of WRITER, ARTIST, STORY, ART, ... (provider-defined).

    SeriesLink:
      type: object
      required: [label, url]
      properties:
        label:
          type: string
        url:
          type: string

    SourceRef:
      type: object
      required: [kind, ref, remoteId, remoteUrl]
      properties:
        kind:
          type: string
          description: '"metadata" (v1) | "source" | "tracker" (later).'
        ref:
          type: string
          description: Metadata provider Key() | SeriesProvider UUID | tracker id.
        remoteId:
          type: string
        remoteUrl:
          type: string

    MetadataSearchResult:
      type: object
      required: [provider, remoteId, title, url, coverUrl, year]
      properties:
        provider:
          type: string
          description: Owning metadata provider's Key() (e.g. "anilist").
        remoteId:
          type: string
        title:
          type: string
        url:
          type: string
        coverUrl:
          type: string
        year:
          type: integer
          description: First-publication year; 0 = unknown.

    CoverCandidate:
      type: object
      required: [sourceKind, sourceRef, coverUrl, label]
      properties:
        sourceKind:
          type: string
          enum: [metadata, source]
        sourceRef:
          type: string
          description: >-
            Metadata provider Key() when sourceKind is "metadata", or the
            SeriesProvider UUID string when sourceKind is "source".
        coverUrl:
          type: string
        label:
          type: string

    MetadataIdentifyRequest:
      type: object
      description: >-
        Either the legacy single-pick shape ({provider, remoteId}) or the
        multi-select merge shape ({selections: [...]}). When selections is
        non-empty it wins outright and the legacy fields are ignored. At
        least one of the two forms is required.
      properties:
        provider:
          type: string
          description: Metadata provider Key() (e.g. "anilist"). Legacy single-pick shape; ignored when selections is non-empty.
        remoteId:
          type: string
          description: The provider's own identifier for the picked series. Legacy single-pick shape; ignored when selections is non-empty.
        selections:
          type: array
          items:
            $ref: "#/components/schemas/MetadataSelection"
          description: >-
            Multi-select merge picks, in priority order — selections[0] is
            primary (anchors scalar precedence + the resulting
            metadataSource). Two or more entries route through the
            multi-select merge (union collections, no auto-matching beyond
            the given picks); a single entry behaves like the legacy shape
            (auto-matches every other registered provider too).

    MetadataSelection:
      type: object
      required: [provider, remoteId]
      properties:
        provider:
          type: string
          description: Metadata provider Key() (e.g. "anilist").
        remoteId:
          type: string
          description: The provider's own identifier for the picked series.

    SetCoverRequest:
      type: object
      required: [sourceKind, sourceRef, coverUrl]
      properties:
        sourceKind:
          type: string
          description: '"metadata" or "source" (see CoverCandidate).'
        sourceRef:
          type: string
          description: >-
            Metadata provider Key() when sourceKind is "metadata", or the
            SeriesProvider UUID string when sourceKind is "source".
        coverUrl:
          type: string
          description: Absolute http(s) URL the cover bytes are fetched from.

    LibraryHealth:
      type: object
      required: [series]
      properties:
        series:
          type: array
          items:
            $ref: "#/components/schemas/SeriesHealth"

    SeriesHealth:
      type: object
      required: [id, title, slug, sources]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Provider"

    LibraryFractionals:
      type: object
      description: |
        The library-wide Fractionals page: every series that has at least one
        DOWNLOADED fractional chapter, sorted most-actionable first
        (removableCount desc, then fractionalCount desc, then title).
      required: [series]
      properties:
        series:
          type: array
          items:
            $ref: "#/components/schemas/SeriesFractionals"

    SeriesFractionals:
      type: object
      description: |
        One series with downloaded fractional chapters. fractionalCount is EVERY
        downloaded fractional (ignore-agnostic — the reason it is listed, incl.
        old un-flagged series); removableCount is how many are removable RIGHT NOW
        under the strict resurrection-safe rule. The provider fields drive the
        whole-series ignore toggle: it reads ON only when every source already
        ignores fractionals (allProvidersIgnoring).
      required:
        - seriesId
        - title
        - displayName
        - category
        - coverUrl
        - fractionalCount
        - removableCount
        - providersTotal
        - providersIgnoring
        - allProvidersIgnoring
      properties:
        seriesId:
          type: string
          format: uuid
        title:
          type: string
        displayName:
          type: string
          description: Resolved display title (falls back to the canonical title).
        category:
          type: string
        coverUrl:
          type: string
          description: Series cover proxy path, or "" when no cover is available.
        fractionalCount:
          type: integer
          description: All downloaded fractional chapters (ignore-agnostic).
        removableCount:
          type: integer
          description: How many downloaded fractionals are removable right now.
        providersTotal:
          type: integer
          description: Number of sources the series has.
        providersIgnoring:
          type: integer
          description: How many of those sources currently ignore fractionals.
        allProvidersIgnoring:
          type: boolean
          description: True when every source ignores fractionals (the toggle's ON state).

    EngineTopologyStatus:
      type: object
      description: |
        Read-only snapshot of how much engine topology Tsundoku has captured into
        its own durable store, computed from DB counts alone (no engine call). The
        observable counterpart of the one-shot boot-time seed passes.
      required: [repos, extensions, sources, gaps]
      properties:
        repos:
          type: integer
          description: Number of harvested extension-repository URLs.
          example: 3
        extensions:
          type: object
          required: [total, cached]
          properties:
            total:
              type: integer
              description: Number of harvested extensions.
              example: 12
            cached:
              type: integer
              description: How many of those extensions have their .apk bytes cached locally for offline recovery.
              example: 9
        sources:
          type: object
          required: [total, prefsCaptured, reached, failed, failedSources]
          properties:
            total:
              type: integer
              description: The library's live-source universe (distinct numeric SeriesProvider providers).
              example: 8
            prefsCaptured:
              type: integer
              description: How many of those sources have at least one captured preference.
              example: 5
            reached:
              type: integer
              description: How many sources' last preference read succeeded (a source may be reached yet carry zero non-default preferences).
              example: 7
            failed:
              type: integer
              description: How many sources' last preference read errored (a real gap).
              example: 1
            failedSources:
              type: array
              description: Names of the sources whose last preference read errored (source name, falling back to the source id). Empty when none failed.
              items:
                type: string
              example: ["Comix"]
        gaps:
          type: array
          description: |
            Human-readable notes naming what is still outstanding (e.g.
            "3 extensions not cached"). Empty when nothing is outstanding.
          items:
            type: string
          example: ["3 extensions not cached", "1 sources' preferences could not be read: Comix"]

    System:
      type: object
      required: [storageFolder, serverPort, database]
      properties:
        storageFolder:
          type: string
          description: Absolute path to the manga library on disk.
          example: /data/manga
        serverPort:
          type: string
          description: TCP port the HTTP server listens on.
          example: "9833"
        database:
          type: string
          description: |
            Credential-free display string for the PostgreSQL target:
            "host:port/name". Password and username are never included.
          example: "127.0.0.1:5432/tsundoku"

    Setting:
      type: object
      required: [key, value, default, type, unit]
      properties:
        key:
          type: string
          description: The tunable key (an allowlisted dotted key).
          example: jobs.download_interval
        value:
          type: string
          description: The current resolved value (DB override if set, else the default).
          example: 15m0s
        default:
          type: string
          description: The env-config default for this key.
          example: 15m0s
        type:
          type: string
          description: Value representation — "duration" (Go duration string), "int", or "bool".
          enum: [duration, int, bool]
        unit:
          type: string
          description: Semantic unit hint for the UI (e.g. "duration", "count", "days").
          example: duration

    SettingsUpdateRequest:
      type: object
      required: [settings]
      properties:
        settings:
          type: array
          description: |
            Batch of key/value updates applied all-or-nothing — an unknown key or an
            out-of-bounds value rejects the whole batch with 400 naming the bad key.
          minItems: 1
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
                example: jobs.download_interval
              value:
                type: string
                example: 30m

    SourceMetric:
      type: object
      description: |
        One source's rolling search-performance snapshot. "isSlow" is derived at
        read time (ewmaLatencyMs > the current slow threshold), never stored — so
        the threshold can be re-tuned without a migration.
      required:
        - sourceId
        - sourceName
        - ewmaLatencyMs
        - lastLatencyMs
        - searchCount
        - successCount
        - failCount
        - lastError
        - updatedAt
        - isSlow
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id.
        sourceName:
          type: string
          description: The source's display name (denormalized).
        ewmaLatencyMs:
          type: integer
          description: Exponentially-weighted rolling search latency, in milliseconds.
        lastLatencyMs:
          type: integer
          description: Most recent measured search latency, in milliseconds.
        searchCount:
          type: integer
          description: Lifetime number of recorded searches against this source.
        successCount:
          type: integer
          description: Lifetime number of successful searches.
        failCount:
          type: integer
          description: Lifetime number of failed/timed-out searches.
        lastError:
          type: string
          description: Most recent failure reason ("" when none).
        lastErrorAt:
          type: string
          format: date-time
          description: When the most recent failure occurred (absent if never failed).
        lastSuccessAt:
          type: string
          format: date-time
          description: When the most recent success occurred (absent if never succeeded).
        lastWarmedAt:
          type: string
          format: date-time
          description: When the source was last warmed (absent if never warmed).
        updatedAt:
          type: string
          format: date-time
          description: When this snapshot was last written.
        isSlow:
          type: boolean
          description: |
            Derived flag — true when the source has never been measured OR its
            ewmaLatencyMs exceeds the current slow threshold.
        breaker:
          $ref: "#/components/schemas/SourceBreaker"

    SourceBreaker:
      type: object
      description: |
        A source's persisted anti-ban circuit-breaker state, surfaced next to its
        latency/reliability stats. Present only when a breaker row exists (absent
        for a healthy source). "isCoolingDown" is derived at read time (a cooldown
        is set and still in the future) — the breaker is currently refusing
        background fetches to that source.
      required:
        - consecutiveFailures
        - lastError
        - isCoolingDown
      properties:
        consecutiveFailures:
          type: integer
          description: Number of gated fetches that failed in a row.
        cooldownUntil:
          type: string
          format: date-time
          description: When the tripped breaker reopens (absent when not tripped).
        failingSince:
          type: string
          format: date-time
          description: |
            Start of the current failure streak (absent when the source is not
            currently failing) — answers "erroring since when" without an
            event-log scan; drives the Source Health Console + alerting.
        lastError:
          type: string
          description: Most recent gated-fetch failure reason ("" when none).
        isCoolingDown:
          type: boolean
          description: |
            Derived — true when a cooldown is set and still in the future (the
            source is currently being refused for background fetches).

    SourceBreakerReset:
      type: object
      description: |
        Response to POST /api/sources/{sourceId}/reset-breaker: the source's
        identity plus its breaker state AFTER the reset (§16 round-trip). "breaker"
        is absent on a clean reset (the row was cleared), confirming the source is
        no longer cooling down.
      required:
        - sourceId
        - sourceName
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id.
        sourceName:
          type: string
          description: The source's display name.
        breaker:
          $ref: "#/components/schemas/SourceBreaker"

    SourceWarmStarted:
      type: object
      required: [started]
      properties:
        started:
          type: boolean
          description: |
            Always true — acknowledges the warm-up pass was kicked off in the
            background. The pass runs detached (it takes minutes over slow
            anti-bot sources); its per-source outcome surfaces in
            GET /api/sources/metrics (lastWarmedAt / lastError), not here.
          example: true

    RunDownloadsResult:
      type: object
      required: [started]
      properties:
        started:
          type: boolean
          description: |
            Always true — acknowledges an immediate download cycle was
            triggered. The trigger is non-blocking + cap-1 coalescing, so this
            response does not distinguish a freshly-started cycle from one that
            was already running; watch the cycle.start/cycle.done/download.*
            SSE stream for actual progress.
          example: true

    VapidKey:
      type: object
      required: [key]
      properties:
        key:
          type: string
          description: |
            The server's VAPID public key (base64url), passed to the browser's
            pushManager.subscribe as its applicationServerKey. Empty only when
            server-side VAPID init failed (Web Push then unavailable; the client
            feature-detects and degrades to the in-app SSE toast).
          example: "BEl0abc123-server-public-key"

    PushSubscriptionRequest:
      type: object
      required: [endpoint, keys]
      description: |
        A browser Web Push subscription, exactly the shape produced by
        PushSubscription.toJSON(). Upserted by endpoint (idempotent).
      properties:
        endpoint:
          type: string
          format: uri
          description: The push-service URL (the subscription's unique identity).
          example: "https://fcm.googleapis.com/fcm/send/abc123"
        keys:
          type: object
          required: [p256dh, auth]
          properties:
            p256dh:
              type: string
              description: The subscription's public encryption key (base64url).
            auth:
              type: string
              description: The subscription's auth secret (base64url).

    PushUnsubscribeRequest:
      type: object
      required: [endpoint]
      description: Identifies the device subscription to remove, by its endpoint.
      properties:
        endpoint:
          type: string
          format: uri
          description: The push-service URL of the subscription to remove.
          example: "https://fcm.googleapis.com/fcm/send/abc123"

    ChapterNew:
      type: object
      description: |
        The data payload of the `chapter.new` SSE event (and the identical Web
        Push payload) — emitted once per download cycle when one or more armed,
        monitored, non-completed series gained new readable chapters. Pre-rendered
        server-side so the service worker can showNotification straight from it.
      required: [groups, total, digest, title, body]
      properties:
        groups:
          type: array
          description: Per-series breakdown of the new readable chapters.
          items:
            $ref: "#/components/schemas/ChapterNewGroup"
        total:
          type: integer
          description: Sum of all groups' counts.
          example: 4
        digest:
          type: boolean
          description: |
            True when the notification collapsed to a cross-series digest (more
            than the per-series threshold of distinct series). The client
            deep-links to the library ("/") for a digest, else to groups[0].url.
          example: false
        title:
          type: string
          description: Pre-rendered notification title.
          example: "Solo Leveling"
        body:
          type: string
          description: Pre-rendered notification body.
          example: "1 new chapter"

    ChapterNewGroup:
      type: object
      required: [seriesId, title, count, url]
      properties:
        seriesId:
          type: string
          format: uuid
          description: The series that gained new chapters.
        title:
          type: string
          description: The series' display title.
          example: "Solo Leveling"
        count:
          type: integer
          description: Number of new readable chapters in this cycle for the series.
          example: 1
        url:
          type: string
          description: In-app deep-link to the series page.
          example: "/series/6f1c2b3a-0000-0000-0000-000000000000"

    FlareSolverrSettings:
      type: object
      required: [enabled, url, timeout, sessionName, sessionTtl, asResponseFallback]
      properties:
        enabled:
          type: boolean
          description: Toggles the FlareSolverr Cloudflare-bypass proxy.
        url:
          type: string
          description: The FlareSolverr endpoint (e.g. http://host:8191).
          example: http://localhost:8191
        timeout:
          type: integer
          description: Per-request timeout in seconds.
          example: 60
        sessionName:
          type: string
          description: The FlareSolverr session identifier.
        sessionTtl:
          type: integer
          description: Session time-to-live in minutes.
          example: 15
        asResponseFallback:
          type: boolean
          description: Use FlareSolverr only as a fallback for blocked requests.

    FlareSolverrUpdate:
      type: object
      description: Partial FlareSolverr group; omitted fields are untouched.
      properties:
        enabled:
          type: boolean
        url:
          type: string
          description: Absolute http(s) URL, or empty string to clear.
        timeout:
          type: integer
          description: Per-request timeout in seconds (non-negative).
        sessionName:
          type: string
        sessionTtl:
          type: integer
          description: Session TTL in minutes (non-negative).
        asResponseFallback:
          type: boolean

    Extension:
      type: object
      description: |
        An extension (a Tachiyomi/Mihon source plugin), proxied verbatim from
        the engine host. Tsundoku stores none of this. The identity is
        pkgName (there is no numeric id); the install/nsfw flags use the
        engine host's isInstalled/isNsfw naming. iconUrl is the engine host's
        own reported icon image URL, served AS-IS (no same-origin proxy —
        the FE renders it directly).
      required:
        - pkgName
        - name
        - lang
        - versionName
        - versionCode
        - iconUrl
        - repoUrl
        - isInstalled
        - hasUpdate
        - isNsfw
        - sources
        - cachedVersions
      properties:
        pkgName:
          type: string
          description: The extension package name — its stable identity.
          example: eu.kanade.tachiyomi.extension.en.mangadex
        name:
          type: string
          description: Human-readable display name.
          example: MangaDex
        lang:
          type: string
          description: BCP-47 language tag the extension serves.
          example: en
        versionName:
          type: string
          description: Human-readable version string.
          example: 1.4.2
        versionCode:
          type: integer
          description: Integer version code.
          example: 42
        iconUrl:
          type: string
          description: The engine host's own reported icon image URL, served as-is.
        repoUrl:
          type: string
          nullable: true
          description: Source repo URL this extension came from; null when not associated with a repo (e.g. sideloaded).
        isInstalled:
          type: boolean
          description: Whether the extension is currently installed.
        hasUpdate:
          type: boolean
          description: Whether an installed extension has a newer version available.
        isNsfw:
          type: boolean
          description: Whether the extension is flagged not-safe-for-work.
        sources:
          type: array
          description: The content sources this extension provides (one per language it supports) — the set the per-source preferences endpoint resolves against.
          items:
            $ref: "#/components/schemas/ExtensionSource"
        cachedVersions:
          type: array
          description: |
            The HELD (retained) .apk versions of this extension in Tsundoku's apk
            cache — the reversible-update history the UI lists so the owner can
            reinstall (roll back to) an older build. Never null ([] when none are
            held). Newest-first.
          items:
            $ref: "#/components/schemas/CachedVersion"

    CachedVersion:
      type: object
      description: One held .apk version of an extension the owner can reinstall (roll back to) from the apk cache.
      required: [versionCode, versionName, cachedAt]
      properties:
        versionCode:
          type: integer
          description: The numeric version code — the reinstall endpoint's target.
          example: 42
        versionName:
          type: string
          description: Human-readable version string.
          example: 1.4.2
        cachedAt:
          type: string
          format: date-time
          description: When these bytes were cached.

    ExtensionReinstallRequest:
      type: object
      description: Which held extension version to reinstall (roll back to).
      required: [versionCode]
      properties:
        versionCode:
          type: integer
          description: The held .apk version code to reinstall. Must be present in the extension's cachedVersions.
          example: 41

    ExtensionSource:
      type: object
      description: One content source an extension provides.
      required: [id, name, lang]
      properties:
        id:
          type: string
          description: The source's stable numeric identifier, as a decimal string.
          example: "2499283573021220255"
        name:
          type: string
          description: Human-readable source name.
          example: MangaDex
        lang:
          type: string
          description: BCP-47 language tag the source reports.
          example: en

    ExtensionRepos:
      type: object
      description: The configured extension repo URL list.
      required: [repos]
      properties:
        repos:
          type: array
          description: Extension repo URLs (empty array when none configured).
          items:
            type: string

    ExtensionReposUpdate:
      type: object
      description: |
        REPLACES the extension repo URL list (PUT = replace, not merge). repos
        must be present (a JSON array); an empty array clears all repos. Each
        entry must be an absolute http(s) URL with a host.
      required: [repos]
      properties:
        repos:
          type: array
          items:
            type: string
            description: Absolute http(s) URL.
          example:
            - https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json

    SourcePreference:
      type: object
      description: |
        One configurable preference of a source (a Tachiyomi/Mihon source
        setting). Read `type` first: it decides how `currentValue`/`default`
        are typed — CheckBoxPreference/SwitchPreferenceCompat are booleans,
        ListPreference/EditTextPreference are strings (List also carries
        entries/entryValues), MultiSelectListPreference are string arrays.
        `key` is the ONLY write selector (KEY-addressed, not position-indexed
        — the engine host's write is keyed, unlike the retired Suwayomi
        position-indexed shape).
      required:
        - type
        - key
        - title
        - summary
        - currentValue
        - default
        - entries
        - entryValues
      properties:
        type:
          type: string
          description: The union variant (the androidx.preference class simpleName).
          enum:
            - CheckBoxPreference
            - SwitchPreferenceCompat
            - ListPreference
            - MultiSelectListPreference
            - EditTextPreference
        key:
          type: string
          description: Source-internal preference key — the write selector.
        title:
          type: string
          description: Human-readable label ("" when null).
        summary:
          type: string
          description: Human-readable help text ("" when null).
        currentValue:
          nullable: true
          description: |
            Current value; null when unset. A boolean for CheckBox/Switch, a
            string for List/EditText, an array of strings for MultiSelectList.
          oneOf:
            - type: boolean
            - type: string
            - type: array
              items:
                type: string
        default:
          nullable: true
          description: |
            Default value; null when unset. Same per-variant typing as currentValue.
          oneOf:
            - type: boolean
            - type: string
            - type: array
              items:
                type: string
        entries:
          type: array
          description: Human-readable option labels (List/MultiSelect only; [] otherwise).
          items:
            type: string
        entryValues:
          type: array
          description: Stored option values matching entries by index (List/MultiSelect only; [] otherwise).
          items:
            type: string

    SourcePreferencesGroup:
      type: object
      description: |
        One source's preferences within a grouped extension response (one
        source per language). `enabled` is the per-language enable/disable
        toggle, resolved from Tsundoku's OWN disabled-source store (the
        internal engine has no such concept). A disabled source is hidden from
        the Discover/Search/Browse pickers; the FE hides a disabled group's
        preference block. Toggled via PATCH /api/sources/{sourceId}/enabled.
      required:
        - sourceId
        - sourceName
        - lang
        - enabled
        - ignoreScanlator
        - preferences
      properties:
        sourceId:
          type: string
          description: The engine host source id (the write body's sourceId).
        sourceName:
          type: string
          description: Human-readable source name.
        lang:
          type: string
          description: BCP-47 language tag.
        enabled:
          type: boolean
          description: |
            The per-language enable/disable state (Tsundoku-side). false when
            the owner has disabled this source; the FE hides its preferences.
        ignoreScanlator:
          type: boolean
          description: |
            The per-source ignore-scanlator flag (Tsundoku-side). true collapses
            this source's per-uploader providers into one [Source] provider on
            future adopts (an uploader-in-scanlator source, e.g. Hive Scans). The
            FE seeds its per-source toggle from this.
        preferences:
          type: array
          description: This source's configurable preferences, in array order.
          items:
            $ref: "#/components/schemas/SourcePreference"

    SourceEnabled:
      type: object
      description: |
        The authoritative per-language enable/disable state after a PATCH
        /api/sources/{sourceId}/enabled write (re-read from Tsundoku's
        disabled-source store, never the request echo).
      required:
        - sourceId
        - enabled
      properties:
        sourceId:
          type: string
          description: The engine host source id (stringified).
        enabled:
          type: boolean
          description: The enable/disable state as re-read after the write.

    SourceEnabledUpdate:
      type: object
      description: |
        The PATCH /api/sources/{sourceId}/enabled body — the new per-language
        enable/disable state. `enabled` is required (an absent field is a 400,
        never a silent disable).
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: The new per-language enable/disable state.

    SourceIgnoreScanlator:
      type: object
      description: |
        The authoritative per-source ignore-scanlator state after a PATCH
        /api/sources/{sourceId}/ignore-scanlator write (re-read from Tsundoku's
        ignore-scanlator store, never the request echo).
      required:
        - sourceId
        - ignoreScanlator
      properties:
        sourceId:
          type: string
          description: The engine host source id (stringified).
        ignoreScanlator:
          type: boolean
          description: The ignore-scanlator flag state as re-read after the write.
        migration:
          $ref: "#/components/schemas/ScanlatorMigration"
          description: |
            The Slice-B on-enable migration summary — present ONLY when the flag
            was flipped ON (it folds already-adopted per-uploader providers into
            one [Source] provider and relabels their CBZs). Absent when flipping
            OFF (one-way — no un-merge).

    ScanlatorMigration:
      type: object
      description: |
        Summary of the ignore-scanlator on-enable collapse migration — how many
        already-adopted series had their per-uploader providers folded into one
        [Source] provider (with CBZs relabeled), and how many were skipped after
        an error. Mirrors the dedup-providers sweep summary shape.
      required:
        - seriesProcessed
        - merged
        - skipped
      properties:
        seriesProcessed:
          type: integer
          description: How many series had at least one per-uploader provider folded.
        merged:
          type: integer
          description: Total per-uploader provider rows folded away across all series.
        skipped:
          type: integer
          description: How many series errored during the sweep and were skipped.

    SourceIgnoreScanlatorUpdate:
      type: object
      description: |
        The PATCH /api/sources/{sourceId}/ignore-scanlator body — the new
        per-source ignore-scanlator flag. `ignoreScanlator` is required (an
        absent field is a 400, never a silent un-flag).
      required:
        - ignoreScanlator
      properties:
        ignoreScanlator:
          type: boolean
          description: The new per-source ignore-scanlator flag state.

    SourcePreferencesBySource:
      type: object
      description: An extension's per-source preferences, grouped by the (per-language) source they belong to.
      required:
        - sources
      properties:
        sources:
          type: array
          description: The extension's sources, each with its own preference list.
          items:
            $ref: "#/components/schemas/SourcePreferencesGroup"

    SetSourcePreferenceRequest:
      type: object
      description: |
        Write one source preference by KEY. `value`'s JSON type must match the
        variant at that key (boolean → CheckBox/Switch, string → List/EditText,
        array of strings → MultiSelectList) — a mismatch is a 400. An unknown
        key is also a 400.
      required:
        - sourceId
        - key
        - value
      properties:
        sourceId:
          type: string
          description: The engine host source id the preference belongs to.
        key:
          type: string
          description: The source-internal preference key to write.
        value:
          nullable: true
          description: New value — a boolean, a string, or an array of strings (by variant).
          oneOf:
            - type: boolean
            - type: string
            - type: array
              items:
                type: string

    ScanStarted:
      type: object
      description: Result of a POST /api/library/scan call — whether this call launched the background scan (202) or one was already in flight (409).
      required:
        - started
      properties:
        started:
          type: boolean
          description: true if this call launched the scan; false if a scan was already running (single-flight guard).

    LibraryDedupStarted:
      type: object
      description: Result of a POST /api/library/dedup-providers call — the library-wide dedup sweep has been launched in the background.
      required:
        - started
      properties:
        started:
          type: boolean
          description: Always true — the library-wide dedup sweep has been launched in the background.

    LibraryFilters:
      type: object
      description: The set of boolean toggle-filters the library grid applies on top of the category tab + search. All default false (the whole library shows).
      required:
        - downloaded
        - unread
        - completed
        - needsSource
      properties:
        downloaded:
          type: boolean
          description: Narrow to series with at least one downloaded chapter.
        unread:
          type: boolean
          description: Narrow to series with at least one unread downloaded chapter.
        completed:
          type: boolean
          description: Narrow to series the owner marked finished.
        needsSource:
          type: boolean
          description: Narrow to series with no live download source (every provider is disk-origin).

    LibraryPrefs:
      type: object
      description: >-
        The owner's persisted library-list view state — sort field, direction,
        and active toggle-filters. A single-owner server-side preference
        (GET/PUT /api/library/prefs) so the chosen sort + filters survive a
        refresh/restart and are shared cross-device.
      required:
        - sortKey
        - sortDir
        - filters
      properties:
        sortKey:
          type: string
          description: >-
            The active sort field. One of title (Alphabetical), added (date
            added), updated (latest chapter), unread (unread count), total
            (total chapters), random (shuffle).
          enum:
            - title
            - added
            - updated
            - unread
            - total
            - random
        sortDir:
          type: string
          description: The sort direction.
          enum:
            - asc
            - desc
        filters:
          $ref: "#/components/schemas/LibraryFilters"

    FoundSeries:
      type: object
      description: One row of a library scan's staging result — a series discovered on disk (whether or not it is already imported into the DB).
      required:
        - path
        - title
        - category
        - chapterCount
        - providers
        - status
        - alreadyInDb
      properties:
        path:
          type: string
          description: Absolute on-disk path to the series folder.
        title:
          type: string
          description: Series title as read from disk (ComicInfo.xml/sidecar or folder name).
        category:
          type: string
          description: Category folder name this series was found under.
        chapterCount:
          type: integer
          description: Number of chapter files found on disk for this series.
        providers:
          type: array
          description: Provider keys recorded in the sidecar for this series (empty when no provenance is known).
          items:
            type: string
        status:
          type: string
          description: Staging status of this entry (pending/imported/skipped).
        alreadyInDb:
          type: boolean
          description: Whether a Series row with this title/slug already exists in the DB.

    ProviderRef:
      type: object
      description: |
        Identifies one engine-host source+manga+scanlator to attach to a series.
        Carries no importance — the batch attach (library.AddProviders)
        assigns importances itself, each strictly below the series' existing
        providers (decision E), in list order.
      required:
        - source
        - mangaId
      properties:
        source:
          type: string
          description: Engine-host source ID, stringified, the chosen candidate came from.
        mangaId:
          type: integer
          description: >-
            DEPRECATED, unused by the backend — kept only for wire
            compatibility with older clients. Use url instead.
        url:
          type: string
          description: >-
            Source-relative manga URL the engine host addresses this manga
            by (P2 Suwayomi-removal). Optional on the wire for backward
            compatibility, but the backend requires a non-empty value and
            responds 400 when it is missing.
        scanlator:
          type: string
          description: |
            Selects which scanlation group's chapters this provider tracks; omit or send ""
            for "all chapters from this source". The same source may be attached again
            under a different scanlator.

    ImportRequest:
      type: object
      description: Registers a staged library-scan entry as already downloaded (no re-download), optionally attaching a list of owner-matched Suwayomi sources.
      required:
        - path
      properties:
        path:
          type: string
          description: The staged entry's on-disk path (as returned by a prior scan/list).
        matches:
          type: array
          description: |
            Owner-chosen Suwayomi sources to attach at import time (empty/absent = disk-only
            import, no attach). Each lands at an importance strictly below the disk provider's
            (decision E) via library.AddProviders — no upgrade re-download fires.
          items:
            $ref: "#/components/schemas/ProviderRef"

    SkipRequest:
      type: object
      description: Marks a staged library-scan entry as skipped — leave it on disk, stop showing it as pending.
      required:
        - path
      properties:
        path:
          type: string
          description: The staged entry's on-disk path (as returned by a prior scan/list).

    BatchImportRequest:
      type: object
      description: |
        Bulk "import all remaining as disk-only" request — one call instead
        of N sequential POST /api/library/import calls for a 1000+ series
        migration. Every path is imported disk-only (no match attached).
      required:
        - paths
      properties:
        paths:
          type: array
          description: Staged entries' on-disk paths (as returned by a prior scan/list). Capped at 500 per request.
          items:
            type: string

    BatchImportFailure:
      type: object
      description: One path's failure within a batch import.
      required:
        - path
        - message
      properties:
        path:
          type: string
          description: The on-disk path that failed to import.
        message:
          type: string
          description: The underlying error message for this path.

    BatchImportResult:
      type: object
      description: |
        Result of a batch import — partial success by design: a bad path is
        recorded in `failed` and never aborts the rest of the batch.
      required:
        - imported
        - failed
      properties:
        imported:
          type: integer
          description: Number of paths that imported successfully.
        failed:
          type: array
          description: Per-path failures (empty if every path imported successfully).
          items:
            $ref: "#/components/schemas/BatchImportFailure"

    AddProvidersRequest:
      type: object
      description: |
        Attaches several Suwayomi sources to an existing series in one call
        (Slice P batch attach). Ordered best-first — each entry lands at an
        importance strictly below the series' existing providers (decision
        E), assigned by the server, not the caller.
      required:
        - providers
      properties:
        providers:
          type: array
          minItems: 1
          description: The sources to attach, best-first.
          items:
            $ref: "#/components/schemas/ProviderRef"

    AddProviderRequest:
      type: object
      description: >-
        Attaches an additional engine-host source to an existing series; also
        reused by the Match-disk-provider endpoint (attaches a real source to
        an unlinked disk-origin provider group).
      required:
        - source
        - mangaId
        - importance
      properties:
        source:
          type: string
          description: Engine-host source ID, stringified, the chosen candidate came from.
        mangaId:
          type: integer
          description: >-
            DEPRECATED, unused by the backend — kept only for wire
            compatibility with older clients. Use url instead.
        url:
          type: string
          description: >-
            Source-relative manga URL the engine host addresses this manga
            by (P2 Suwayomi-removal). Optional on the wire for backward
            compatibility, but the backend requires a non-empty value and
            responds 400 when it is missing.
        importance:
          type: integer
          description: Provider importance to assign (higher number = higher priority).
        scanlator:
          type: string
          description: |
            Selects which scanlation group's chapters this provider tracks; omit or send ""
            for "all chapters from this source". The same source may be attached again
            under a different scanlator.

    ProviderDedupResult:
      type: object
      description: |
        Result of an owner-triggered provider dedup: how many drifted
        disk/live source pairs were merged, how many were skipped, and the
        refreshed series detail after the cleanup.
      required:
        - merged
        - skipped
        - series
      properties:
        merged:
          type: integer
          description: Number of drifted disk/live source pairs folded into one row.
        skipped:
          type: integer
          description: >-
            Number of matching pairs left untouched because the linked twin has
            no fetched chapters yet (merging would orphan the disk chapters).
        series:
          $ref: "#/components/schemas/SeriesDetail"

    Tracker:
      type: object
      description: |
        One registered native tracker's connect status (AniList, MAL, Kitsu,
        MangaUpdates — spec/trackers-oauth-phase3). Every registered tracker
        is always listed, including a disabled/unconfigured OAuth tracker
        (blank client-id) — it is reported with isLoggedIn=false rather than
        omitted.
      required:
        - id
        - name
        - needsOAuth
        - isLoggedIn
        - isTokenExpired
        - username
        - supportsPrivate
      properties:
        id:
          type: integer
          description: The tracker's stable numeric registry id (MAL=1, AniList=2, Kitsu=3, MangaUpdates=7).
          example: 2
        name:
          type: string
          description: Human-display name.
          example: AniList
        needsOAuth:
          type: boolean
          description: True for AniList/MAL (OAuth redirect); false for Kitsu/MangaUpdates (direct username/password).
        isLoggedIn:
          type: boolean
          description: Whether a connected account exists for this tracker.
        isTokenExpired:
          type: boolean
          description: Whether the connected account's token has expired and needs a fresh login. Always false when isLoggedIn is false.
        username:
          type: string
          description: The connected account's display username ("" when not logged in).
        supportsPrivate:
          type: boolean
          description: |
            Whether this tracker's entries can be marked private on the
            remote account (true for AniList/Kitsu; false for MAL/
            MangaUpdates, which have no such remote concept — a bind
            `private` request field is silently ignored for them).

    TrackerAuthURL:
      type: object
      description: A freshly built OAuth authorize URL for one tracker login attempt.
      required:
        - authUrl
      properties:
        authUrl:
          type: string
          description: The URL to send the owner's browser to.

    OAuthLoginRequest:
      type: object
      description: |
        Completes the OAuth round-trip an authorize URL started. callbackUrl
        is the FULL callback URL the SPA's own OAuth callback route received
        — carrying "state" plus either "code" (MAL) or "access_token"
        (AniList; the SPA extracts the browser's URL fragment into a query
        param before posting here, since a server never sees a fragment).
      required:
        - callbackUrl
      properties:
        callbackUrl:
          type: string

    CredentialLoginRequest:
      type: object
      description: A direct username/password login for a credential-based tracker (Kitsu, MangaUpdates).
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    TrackSearchResult:
      type: object
      description: |
        One tracker's search hit for a manga. status/totalChapters/type/score
        are the tracker's OWN native vocabulary/scale — never normalized
        (spec §2). type/startDate/score/description are BEST-EFFORT
        enrichment fields: every tracker populates whatever its own search
        response actually carries and leaves the rest at its zero value
        ("" / 0), never fabricated.
      required:
        - remoteId
        - title
        - url
        - coverUrl
        - status
        - totalChapters
        - type
        - startDate
        - score
        - description
      properties:
        remoteId:
          type: string
          description: The tracker's manga id.
        title:
          type: string
        url:
          type: string
        coverUrl:
          type: string
        status:
          type: string
          description: The tracker's own native status vocabulary (e.g. AniList RELEASING/FINISHED).
        totalChapters:
          type: integer
          description: The tracker's reported total chapter count; 0 = unknown/ongoing.
        type:
          type: string
          description: |
            The tracker's own publication-format label (e.g. AniList's
            "MANGA"/"NOVEL"/"ONE_SHOT", MAL's media_type, Kitsu's subtype).
            "" when the tracker's search response doesn't carry one.
        startDate:
          type: string
          description: |
            The tracker's reported publication-start year or date, kept as a
            plain string so every tracker's native granularity survives
            (AniList: year only; MAL/Kitsu: full date; MangaUpdates: bare
            year). "" when unknown.
        score:
          type: number
          description: |
            The catalog/community average rating, on the tracker's OWN
            native scale (e.g. AniList 0-100 raw, MAL/Kitsu already ~0-10/
            0-100). NOT the caller's own entry score. 0 = unknown.
        description:
          type: string
          description: The tracker's own synopsis/summary text, verbatim. "" when absent.

    TrackBinding:
      type: object
      description: |
        A series↔tracker binding — the remote link and reading progress on
        one tracker's own account. status/score/lastChapterRead are the
        tracker's OWN native scale (spec §2 — converted only at display).
      required:
        - id
        - seriesId
        - trackerId
        - trackerName
        - remoteId
        - remoteUrl
        - libraryId
        - title
        - status
        - lastChapterRead
        - totalChapters
        - score
        - scoreFormat
        - startDate
        - finishDate
        - private
      properties:
        id:
          type: string
          format: uuid
        seriesId:
          type: string
          format: uuid
        trackerId:
          type: integer
        trackerName:
          type: string
        remoteId:
          type: string
          description: The tracker's manga id.
        remoteUrl:
          type: string
          description: The canonical link to the remote entry ("" when not derivable).
        libraryId:
          type: string
          description: The AniList MediaList entry id ("" for MAL / trackers without one).
        title:
          type: string
          description: The remote entry's title.
        status:
          type: string
          description: The tracker's own native status code.
        lastChapterRead:
          type: number
          description: The furthest chapter read (fractional-safe).
        totalChapters:
          type: integer
          description: The remote total; 0 = unknown/ongoing.
        score:
          type: number
          description: Reading score on the tracker's native scale.
        scoreFormat:
          type: string
          description: |
            The native scale `score` is stored/must be written on for this
            binding's tracker (e.g. "POINT_100" for AniList's default 0-100
            scale, "KITSU_RATING_TWENTY" for Kitsu's 0-20 scale, "MAL" for
            MyAnimeList's fixed 0-10 scale). Resolved from the connected
            account's own captured format (AniList) or a per-tracker
            default. "" only for a binding whose tracker is unregistered.
        startDate:
          type: string
          format: date-time
          nullable: true
        finishDate:
          type: string
          format: date-time
          nullable: true
        private:
          type: boolean

    BindRequest:
      type: object
      description: The owner's picked tracker + remote entry (from the search results) to bind the series to.
      required:
        - trackerId
        - remoteId
      properties:
        trackerId:
          type: integer
        remoteId:
          type: string
        private:
          type: boolean
          description: |
            Whether a FRESHLY-created remote entry (the manga wasn't already
            on the account's list) should be marked private on trackers that
            support it (see Tracker.supportsPrivate). Optional — absent
            defaults to false. Silently ignored on a tracker that doesn't
            support it, and has no effect when the manga was already tracked
            (that entry's own private flag is left as-is).

    UpdateTrackRequest:
      type: object
      description: |
        The owner's manual tracking-sheet edit (spec/trackers-sync-phase4 §2
        trigger (c)). Every field is optional — a field left out (or set to
        null) is left unchanged on the binding; at least one field must be
        present. Every patched field is pushed to the tracker's own account
        before being persisted locally.
      minProperties: 1
      properties:
        status:
          type: string
          description: The tracker's own native status vocabulary. Non-empty when provided.
        lastChapterRead:
          type: number
          minimum: 0
        score:
          type: number
          minimum: 0
        startDate:
          type: string
          format: date-time
          nullable: true
        finishDate:
          type: string
          format: date-time
          nullable: true
        private:
          type: boolean

    NetworkEndpoint:
      type: object
      description: >-
        A named, reusable network-egress endpoint (per-source network routing).
        The `kind` field selects which field-group is meaningful: the SOCKS group
        (host/port/socksVersion/username) for `socks`, or the FlareSolverr group
        (url/session/sessionTtl/timeout/asResponseFallback) for `flaresolverr`.
        The SOCKS password is WRITE-ONLY — it is set via create/update but never
        returned.
      required:
        - id
        - name
        - kind
        - enabled
        - host
        - port
        - socksVersion
        - username
        - url
        - session
        - sessionTtl
        - timeout
        - asResponseFallback
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Endpoint identifier.
        name:
          type: string
          description: Owner-facing label.
        kind:
          type: string
          enum: [socks, flaresolverr]
          description: Which field-group applies.
        enabled:
          type: boolean
          description: Whether a binding to this endpoint takes effect.
        host:
          type: string
          description: SOCKS proxy host (kind=socks).
        port:
          type: integer
          description: SOCKS proxy port (kind=socks).
        socksVersion:
          type: integer
          description: SOCKS protocol version, 4 or 5 (kind=socks).
        username:
          type: string
          description: Optional SOCKS auth username (kind=socks).
        url:
          type: string
          description: FlareSolverr endpoint URL (kind=flaresolverr).
        session:
          type: string
          description: FlareSolverr session identifier (kind=flaresolverr).
        sessionTtl:
          type: integer
          description: FlareSolverr session TTL in minutes (kind=flaresolverr).
        timeout:
          type: integer
          description: FlareSolverr per-request solve timeout in seconds (kind=flaresolverr).
        asResponseFallback:
          type: boolean
          description: >-
            Use FlareSolverr only reactively (as a fallback for a blocked
            request), not for every request (kind=flaresolverr).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NetworkEndpointCreate:
      type: object
      description: >-
        Create-endpoint body. `name` and `kind` are required; the SOCKS group
        applies when kind=socks, the FlareSolverr group when kind=flaresolverr
        (validated by kind). `socksVersion` defaults to 5 and `timeout` to 60
        when omitted. `password` is write-only.
      required:
        - name
        - kind
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [socks, flaresolverr]
        enabled:
          type: boolean
          description: Defaults to true when omitted.
        host:
          type: string
        port:
          type: integer
        socksVersion:
          type: integer
        username:
          type: string
        password:
          type: string
          description: Write-only SOCKS auth password.
        url:
          type: string
        session:
          type: string
        sessionTtl:
          type: integer
        timeout:
          type: integer
        asResponseFallback:
          type: boolean
          description: >-
            Use FlareSolverr only reactively (kind=flaresolverr). Defaults to
            true when omitted.

    NetworkEndpointUpdate:
      type: object
      description: >-
        Partial update — every field is optional; an omitted field is left
        untouched. In particular an omitted `password` KEEPS the stored password
        (write-only). The merged endpoint is re-validated by its (possibly
        changed) kind.
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [socks, flaresolverr]
        enabled:
          type: boolean
        host:
          type: string
        port:
          type: integer
        socksVersion:
          type: integer
        username:
          type: string
        password:
          type: string
          description: Write-only; omit to keep the stored password.
        url:
          type: string
        session:
          type: string
        sessionTtl:
          type: integer
        timeout:
          type: integer
        asResponseFallback:
          type: boolean
          description: Use FlareSolverr only reactively (kind=flaresolverr).

    SourceNetworkBinding:
      type: object
      description: >-
        A per-source network-routing assignment. Its ABSENCE (no row) means the
        source uses the global default. sourceId is stringified (a 64-bit source
        id can exceed JS's safe-integer range). The endpoint ids are nullable —
        null = no override for that dimension.
      required:
        - sourceId
        - flareMode
      properties:
        sourceId:
          type: string
          description: The engine-host source id (stringified decimal int64).
        socksEndpointId:
          type: string
          format: uuid
          nullable: true
          description: The bound SOCKS endpoint, or null for direct/global SOCKS.
        flareMode:
          type: string
          enum: [none, global, endpoint]
          description: FlareSolverr routing scope for the source.
        flareEndpointId:
          type: string
          format: uuid
          nullable: true
          description: The bound FlareSolverr endpoint; present iff flareMode=endpoint.

    SourceNetworkBindingUpdate:
      type: object
      description: >-
        Set-binding body. `flareMode` is required; the two endpoint ids are
        optional (null / omitted = no override). `flareEndpointId` is required
        iff flareMode=endpoint, forbidden otherwise.
      required:
        - flareMode
      properties:
        socksEndpointId:
          type: string
          format: uuid
          nullable: true
        flareMode:
          type: string
          enum: [none, global, endpoint]
        flareEndpointId:
          type: string
          format: uuid
          nullable: true

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns HTTP 200 with {"status":"ok"} when the server is running. No authentication required.
      tags:
        - system
      responses:
        "200":
          description: Server is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/owner/claim:
    post:
      operationId: claimOwner
      summary: First-run owner claim
      description: |
        Creates the single owner account. Succeeds exactly once — if any owner
        already exists the request is rejected with 409 Conflict (fail-closed).
        Concurrent claims are serialised; only one will succeed.
      tags:
        - owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimRequest"
      responses:
        "200":
          description: Owner created. Returns a signed Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: An owner already exists; claim is permanently rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/owner/login:
    post:
      operationId: loginOwner
      summary: Owner login
      description: |
        Authenticates with username and password and returns a signed Bearer token.
        Returns 401 for wrong credentials without revealing which field was wrong.
      tags:
        - owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Credentials accepted. Returns a signed Bearer token and sets an HttpOnly session cookie.
          headers:
            Set-Cookie:
              description: HttpOnly session cookie (tsundoku_session).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/owner/logout:
    post:
      operationId: logoutOwner
      summary: Clear the owner session cookie.
      tags:
        - owner
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Logged out (session cookie cleared).
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/owner/me:
    get:
      operationId: getOwner
      summary: The authenticated owner's identity.
      tags:
        - owner
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The authenticated owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/progress:
    get:
      operationId: streamProgress
      summary: SSE progress stream
      description: |
        Server-Sent Events stream delivering real-time progress events.
        Requires a valid Bearer token sent via the Authorization header
        (not via query-string — QCAT-018). The client must use a fetch-based
        SSE implementation, not the browser EventSource API, to support
        custom headers.
      tags:
        - sse
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SSE stream opened. Events are pushed as `text/event-stream`.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Newline-delimited SSE frames. Each frame carries a `data:` field
                  containing a JSON-encoded progress event. The `event:` field names
                  the event type (e.g. `chapter.downloaded`, `series.synced`,
                  `scan.start`/`scan.progress`/`scan.done` — emitted by the async
                  library scan, see POST /api/library/scan).
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series:
    get:
      operationId: listSeries
      summary: List library series
      description: |
        Returns a title-ascending page of series summaries with per-series
        chapter-state rollups. Optionally filtered by category and paginated.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          description: Restrict to a single category by NAME (user-defined; free string).
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Page size (default 50, capped at 200).
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          required: false
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: A page of series summaries.
          headers:
            X-Total-Count:
              description: Total number of series matching the filter (across all pages).
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Invalid category or pagination parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adoptSeries
      summary: Adopt / import a manga into the library
      description: |
        Groups one or more (source, manga) candidates under a single canonical title
        and merges them into ONE Series with N importance-ranked providers, ingesting
        all their chapters. On success, returns the full SeriesDetail of the newly
        created series so the caller sees the persisted state without a refetch (§16).
      tags:
        - imports
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdoptRequest"
      responses:
        "201":
          description: Series adopted. Returns the full series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Validation error (blank title, empty providers, invalid category, duplicate provider pair, negative importance).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}:
    get:
      operationId: getSeries
      summary: Get series detail
      description: Returns the full detail of one series — summary fields, chapters, and providers.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteSeries
      summary: Delete a whole series
      description: |
        Permanently removes a series and all its tracking data (providers, chapter
        feeds, sync state, chapters). When deleteFiles=true the downloaded CBZs and
        the series' library folder are also removed from disk (permanent — recover
        by re-adopting from source). When deleteFiles=false the CBZs are kept on
        disk (only DB tracking is removed; a later reconcile can rebuild the series
        from the on-disk sidecar). Returns 204 No Content.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: deleteFiles
          in: query
          required: true
          description: Whether to also delete the downloaded CBZ files + folder from disk.
          schema:
            type: boolean
      responses:
        "204":
          description: Series deleted.
        "400":
          description: Malformed id or missing/invalid deleteFiles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/category:
    patch:
      operationId: setSeriesCategory
      summary: Recategorize a series
      description: |
        Files the series under a new category. The on-disk series folder is moved
        before the database is updated (with compensation) so the DB and disk
        never drift. Returns the updated series summary.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCategoryRequest"
      responses:
        "200":
          description: Recategorized. Returns the updated series summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Malformed id, malformed categoryId, or unknown category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/monitored:
    patch:
      operationId: setSeriesMonitored
      summary: Toggle series monitoring
      description: |
        Sets the monitored flag for a series. When monitored is true the download
        ticker will pick up new chapters; when false the series is paused. Returns
        the updated series summary so the caller sees the new state without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMonitoredRequest"
      responses:
        "200":
          description: Monitoring flag updated. Returns the updated series summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Malformed id or missing monitored field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/completed:
    patch:
      operationId: setSeriesCompleted
      summary: Mark a series completed (finished)
      description: |
        Sets the completed flag for a series. A completed series is excluded from
        the refresh sweep and from source-health. Reversible (completed=false
        re-opens it). Returns the updated series summary so the caller sees the new
        state without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCompletedRequest"
      responses:
        "200":
          description: Completed flag updated. Returns the updated series summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Malformed id or missing completed field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers:
    patch:
      operationId: reorderSeriesProviders
      summary: Re-rank series providers
      description: |
        Updates the importance values for a series' providers in a single
        all-or-nothing transaction. A higher importance means the provider is
        preferred when selecting the best chapter source. Returns the updated
        series detail so importances are reflected without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderProvidersRequest"
      responses:
        "200":
          description: Provider importances updated. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
