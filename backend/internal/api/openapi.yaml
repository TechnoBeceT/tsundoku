  /api/search:
    get:
      operationId: searchManga
      summary: Multi-source manga search
      description: |
        Fans out a search query to all sources (or a named subset) in parallel,
        groups results by title similarity, and returns []SearchGroup. Per-source
        errors are logged and skipped — partial results are returned with a nil error
        so a single misbehaving source does not block the whole response.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string; must be non-empty.
          schema:
            type: string
        - name: sources
          in: query
          required: false
          description: |
            Comma-separated list of source IDs to restrict the search to.
            Unknown IDs are silently dropped by the service.
          schema:
            type: string
      responses:
        "200":
          description: Grouped search results.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchGroup"
        "400":
          description: Missing or empty q parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/browse:
    get:
      operationId: browseSource
      summary: Browse a source's Popular/Latest catalog
      description: |
        Returns one page of a single source's catalog listing (Popular or Latest)
        as a flat BrowseResult. Unlike search there is no cross-source fan-out or
        grouping — Popular/Latest are per-source listings. The result carries
        hasNextPage so the client can paginate. Some sources do not support the
        Latest listing; an upstream failure surfaces as 500.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID to browse.
          schema:
            type: string
        - name: type
          in: query
          required: true
          description: Which catalog listing to fetch.
          schema:
            type: string
            enum: [popular, latest]
        - name: page
          in: query
          required: false
          description: 1-based page number; defaults to 1, must be >= 1.
          schema:
            type: integer
            default: 1
            minimum: 1
      responses:
        "200":
          description: One page of the source's catalog browse.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowseResult"
        "400":
          description: Missing/invalid type, or a non-integer / out-of-range page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown source ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/chapters:
    get:
      operationId: inspectChapters
      summary: Preview a manga's chapter list
      description: |
        Triggers a live chapter-list fetch from the source and returns a lightweight
        preview as []ChapterInspect. This contacts the upstream provider — use
        before adopting to confirm the chapter count.

        P2 Suwayomi-removal: the backend is now URL-addressed and requires the
        `url` query parameter (the source-relative manga URL); mangaId in the
        path is kept for route-shape compatibility but is IGNORED. A request
        with no `url` gets 400.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Engine-host source ID, stringified.
          schema:
            type: string
        - name: mangaId
          in: path
          required: true
          description: >-
            DEPRECATED, unused by the backend — kept only for wire
            compatibility with older clients. Use the url query param instead.
          schema:
            type: integer
        - name: url
          in: query
          required: false
          description: >-
            Source-relative manga URL (P2 Suwayomi-removal). Optional on the
            wire for backward compatibility, but the backend requires a
            non-empty value and responds 400 when it is missing.
          schema:
            type: string
        - name: title
          in: query
          required: false
          description: >-
            Optional manga display title (e.g. from an already-fetched Discover
            candidate). Improves the engine host's chapter-number recognition
            and lets this preview share its cache entry with a later Adopt for
            the same manga+title (see the mangaTitle-keyed discovery chapter
            cache). Omitting it is safe; recognition still runs, just without
            the title-strip step.
          schema:
            type: string
      responses:
        "200":
          description: Chapter list for the manga.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChapterInspect"
        "400":
          description: Missing url.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/details:
    get:
