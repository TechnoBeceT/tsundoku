openapi: "3.1.0"

info:
  title: Tsundoku API
  version: "0.1.0"
  description: |
    Tsundoku backend API — single-owner manga tracker.
    Authentication: Bearer token obtained from /api/owner/claim or /api/owner/login.

servers:
  - url: /
    description: Same-origin server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT Bearer token issued by /api/owner/claim or /api/owner/login.

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Always "ok" when the server is healthy.
          example: ok

    ClaimRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Desired owner username.
          example: owner
        password:
          type: string
          description: Desired owner password (minimum 8 characters).
          minLength: 8
          example: "s3cret!!"

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Owner username.
          example: owner
        password:
          type: string
          description: Owner password.
          example: "s3cret!!"

    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Signed Bearer JWT for the authenticated owner.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    MeResponse:
      type: object
      required:
        - ownerId
      properties:
        ownerId:
          type: string
          format: uuid
          description: The authenticated owner's UUID.

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable error description.
          example: owner already exists

    ChapterCounts:
      type: object
      required:
        - total
        - downloaded
        - wanted
        - failed
      properties:
        total:
          type: integer
          description: Total number of chapters in the series.
        downloaded:
          type: integer
          description: Chapters currently in the downloaded state.
        wanted:
          type: integer
          description: Chapters currently in the wanted state.
        failed:
          type: integer
          description: Chapters currently in the failed state.

    SeriesSummary:
      type: object
      required:
        - id
        - title
        - displayName
        - slug
        - category
        - coverUrl
        - monitored
        - completed
        - chapterCounts
      properties:
        id:
          type: string
          format: uuid
          description: Series identifier.
        title:
          type: string
          description: Canonical series title (used for slug derivation and disk layout).
        displayName:
          type: string
          description: Resolved display title from the metadata source provider (falls back to title).
        slug:
          type: string
          description: Deterministic URL-safe series slug.
        category:
          type: string
          description: Name of the user-defined category the series is filed under.
        coverUrl:
          type: string
          description: Series cover proxy path ("/api/series/{id}/cover"); empty when no provider has a cover.
        monitored:
          type: boolean
          description: Whether the series is actively tracked for new chapters.
        completed:
          type: boolean
          description: Whether the owner has marked the series finished (excluded from refresh + health).
        chapterCounts:
          $ref: "#/components/schemas/ChapterCounts"

    Chapter:
      type: object
      required:
        - chapterKey
        - number
        - name
        - state
        - filename
        - pageCount
      properties:
        chapterKey:
          type: string
          description: Stable per-series chapter identity (never the number).
        number:
          type: [number, "null"]
          description: Display/sort number; null when unknown. Never identity.
        name:
          type: string
          description: Chapter display title from the best provider's feed (may be empty).
        state:
          type: string
          description: Chapter download state.
        filename:
          type: string
          description: Rendered CBZ filename (empty until downloaded).
        pageCount:
          type: [integer, "null"]
          description: Page count; null until the chapter is downloaded.

    Provider:
      type: object
      required:
        - id
        - provider
        - providerName
        - title
        - coverUrl
        - isMetadataSource
        - linked
        - mangaId
        - chapterCount
        - scanlator
        - language
        - importance
        - health
        - chaptersBehind
        - lastError
      properties:
        id:
          type: string
          format: uuid
          description: SeriesProvider UUID (used by re-rank and metadata-source pin).
        provider:
          type: string
          description: Raw Suwayomi source-ID identity key (e.g. 7537715367149829912).
        providerName:
          type: string
          description: Human-readable source display name (e.g. WebToon); falls back to the id when unresolved. Shown in the UI in place of the id.
        title:
          type: string
          description: This provider's own title for the series (may be empty).
        coverUrl:
          type: string
          description: Provider-level cover proxy path ("/api/series/{id}/providers/{pid}/cover"); empty when no cover.
        isMetadataSource:
          type: boolean
          description: True for the provider currently supplying DisplayName and CoverURL for this series.
        linked:
          type: boolean
          description: >-
            False for a disk-origin provider (an unlinked/unknown group created by
            library import — no real Suwayomi source attached yet); true once a
            real source is attached (via adopt, add-source, or Match). Unlinked
            groups are Match candidates (POST .../providers/{providerId}/match).
        mangaId:
          type: integer
          description: Source's Suwayomi manga id; 0 = unlinked disk provider.
        chapterCount:
          type: integer
          description: How many of the series' chapters this provider currently satisfies (Chapter.satisfied_by).
        scanlator:
          type: string
          description: Scanlation group (may be empty).
        language:
          type: string
          description: Language code (e.g. en).
        importance:
          type: integer
          description: Priority/quality rank — higher is preferred.
        health:
          type: string
          enum: [ok, stale, erroring]
          description: Computed source health within this series.
        chaptersBehind:
          type: integer
          description: How many of the series' chapters this source lacks (informational).
        newestChapterAt:
          type: string
          format: date-time
          nullable: true
          description: Newest chapter upload date this source carries (null if unknown).
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
          description: When a refresh last successfully fetched this source (null if never).
        lastError:
          type: string
          description: Last refresh error for this source (empty if none).

    SeriesDetail:
      type: object
      required:
        - id
        - title
        - displayName
        - slug
        - category
        - coverUrl
        - monitored
        - completed
        - chapterCounts
        - chapters
        - providers
      properties:
        id:
          type: string
          format: uuid
          description: Series identifier.
        title:
          type: string
          description: Canonical series title (used for slug derivation and disk layout).
        displayName:
          type: string
          description: Resolved display title from the metadata source provider (falls back to title).
        slug:
          type: string
          description: Deterministic URL-safe series slug.
        category:
          type: string
          description: Name of the user-defined category the series is filed under.
        coverUrl:
          type: string
          description: Series cover proxy path ("/api/series/{id}/cover"); empty when no provider has a cover.
        monitored:
          type: boolean
          description: Whether the series is actively tracked for new chapters.
        completed:
          type: boolean
          description: Whether the owner has marked the series finished (excluded from refresh + health).
        chapterCounts:
          $ref: "#/components/schemas/ChapterCounts"
        chapters:
          type: array
          description: The series' chapters, ordered by number then chapter key.
          items:
            $ref: "#/components/schemas/Chapter"
        providers:
          type: array
          description: The series' providers.
          items:
            $ref: "#/components/schemas/Provider"

    Category:
      type: object
      required:
        - id
        - name
        - sortOrder
        - protected
        - isDefault
        - count
      properties:
        id:
          type: string
          format: uuid
          description: Category identifier.
        name:
          type: string
          description: Display label and on-disk folder name.
        sortOrder:
          type: integer
          description: Owner-chosen display order (ascending; ties break by name).
        protected:
          type: boolean
          description: True for the seeded "Other" — it can never be renamed.
        isDefault:
          type: boolean
          description: >-
            True for the single default landing category (new / uncategorized
            series file here). It can never be deleted; promote another category
            (PATCH /api/categories/{id}/default) to make this one deletable.
        count:
          type: integer
          description: Number of series filed under this category.

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: New category name (unique, filesystem-safe; becomes the folder name).
        sortOrder:
          type: integer
          description: Optional display order (defaults to 0).

    UpdateCategoryRequest:
      type: object
      description: At least one of name or sortOrder must be present.
      properties:
        name:
          type: string
          description: New name (renames the category and moves its on-disk folder).
        sortOrder:
          type: integer
          description: New display order (DB-only, no disk change).

    SetCategoryRequest:
      type: object
      required:
        - categoryId
      properties:
        categoryId:
          type: string
          format: uuid
          description: UUID of the target Category to file the series under.

    SetMonitoredRequest:
      type: object
      required:
        - monitored
      properties:
        monitored:
          type: boolean
          description: Whether the series should be actively tracked for new chapters.

    SetCompletedRequest:
      type: object
      required:
        - completed
      properties:
        completed:
          type: boolean
          description: Whether the series is finished (no more chapters expected).

    ProviderRank:
      type: object
      required:
        - id
        - importance
      properties:
        id:
          type: string
          format: uuid
          description: SeriesProvider UUID to update.
        importance:
          type: integer
          minimum: 0
          description: New priority/quality rank (non-negative; higher = preferred).

    ReorderProvidersRequest:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          description: Ordered list of (provider id, importance) pairs to apply all-or-nothing.
          minItems: 1
          items:
            $ref: "#/components/schemas/ProviderRank"

    DownloadChapter:
      type: object
      required:
        - id
        - seriesId
        - seriesTitle
        - seriesCategory
        - seriesCoverUrl
        - chapterKey
        - number
        - name
        - state
        - provider
        - providerName
        - retries
        - nextAttemptAt
        - lastError
        - errorCategory
        - filename
        - pageCount
        - downloadDate
      properties:
        id:
          type: string
          format: uuid
          description: Chapter identifier.
        seriesId:
          type: string
          format: uuid
          description: Identifier of the series this chapter belongs to.
        seriesTitle:
          type: string
          description: Resolved series display title (metadata-source title, falls back to canonical title).
        seriesCategory:
          type: string
          enum: [Manga, Manhwa, Manhua, Comic, Other]
          description: Library category of the series.
        seriesCoverUrl:
          type: string
          description: Series cover proxy path ("/api/series/{id}/cover"); empty when no provider has a cover.
        chapterKey:
          type: string
          description: Stable per-series chapter identity (never the number).
        number:
          type: [number, "null"]
          description: Display/sort number; null when unknown. Never identity.
        name:
          type: string
          description: Chapter display title from the best provider's feed (empty when no provider titles it).
        state:
          type: string
          enum: [wanted, downloading, downloaded, upgrade_available, upgrading, failed, permanently_failed]
          description: Chapter download state.
        provider:
          type: string
          description: Raw Suwayomi source-ID key (SeriesProvider.provider) of the satisfying source, else the series' top source.
        providerName:
          type: string
          description: Human-readable source display name of that source; falls back to the id when unresolved. Shown in the UI in place of the id.
        retries:
          type: integer
          description: Number of download attempts so far (0 when never attempted or after a retry reset).
        nextAttemptAt:
          type: string
          format: date-time
          nullable: true
          description: Scheduled next retry time; only set on failed chapters under backoff, else null.
        lastError:
          type: string
          description: Last download error for this chapter (empty if none).
        errorCategory:
          type: string
          description: Coarse error classification (e.g. "network"); empty if none.
        filename:
          type: string
          description: Rendered CBZ filename (empty until downloaded).
        pageCount:
          type: [integer, "null"]
          description: Page count; null until the chapter is downloaded.
        downloadDate:
          type: string
          format: date-time
          nullable: true
          description: When the chapter was downloaded; null until downloaded.

    DownloadList:
      type: object
      required:
        - total
        - items
      properties:
        total:
          type: integer
          description: Total chapters matching the state filter across the whole library (not just the page).
        items:
          type: array
          description: The requested page of enriched chapters.
          items:
            $ref: "#/components/schemas/DownloadChapter"

    RetryAllResult:
      type: object
      required:
        - retried
      properties:
        retried:
          type: integer
          description: Number of chapters reset back to wanted by the bulk retry.

    DedupeFilesResult:
      type: object
      required:
        - removed
      properties:
        removed:
          type: integer
          description: >-
            Number of superseded duplicate CBZ files removed from disk by the
            owner-triggered dedupe-files sweep. Winning files are never removed.

    Source:
      type: object
      required:
        - id
        - name
        - lang
      properties:
        id:
          type: string
          description: Suwayomi source identifier (64-bit integer serialised as string).
          example: "1998416842837112832"
        name:
          type: string
          description: Human-readable source name (e.g. "MangaDex").
          example: MangaDex
        lang:
          type: string
          description: BCP-47 content language tag for this source (e.g. "en", "ko").
          example: en

    SearchCandidate:
      type: object
      required:
        - source
        - sourceName
        - lang
        - mangaId
        - title
        - url
        - thumbnailUrl
        - author
        - artist
        - description
        - genres
      properties:
        source:
          type: string
          description: Suwayomi source ID from which this candidate came.
        sourceName:
          type: string
          description: Human-readable source name.
        lang:
          type: string
          description: Content language of this source.
        mangaId:
          type: integer
          description: Suwayomi-internal manga identifier within this source.
        title:
          type: string
          description: Manga display title as returned by the source.
        url:
          type: string
          description: Provider-canonical URL for this manga (powers the "View on source" link); empty string when not provided.
        thumbnailUrl:
          type: string
          description: |
            Tsundoku's own cover-proxy path ("/api/sources/{source}/manga/{mangaId}/cover"),
            never Suwayomi's raw thumbnail URL. Empty string when the source provided no
            thumbnail at all.
        author:
          type: string
          description: Manga's writing credit; empty string when not provided.
        artist:
          type: string
          description: Manga's art credit; empty string when not provided.
        description:
          type: string
          description: Synopsis/summary text; empty string when not provided.
        genres:
          type: array
          description: Genre/tag list; empty array when the source provides none.
          items:
            type: string

    BrowseResult:
      type: object
      description: One page of a source's catalog browse (Popular/Latest) — a flat candidate list in source order plus pagination metadata.
      required:
        - manga
        - hasNextPage
        - page
      properties:
        manga:
          type: array
          description: Candidates on this page, in source order.
          items:
            $ref: "#/components/schemas/SearchCandidate"
        hasNextPage:
          type: boolean
          description: Whether another page exists (drives pagination).
        page:
          type: integer
          description: The 1-based page number returned.

    SearchGroup:
      type: object
      required:
        - title
        - candidates
      properties:
        title:
          type: string
          description: Representative display title chosen by the grouping logic.
        candidates:
          type: array
          description: Every source hit that belongs to this group.
          items:
            $ref: "#/components/schemas/SearchCandidate"

    ChapterInspect:
      type: object
      required:
        - number
        - name
        - scanlator
      properties:
        number:
          type: [number, "null"]
          description: Parsed chapter number (e.g. 1.5); null when not available.
        name:
          type: string
          description: Chapter display name (e.g. "Chapter 1").
        scanlator:
          type: string
          description: Scanlation group credited for this chapter; empty string when untagged.

    AdoptProvider:
      type: object
      required:
        - source
        - mangaId
        - importance
      properties:
        source:
          type: string
          description: Suwayomi source ID (e.g. "mangadex").
        mangaId:
          type: integer
          description: Suwayomi-internal manga identifier within the source.
        importance:
          type: integer
          minimum: 0
          description: Provider rank for this series (higher = preferred).
        scanlator:
          type: string
          description: |
            Selects which scanlation group's chapters this provider tracks; omit or send ""
            for "all chapters from this source". The same source may appear more than once
            under different scanlators, each with its own importance.

    ScanlatorCoverage:
      type: object
      description: One scanlator's chapter coverage for a source-manga.
      required:
        - scanlator
        - count
        - ranges
      properties:
        scanlator:
          type: string
          description: Group name; the source name when chapters carry no scanlator tag.
        count:
          type: integer
          description: Number of chapters this scanlator has published.
        ranges:
          type: string
          description: Human-readable coverage string, e.g. "1-90, 92-101".

    SourceBreakdown:
      type: object
      description: |
        Per-scanlator breakdown of a source-manga's chapters, used by the adopt UI to
        auto-split a source into per-scanlator rows with counts + ranges.
      required:
        - total
        - scanlators
      properties:
        total:
          type: integer
          description: Total chapter count across all scanlators.
        scanlators:
          type: array
          description: Per-scanlator breakdown, sorted by count descending (ties by name ascending).
          items:
            $ref: "#/components/schemas/ScanlatorCoverage"

    AdoptRequest:
      type: object
      required:
        - title
        - providers
      properties:
        title:
          type: string
          description: Canonical series title; all providers attach to the series slug derived from this.
        category:
          type: string
          description: Target category by NAME (user-defined; free string).
        providers:
          type: array
          description: Ordered list of (source, manga) pairs to adopt; must have at least one entry.
          minItems: 1
          items:
            $ref: "#/components/schemas/AdoptProvider"

    SetMetadataSourceRequest:
      type: object
      properties:
        providerId:
          type: [string, "null"]
          format: uuid
          description: |
            SeriesProvider UUID to pin as the metadata source, or null/absent to reset
            to automatic resolution (highest-importance provider). A malformed UUID
            yields 400.

    LibraryHealth:
      type: object
      required: [series]
      properties:
        series:
          type: array
          items:
            $ref: "#/components/schemas/SeriesHealth"

    SeriesHealth:
      type: object
      required: [id, title, slug, sources]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Provider"

    System:
      type: object
      required: [storageFolder, serverPort, database]
      properties:
        storageFolder:
          type: string
          description: Absolute path to the manga library on disk.
          example: /data/manga
        serverPort:
          type: string
          description: TCP port the HTTP server listens on.
          example: "9833"
        database:
          type: string
          description: |
            Credential-free display string for the PostgreSQL target:
            "host:port/name". Password and username are never included.
          example: "127.0.0.1:5432/tsundoku"

    Setting:
      type: object
      required: [key, value, default, type, unit]
      properties:
        key:
          type: string
          description: The tunable key (an allowlisted dotted key).
          example: jobs.download_interval
        value:
          type: string
          description: The current resolved value (DB override if set, else the default).
          example: 15m0s
        default:
          type: string
          description: The env-config default for this key.
          example: 15m0s
        type:
          type: string
          description: Value representation — "duration" (Go duration string) or "int".
          enum: [duration, int]
        unit:
          type: string
          description: Semantic unit hint for the UI (e.g. "duration", "count", "days").
          example: duration

    SettingsUpdateRequest:
      type: object
      required: [settings]
      properties:
        settings:
          type: array
          description: |
            Batch of key/value updates applied all-or-nothing — an unknown key or an
            out-of-bounds value rejects the whole batch with 400 naming the bad key.
          minItems: 1
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
                example: jobs.download_interval
              value:
                type: string
                example: 30m

    SourceMetric:
      type: object
      description: |
        One source's rolling search-performance snapshot. "isSlow" is derived at
        read time (ewmaLatencyMs > the current slow threshold), never stored — so
        the threshold can be re-tuned without a migration.
      required:
        - sourceId
        - sourceName
        - ewmaLatencyMs
        - lastLatencyMs
        - searchCount
        - successCount
        - failCount
        - lastError
        - updatedAt
        - isSlow
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id.
        sourceName:
          type: string
          description: The source's display name (denormalized).
        ewmaLatencyMs:
          type: integer
          description: Exponentially-weighted rolling search latency, in milliseconds.
        lastLatencyMs:
          type: integer
          description: Most recent measured search latency, in milliseconds.
        searchCount:
          type: integer
          description: Lifetime number of recorded searches against this source.
        successCount:
          type: integer
          description: Lifetime number of successful searches.
        failCount:
          type: integer
          description: Lifetime number of failed/timed-out searches.
        lastError:
          type: string
          description: Most recent failure reason ("" when none).
        lastErrorAt:
          type: string
          format: date-time
          description: When the most recent failure occurred (absent if never failed).
        lastSuccessAt:
          type: string
          format: date-time
          description: When the most recent success occurred (absent if never succeeded).
        lastWarmedAt:
          type: string
          format: date-time
          description: When the source was last warmed (absent if never warmed).
        updatedAt:
          type: string
          format: date-time
          description: When this snapshot was last written.
        isSlow:
          type: boolean
          description: |
            Derived flag — true when the source has never been measured OR its
            ewmaLatencyMs exceeds the current slow threshold.

    SourceWarmStarted:
      type: object
      required: [started]
      properties:
        started:
          type: boolean
          description: |
            Always true — acknowledges the warm-up pass was kicked off in the
            background. The pass runs detached (it takes minutes over slow
            anti-bot sources); its per-source outcome surfaces in
            GET /api/sources/metrics (lastWarmedAt / lastError), not here.
          example: true

    RunDownloadsResult:
      type: object
      required: [started]
      properties:
        started:
          type: boolean
          description: |
            Always true — acknowledges an immediate download cycle was
            triggered. The trigger is non-blocking + cap-1 coalescing, so this
            response does not distinguish a freshly-started cycle from one that
            was already running; watch the cycle.start/cycle.done/download.*
            SSE stream for actual progress.
          example: true

    SuwayomiSettings:
      type: object
      description: |
        The FlareSolverr (Cloudflare-bypass) + SOCKS-proxy subset of Suwayomi's
        server-global settings, proxied verbatim from the active Suwayomi (embed
        or external). Tsundoku stores none of these values.
      required: [flareSolverr, socksProxy]
      properties:
        flareSolverr:
          $ref: "#/components/schemas/FlareSolverrSettings"
        socksProxy:
          $ref: "#/components/schemas/SocksProxySettings"

    FlareSolverrSettings:
      type: object
      required: [enabled, url, timeout, sessionName, sessionTtl, asResponseFallback]
      properties:
        enabled:
          type: boolean
          description: Toggles the FlareSolverr Cloudflare-bypass proxy.
        url:
          type: string
          description: The FlareSolverr endpoint (e.g. http://host:8191).
          example: http://localhost:8191
        timeout:
          type: integer
          description: Per-request timeout in seconds.
          example: 60
        sessionName:
          type: string
          description: The FlareSolverr session identifier.
        sessionTtl:
          type: integer
          description: Session time-to-live in minutes.
          example: 15
        asResponseFallback:
          type: boolean
          description: Use FlareSolverr only as a fallback for blocked requests.

    SocksProxySettings:
      type: object
      required: [enabled, version, host, port, username, password]
      properties:
        enabled:
          type: boolean
          description: Toggles routing source traffic through the SOCKS proxy.
        version:
          type: integer
          description: SOCKS protocol version (4 or 5).
          enum: [4, 5]
          example: 5
        host:
          type: string
          description: Proxy hostname or IP.
        port:
          type: string
          description: Proxy port (numeric string; Suwayomi types it as a String).
          example: "1080"
        username:
          type: string
          description: Optional proxy username.
        password:
          type: string
          description: Optional proxy password.

    SuwayomiSettingsUpdate:
      type: object
      description: |
        A PARTIAL update of the FlareSolverr + SOCKS subset. Both groups and every
        field within them are optional: an omitted group or field is left
        untouched, so no unset setting is clobbered. At least one field must be
        present (an empty body is a 400).
      properties:
        flareSolverr:
          $ref: "#/components/schemas/FlareSolverrUpdate"
        socksProxy:
          $ref: "#/components/schemas/SocksProxyUpdate"

    FlareSolverrUpdate:
      type: object
      description: Partial FlareSolverr group; omitted fields are untouched.
      properties:
        enabled:
          type: boolean
        url:
          type: string
          description: Absolute http(s) URL, or empty string to clear.
        timeout:
          type: integer
          description: Per-request timeout in seconds (non-negative).
        sessionName:
          type: string
        sessionTtl:
          type: integer
          description: Session TTL in minutes (non-negative).
        asResponseFallback:
          type: boolean

    SocksProxyUpdate:
      type: object
      description: Partial SOCKS-proxy group; omitted fields are untouched.
      properties:
        enabled:
          type: boolean
        version:
          type: integer
          description: SOCKS protocol version (4 or 5).
          enum: [4, 5]
        host:
          type: string
        port:
          type: string
          description: Numeric string in 1..65535.
        username:
          type: string
        password:
          type: string

    Extension:
      type: object
      description: |
        A Suwayomi extension (a Tachiyomi/Mihon source plugin), proxied verbatim
        from the active Suwayomi (embed or external). Tsundoku stores none of
        this. The identity is pkgName (there is no numeric id); the install/nsfw/
        obsolete flags use Suwayomi's isInstalled/isNsfw/isObsolete naming.
      required:
        - pkgName
        - name
        - lang
        - versionName
        - versionCode
        - iconUrl
        - repo
        - isInstalled
        - hasUpdate
        - isNsfw
        - isObsolete
      properties:
        pkgName:
          type: string
          description: The extension package name — its stable identity.
          example: eu.kanade.tachiyomi.extension.en.mangadex
        name:
          type: string
          description: Human-readable display name.
          example: MangaDex
        lang:
          type: string
          description: BCP-47 language tag the extension serves.
          example: en
        versionName:
          type: string
          description: Human-readable version string.
          example: 1.4.2
        versionCode:
          type: integer
          description: Integer version code.
          example: 42
        iconUrl:
          type: string
          description: Tsundoku same-origin icon proxy path ("/api/suwayomi/extensions/{pkgName}/icon"), not Suwayomi's own raw (cross-origin) icon URL.
        repo:
          type: string
          description: Source repo URL this extension came from; "" when null.
        isInstalled:
          type: boolean
          description: Whether the extension is currently installed.
        hasUpdate:
          type: boolean
          description: Whether an installed extension has a newer version available.
        isNsfw:
          type: boolean
          description: Whether the extension is flagged not-safe-for-work.
        isObsolete:
          type: boolean
          description: Whether the extension is orphaned (no longer in any repo).

    ExtensionRepos:
      type: object
      description: The configured extension repo URL list.
      required: [repos]
      properties:
        repos:
          type: array
          description: Extension repo URLs (empty array when none configured).
          items:
            type: string

    ExtensionReposUpdate:
      type: object
      description: |
        REPLACES the extension repo URL list (PUT = replace, not merge). repos
        must be present (a JSON array); an empty array clears all repos. Each
        entry must be an absolute http(s) URL with a host.
      required: [repos]
      properties:
        repos:
          type: array
          items:
            type: string
            description: Absolute http(s) URL.
          example:
            - https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json

    SourcePreference:
      type: object
      description: |
        One configurable preference of a Suwayomi source (a Tachiyomi/Mihon
        source setting), flattened from the GraphQL Preference union. Read `type`
        first: it decides how `currentValue`/`default` are typed —
        CheckBoxPreference/SwitchPreference are booleans, ListPreference/
        EditTextPreference are strings (List also carries entries/entryValues),
        MultiSelectListPreference are string arrays. `position` is the 0-based
        array index and is the ONLY write selector; it must come from a FRESH read
        (the array order can shift server-side — never cache positions).
      required:
        - type
        - position
        - key
        - title
        - summary
        - currentValue
        - default
        - entries
        - entryValues
      properties:
        type:
          type: string
          description: The union variant (Suwayomi __typename).
          enum:
            - CheckBoxPreference
            - SwitchPreference
            - ListPreference
            - MultiSelectListPreference
            - EditTextPreference
        position:
          type: integer
          description: 0-based array index — the (position-indexed) write selector.
        key:
          type: string
          description: Source-internal preference key ("" when null).
        title:
          type: string
          description: Human-readable label ("" when null).
        summary:
          type: string
          description: Human-readable help text ("" when null).
        currentValue:
          nullable: true
          description: |
            Current value; null when unset. A boolean for CheckBox/Switch, a
            string for List/EditText, an array of strings for MultiSelectList.
          oneOf:
            - type: boolean
            - type: string
            - type: array
              items:
                type: string
        default:
          nullable: true
          description: |
            Default value; null when unset. Same per-variant typing as currentValue.
          oneOf:
            - type: boolean
            - type: string
            - type: array
              items:
                type: string
        entries:
          type: array
          description: Human-readable option labels (List/MultiSelect only; [] otherwise).
          items:
            type: string
        entryValues:
          type: array
          description: Stored option values matching entries by index (List/MultiSelect only; [] otherwise).
          items:
            type: string

    SourcePreferencesGroup:
      type: object
      description: One source's preferences within a grouped extension response (one source per language).
      required:
        - sourceId
        - sourceName
        - lang
        - enabled
        - preferences
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id (the write body's sourceId).
        sourceName:
          type: string
          description: Human-readable source name.
        lang:
          type: string
          description: BCP-47 language tag.
        enabled:
          type: boolean
          description: |
            The per-language enable/disable toggle. A disabled source is hidden
            from Tsundoku's Discover/Search/Browse source lists but keeps
            updating any series already adopted from it. Toggled via
            PATCH /api/suwayomi/sources/{sourceId}/enabled.
        preferences:
          type: array
          description: This source's configurable preferences, in array order.
          items:
            $ref: "#/components/schemas/SourcePreference"

    SourceEnabled:
      type: object
      description: The authoritative per-language enable/disable state, re-read after a write (§16 round-trip).
      required:
        - sourceId
        - enabled
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id.
        enabled:
          type: boolean
          description: The enable/disable state as re-read after the write.

    SetSourceEnabledRequest:
      type: object
      description: Set the per-language enable/disable state for one source.
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: The new enable/disable state.

    SourcePreferencesBySource:
      type: object
      description: An extension's per-source preferences, grouped by the (per-language) source they belong to.
      required:
        - sources
      properties:
        sources:
          type: array
          description: The extension's sources, each with its own preference list.
          items:
            $ref: "#/components/schemas/SourcePreferencesGroup"

    SetSourcePreferenceRequest:
      type: object
      description: |
        Write one source preference by POSITION. `value`'s JSON type must match the
        variant at that position (boolean → CheckBox/Switch, string → List/EditText,
        array of strings → MultiSelectList) — a mismatch is a 400. position must be
        taken from a fresh read (positions can shift server-side).
      required:
        - sourceId
        - position
        - value
      properties:
        sourceId:
          type: string
          description: The Suwayomi source id the preference belongs to.
        position:
          type: integer
          minimum: 0
          description: 0-based array index of the preference to write.
        value:
          nullable: true
          description: New value — a boolean, a string, or an array of strings (by variant).
          oneOf:
            - type: boolean
            - type: string
            - type: array
              items:
                type: string

    ScanStarted:
      type: object
      description: Result of a POST /api/library/scan call — whether this call launched the background scan (202) or one was already in flight (409).
      required:
        - started
      properties:
        started:
          type: boolean
          description: true if this call launched the scan; false if a scan was already running (single-flight guard).

    FoundSeries:
      type: object
      description: One row of a library scan's staging result — a series discovered on disk (whether or not it is already imported into the DB).
      required:
        - path
        - title
        - category
        - chapterCount
        - providers
        - status
        - alreadyInDb
      properties:
        path:
          type: string
          description: Absolute on-disk path to the series folder.
        title:
          type: string
          description: Series title as read from disk (ComicInfo.xml/sidecar or folder name).
        category:
          type: string
          description: Category folder name this series was found under.
        chapterCount:
          type: integer
          description: Number of chapter files found on disk for this series.
        providers:
          type: array
          description: Provider keys recorded in the sidecar for this series (empty when no provenance is known).
          items:
            type: string
        status:
          type: string
          description: Staging status of this entry (pending/imported/skipped).
        alreadyInDb:
          type: boolean
          description: Whether a Series row with this title/slug already exists in the DB.

    ProviderRef:
      type: object
      description: |
        Identifies one Suwayomi source+manga+scanlator to attach to a series.
        Carries no importance — the batch attach (library.AddProviders)
        assigns importances itself, each strictly below the series' existing
        providers (decision E), in list order.
      required:
        - source
        - mangaId
      properties:
        source:
          type: string
          description: Suwayomi source ID the chosen candidate came from.
        mangaId:
          type: integer
          description: Suwayomi-internal manga identifier within that source.
        scanlator:
          type: string
          description: |
            Selects which scanlation group's chapters this provider tracks; omit or send ""
            for "all chapters from this source". The same source may be attached again
            under a different scanlator.

    ImportRequest:
      type: object
      description: Registers a staged library-scan entry as already downloaded (no re-download), optionally attaching a list of owner-matched Suwayomi sources.
      required:
        - path
      properties:
        path:
          type: string
          description: The staged entry's on-disk path (as returned by a prior scan/list).
        matches:
          type: array
          description: |
            Owner-chosen Suwayomi sources to attach at import time (empty/absent = disk-only
            import, no attach). Each lands at an importance strictly below the disk provider's
            (decision E) via library.AddProviders — no upgrade re-download fires.
          items:
            $ref: "#/components/schemas/ProviderRef"

    SkipRequest:
      type: object
      description: Marks a staged library-scan entry as skipped — leave it on disk, stop showing it as pending.
      required:
        - path
      properties:
        path:
          type: string
          description: The staged entry's on-disk path (as returned by a prior scan/list).

    BatchImportRequest:
      type: object
      description: |
        Bulk "import all remaining as disk-only" request — one call instead
        of N sequential POST /api/library/import calls for a 1000+ series
        migration. Every path is imported disk-only (no match attached).
      required:
        - paths
      properties:
        paths:
          type: array
          description: Staged entries' on-disk paths (as returned by a prior scan/list). Capped at 500 per request.
          items:
            type: string

    BatchImportFailure:
      type: object
      description: One path's failure within a batch import.
      required:
        - path
        - message
      properties:
        path:
          type: string
          description: The on-disk path that failed to import.
        message:
          type: string
          description: The underlying error message for this path.

    BatchImportResult:
      type: object
      description: |
        Result of a batch import — partial success by design: a bad path is
        recorded in `failed` and never aborts the rest of the batch.
      required:
        - imported
        - failed
      properties:
        imported:
          type: integer
          description: Number of paths that imported successfully.
        failed:
          type: array
          description: Per-path failures (empty if every path imported successfully).
          items:
            $ref: "#/components/schemas/BatchImportFailure"

    AddProvidersRequest:
      type: object
      description: |
        Attaches several Suwayomi sources to an existing series in one call
        (Slice P batch attach). Ordered best-first — each entry lands at an
        importance strictly below the series' existing providers (decision
        E), assigned by the server, not the caller.
      required:
        - providers
      properties:
        providers:
          type: array
          minItems: 1
          description: The sources to attach, best-first.
          items:
            $ref: "#/components/schemas/ProviderRef"

    AddProviderRequest:
      type: object
      description: Attaches an additional Suwayomi source to an existing series.
      required:
        - source
        - mangaId
        - importance
      properties:
        source:
          type: string
          description: Suwayomi source ID the chosen candidate came from.
        mangaId:
          type: integer
          description: Suwayomi-internal manga identifier within that source.
        importance:
          type: integer
          description: Provider importance to assign (higher number = higher priority).
        scanlator:
          type: string
          description: |
            Selects which scanlation group's chapters this provider tracks; omit or send ""
            for "all chapters from this source". The same source may be attached again
            under a different scanlator.

    ProviderDedupResult:
      type: object
      description: |
        Result of an owner-triggered provider dedup: how many drifted
        disk/live source pairs were merged, how many were skipped, and the
        refreshed series detail after the cleanup.
      required:
        - merged
        - skipped
        - series
      properties:
        merged:
          type: integer
          description: Number of drifted disk/live source pairs folded into one row.
        skipped:
          type: integer
          description: >-
            Number of matching pairs left untouched because the linked twin has
            no fetched chapters yet (merging would orphan the disk chapters).
        series:
          $ref: "#/components/schemas/SeriesDetail"

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns HTTP 200 with {"status":"ok"} when the server is running. No authentication required.
      tags:
        - system
      responses:
        "200":
          description: Server is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/owner/claim:
    post:
      operationId: claimOwner
      summary: First-run owner claim
      description: |
        Creates the single owner account. Succeeds exactly once — if any owner
        already exists the request is rejected with 409 Conflict (fail-closed).
        Concurrent claims are serialised; only one will succeed.
      tags:
        - owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimRequest"
      responses:
        "200":
          description: Owner created. Returns a signed Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: An owner already exists; claim is permanently rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/owner/login:
    post:
      operationId: loginOwner
      summary: Owner login
      description: |
        Authenticates with username and password and returns a signed Bearer token.
        Returns 401 for wrong credentials without revealing which field was wrong.
      tags:
        - owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Credentials accepted. Returns a signed Bearer token and sets an HttpOnly session cookie.
          headers:
            Set-Cookie:
              description: HttpOnly session cookie (tsundoku_session).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/owner/logout:
    post:
      operationId: logoutOwner
      summary: Clear the owner session cookie.
      tags:
        - owner
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Logged out (session cookie cleared).
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/owner/me:
    get:
      operationId: getOwner
      summary: The authenticated owner's identity.
      tags:
        - owner
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The authenticated owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/progress:
    get:
      operationId: streamProgress
      summary: SSE progress stream
      description: |
        Server-Sent Events stream delivering real-time progress events.
        Requires a valid Bearer token sent via the Authorization header
        (not via query-string — QCAT-018). The client must use a fetch-based
        SSE implementation, not the browser EventSource API, to support
        custom headers.
      tags:
        - sse
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SSE stream opened. Events are pushed as `text/event-stream`.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Newline-delimited SSE frames. Each frame carries a `data:` field
                  containing a JSON-encoded progress event. The `event:` field names
                  the event type (e.g. `chapter.downloaded`, `series.synced`,
                  `scan.start`/`scan.progress`/`scan.done` — emitted by the async
                  library scan, see POST /api/library/scan).
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series:
    get:
      operationId: listSeries
      summary: List library series
      description: |
        Returns a title-ascending page of series summaries with per-series
        chapter-state rollups. Optionally filtered by category and paginated.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          description: Restrict to a single category by NAME (user-defined; free string).
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Page size (default 50, capped at 200).
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          required: false
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: A page of series summaries.
          headers:
            X-Total-Count:
              description: Total number of series matching the filter (across all pages).
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Invalid category or pagination parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adoptSeries
      summary: Adopt / import a manga into the library
      description: |
        Groups one or more (source, manga) candidates under a single canonical title
        and merges them into ONE Series with N importance-ranked providers, ingesting
        all their chapters. On success, returns the full SeriesDetail of the newly
        created series so the caller sees the persisted state without a refetch (§16).
      tags:
        - imports
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdoptRequest"
      responses:
        "201":
          description: Series adopted. Returns the full series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Validation error (blank title, empty providers, invalid category, duplicate provider pair, negative importance).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}:
    get:
      operationId: getSeries
      summary: Get series detail
      description: Returns the full detail of one series — summary fields, chapters, and providers.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteSeries
      summary: Delete a whole series
      description: |
        Permanently removes a series and all its tracking data (providers, chapter
        feeds, sync state, chapters). When deleteFiles=true the downloaded CBZs and
        the series' library folder are also removed from disk (permanent — recover
        by re-adopting from source). When deleteFiles=false the CBZs are kept on
        disk (only DB tracking is removed; a later reconcile can rebuild the series
        from the on-disk sidecar). Returns 204 No Content.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: deleteFiles
          in: query
          required: true
          description: Whether to also delete the downloaded CBZ files + folder from disk.
          schema:
            type: boolean
      responses:
        "204":
          description: Series deleted.
        "400":
          description: Malformed id or missing/invalid deleteFiles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/category:
    patch:
      operationId: setSeriesCategory
      summary: Recategorize a series
      description: |
        Files the series under a new category. The on-disk series folder is moved
        before the database is updated (with compensation) so the DB and disk
        never drift. Returns the updated series summary.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCategoryRequest"
      responses:
        "200":
          description: Recategorized. Returns the updated series summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Malformed id, malformed categoryId, or unknown category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/monitored:
    patch:
      operationId: setSeriesMonitored
      summary: Toggle series monitoring
      description: |
        Sets the monitored flag for a series. When monitored is true the download
        ticker will pick up new chapters; when false the series is paused. Returns
        the updated series summary so the caller sees the new state without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMonitoredRequest"
      responses:
        "200":
          description: Monitoring flag updated. Returns the updated series summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Malformed id or missing monitored field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/completed:
    patch:
      operationId: setSeriesCompleted
      summary: Mark a series completed (finished)
      description: |
        Sets the completed flag for a series. A completed series is excluded from
        the refresh sweep and from source-health. Reversible (completed=false
        re-opens it). Returns the updated series summary so the caller sees the new
        state without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCompletedRequest"
      responses:
        "200":
          description: Completed flag updated. Returns the updated series summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesSummary"
        "400":
          description: Malformed id or missing completed field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers:
    patch:
      operationId: reorderSeriesProviders
      summary: Re-rank series providers
      description: |
        Updates the importance values for a series' providers in a single
        all-or-nothing transaction. A higher importance means the provider is
        preferred when selecting the best chapter source. Returns the updated
        series detail so importances are reflected without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderProvidersRequest"
      responses:
        "200":
          description: Provider importances updated. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed id, invalid provider UUID, empty list, or provider not in series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: addSeriesProvider
      summary: Attach an additional source to an existing series
      description: |
        Adds a Suwayomi source {source, mangaId, importance} as a new provider
        on an existing series (upgrade-aware — the new source's chapter feed
        is ingested and ranked against the series' existing sources). Returns
        the refreshed series detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProviderRequest"
      responses:
        "200":
          description: Provider attached. Returns the refreshed series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed id, or an invalid/missing source, mangaId, or importance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id, or no such Suwayomi source/manga.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The source is already attached to this series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/batch:
    post:
      operationId: addSeriesProviders
      summary: Attach several sources to an existing series in one call
      description: |
        Batch counterpart of POST /api/series/{id}/providers (Slice P): attaches
        several Suwayomi sources {source, mangaId, scanlator} to an existing
        series in one request, ordered best-first. Each source is ingested and
        lands at an importance strictly below the series' existing providers
        (decision E), assigned by the server. Returns the refreshed series
        detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProvidersRequest"
      responses:
        "200":
          description: All providers attached. Returns the refreshed series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed id, empty providers list, or an invalid/missing source or mangaId in one of the entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id, or no such Suwayomi source/manga for one of the entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: One of the sources is already attached to this series (sources attached before the failing entry are NOT rolled back).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/{providerId}/match:
    post:
      operationId: matchDiskProvider
      summary: Attribute existing on-disk chapters to a real source without re-downloading
      description: |
        Attributes a series' EXISTING imported/on-disk chapters — currently
        satisfied by the UNLINKED disk-origin provider at {providerId} (see
        Provider.linked) — to a real Suwayomi source {source, mangaId,
        scanlator, importance} WITHOUT re-downloading them. The real source is
        attached, every chapter it also offers is re-pointed onto it (so no
        upgrade is ever triggered for them), its CBZ is renamed + its embedded
        ComicInfo rewritten to the source's identity, and the now-empty disk
        provider is deleted. A chapter the disk group had but the new source
        lacks keeps its prior watermark (never re-downloaded, never dropped).
        Returns the refreshed series detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: path
          required: true
          description: The disk-origin (unlinked) SeriesProvider UUID to match away from.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProviderRequest"
      responses:
        "200":
          description: Chapters re-attributed. Returns the refreshed series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: >-
            Malformed id/providerId, invalid/missing source, mangaId, or
            importance, the provider does not belong to the series, or the
            provider is already a real (linked) source, not a disk-origin one.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id, or no such Suwayomi source/manga.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/dedup:
    post:
      operationId: dedupSeriesProviders
      summary: Merge already-drifted disk/live source pairs on a series
      description: |
        Cleans up source-identity drift that already happened: a series carrying
        BOTH an unlinked disk-origin provider AND a real linked provider that are
        actually the same physical source (same display name + scanlator). Each
        such pair is folded into one row WITHOUT re-downloading — the disk
        chapters are relabeled onto the linked source and the drained disk row is
        deleted. A pair whose linked twin has no fetched chapters yet is skipped
        (merging would orphan the disk chapters). Idempotent: with no drifted
        pairs it changes nothing. Returns the merged/skipped counts plus the
        refreshed series detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dedup complete. Returns counts and the refreshed series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDedupResult"
        "400":
          description: Malformed series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/dedupe-files:
    post:
      operationId: dedupeSeriesFiles
      summary: Remove superseded duplicate CBZ files for a series
      description: |
        Owner-triggered duplicate-CBZ sweep. For every downloaded chapter it
        removes any OTHER CBZ in the series folder that shares that chapter's
        number, keeping the chapter's winning file — converging the on-disk state
        to one file per chapter number (the Komga contract). This is the bulk
        counterpart to the automatic per-convergence cleanup on upgrade; it
        cleans up a library that accumulated duplicates before convergence
        existed (e.g. an imported Kaizoku library). Performs NO DB writes and
        never deletes a winning file. Returns the number of files removed.
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Sweep complete. Returns the number of files removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DedupeFilesResult"
        "400":
          description: Malformed series id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/{providerId}:
    delete:
      operationId: removeSeriesProvider
      summary: Remove a source from a series
      description: |
        Removes one source (provider) from a series: deletes the provider, its
        chapter availability feed, and its sync state, and clears the
        satisfied-by link on any chapters it had satisfied — while keeping every
        downloaded CBZ on disk. Removing the last source leaves a zero-provider
        series in place. Returns the updated series detail (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: path
          required: true
          description: SeriesProvider UUID to remove.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Source removed. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed series or provider UUID, or provider not in series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/cover:
    get:
      operationId: getSeriesCover
      summary: Series cover image
      description: |
        Streams the cover image for the series' resolved metadata source provider.
        The image is fetched from Suwayomi and returned as a binary blob. Returns 404
        when the series has no cover, 502 when Suwayomi fails to fetch it.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The cover image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Series not found or no cover available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the cover image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/providers/{providerId}/cover:
    get:
      operationId: getProviderCover
      summary: Provider cover image
      description: |
        Streams the cover image for a specific provider within a series. The image is
        fetched from Suwayomi and returned as a binary blob. Returns 404 when the
        provider has no cover or does not belong to the series, 502 on a Suwayomi
        fetch failure.
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: path
          required: true
          description: SeriesProvider UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The cover image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Series or provider not found, or no cover available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the cover image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/series/{id}/metadata-source:
    patch:
      operationId: setSeriesMetadataSource
      summary: Pin metadata source
      description: |
        Pins the series' metadata source to the given provider (providerId non-null) or
        resets to automatic resolution (highest-importance provider) when providerId is
        null or absent. Returns the full series detail so isMetadataSource is reflected
        without a refetch (§16).
      tags:
        - series
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMetadataSourceRequest"
      responses:
        "200":
          description: Metadata source updated. Returns the updated series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Malformed series id, malformed providerId UUID, or providerId does not belong to the series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No series with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/categories:
    get:
      operationId: listCategories
      summary: List categories
      description: Returns every user-defined category ordered by sort order then name, each with its current series count.
      tags:
        - categories
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All categories.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCategory
      summary: Create a category
      description: Creates a new, empty category. The name must be unique and filesystem-safe (it becomes the on-disk folder name).
      tags:
        - categories
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Created. Returns the new category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Invalid category name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A category with that name already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/categories/{id}:
    patch:
      operationId: updateCategory
      summary: Rename and/or reorder a category
      description: |
        Renames the category (moving its on-disk folder, with compensation so DB
        and disk never drift) and/or updates its sort order. At least one of name
        or sortOrder must be present. The protected default ("Other") cannot be
        renamed. Returns the updated category.
      tags:
        - categories
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Updated. Returns the category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Malformed id, empty body, invalid name, or the protected default.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No category with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Another category already uses that name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCategory
      summary: Delete an empty category
      description: |
        Deletes a category only when no series is filed under it. The protected
        default ("Other") can never be deleted. No series or CBZ is removed.
      tags:
        - categories
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category UUID.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted.
        "400":
          description: Malformed id or the protected default.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No category with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The category still has series filed under it.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/categories/{id}/default:
    patch:
      operationId: setDefaultCategory
      summary: Set the default landing category
      description: |
        Promotes the category to be the single default that new / uncategorized
        series are filed under, demoting the previous default in the same
        transaction. The default can never be deleted; the previously-default
        category becomes deletable. No series or folder is moved. Returns the
        updated category.
      tags:
        - categories
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated. Returns the now-default category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Malformed id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No category with the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources:
    get:
      operationId: listSources
      summary: List Suwayomi sources
      description: Returns all installed Suwayomi sources (extensions) as a flat list.
      tags:
        - imports
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All available sources.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/search:
    get:
      operationId: searchManga
      summary: Multi-source manga search
      description: |
        Fans out a search query to all sources (or a named subset) in parallel,
        groups results by title similarity, and returns []SearchGroup. Per-source
        errors are logged and skipped — partial results are returned with a nil error
        so a single misbehaving source does not block the whole response.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string; must be non-empty.
          schema:
            type: string
        - name: sources
          in: query
          required: false
          description: |
            Comma-separated list of source IDs to restrict the search to.
            Unknown IDs are silently dropped by the service.
          schema:
            type: string
      responses:
        "200":
          description: Grouped search results.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchGroup"
        "400":
          description: Missing or empty q parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/browse:
    get:
      operationId: browseSource
      summary: Browse a source's Popular/Latest catalog
      description: |
        Returns one page of a single source's catalog listing (Popular or Latest)
        as a flat BrowseResult. Unlike search there is no cross-source fan-out or
        grouping — Popular/Latest are per-source listings. The result carries
        hasNextPage so the client can paginate. Some sources do not support the
        Latest listing; an upstream failure surfaces as 500.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID to browse.
          schema:
            type: string
        - name: type
          in: query
          required: true
          description: Which catalog listing to fetch.
          schema:
            type: string
            enum: [popular, latest]
        - name: page
          in: query
          required: false
          description: 1-based page number; defaults to 1, must be >= 1.
          schema:
            type: integer
            default: 1
            minimum: 1
      responses:
        "200":
          description: One page of the source's catalog browse.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowseResult"
        "400":
          description: Missing/invalid type, or a non-integer / out-of-range page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown source ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/chapters:
    get:
      operationId: inspectChapters
      summary: Preview a manga's chapter list
      description: |
        Triggers a live chapter-list fetch from the source and returns a lightweight
        preview as []ChapterInspect. This contacts the upstream provider and
        populates Suwayomi's internal chapter cache — use before adopting to
        confirm the chapter count.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID.
          schema:
            type: string
        - name: mangaId
          in: path
          required: true
          description: Suwayomi-internal manga identifier (integer).
          schema:
            type: integer
      responses:
        "200":
          description: Chapter list for the manga.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChapterInspect"
        "400":
          description: Non-integer mangaId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/details:
    get:
      operationId: getMangaDetails
      summary: On-demand rich manga details
      description: |
        FORCES Suwayomi to fetch full metadata (author/artist/genre/description)
        for this manga from its upstream source, then returns the enriched
        candidate in the same shape as Search/Browse. Suwayomi's Search/Browse
        results are lightweight (title/cover/url only) — call this once per
        manga a Discover card is hovered to fill in the rich fields; never for
        every row of a search/browse page (each call is a real request to the
        source).
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID.
          schema:
            type: string
        - name: mangaId
          in: path
          required: true
          description: Suwayomi-internal manga identifier (integer).
          schema:
            type: integer
      responses:
        "200":
          description: The enriched manga candidate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchCandidate"
        "400":
          description: Non-integer mangaId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown source ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the manga details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/breakdown:
    get:
      operationId: getSourceBreakdown
      summary: Per-scanlator chapter coverage breakdown
      description: |
        Fetches the live chapter feed for this source-manga and groups it by scanlator,
        returning per-group counts and display ranges — powers the adopt UI's auto-split
        of a source into per-scanlator rows, each adoptable with its own importance.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID.
          schema:
            type: string
        - name: mangaId
          in: path
          required: true
          description: Suwayomi-internal manga identifier (integer).
          schema:
            type: integer
      responses:
        "200":
          description: The per-scanlator breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceBreakdown"
        "400":
          description: Non-integer mangaId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown source ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the chapter feed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/{sourceId}/manga/{mangaId}/cover:
    get:
      operationId: getMangaCover
      summary: Source-manga cover image
      description: |
        Streams a Discover/Search candidate's cover image, proxied from Suwayomi's
        own REST thumbnail endpoint. The image is returned as a binary blob. Returns
        502 when Suwayomi fails to fetch it. This is a same-origin, authed proxy —
        it exists because a source's raw GraphQL thumbnailUrl is Suwayomi-relative
        and 404s if rendered directly against Tsundoku's own origin.
      tags:
        - imports
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: Suwayomi source ID (accepted for route symmetry; not used to resolve the thumbnail).
          schema:
            type: string
        - name: mangaId
          in: path
          required: true
          description: Suwayomi-internal manga identifier (integer).
          schema:
            type: integer
      responses:
        "200":
          description: The cover image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: Non-integer mangaId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi failed to fetch the cover image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/health:
    get:
      operationId: getLibraryHealth
      summary: Library source-health scan
      description: Returns every series that has at least one stale or erroring source.
      tags:
        - series
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The sick series and their sick sources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryHealth"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/downloads:
    get:
      operationId: listDownloads
      summary: Cross-library chapter activity by state
      description: |
        Returns a paginated list of chapters across the whole library filtered by
        download state, each enriched with its series display title + cover and the
        resolved chapter name + provider. The `state` parameter is a REQUIRED
        comma-separated list of raw chapter states (multiple values = OR); the FE
        composes the Active / Failed / Queued views from these raw states.
      tags:
        - downloads
      security:
        - BearerAuth: []
      parameters:
        - name: state
          in: query
          required: true
          description: Comma-separated chapter states to include (OR-matched). Required.
          schema:
            type: string
          example: failed,permanently_failed
        - name: limit
          in: query
          required: false
          description: Page size (default 50, capped at 200).
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          required: false
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
        - name: q
          in: query
          required: false
          description: Free-text filter on the series title (case-insensitive contains).
          schema:
            type: string
      responses:
        "200":
          description: A page of enriched chapters plus the total matching count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadList"
        "400":
          description: Missing/empty or unknown state, or an invalid pagination value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/downloads/retry-all:
    post:
      operationId: retryAllDownloads
      summary: Bulk-reset failed chapters to wanted
      description: |
        Resets every chapter in the given retryable states back to wanted (clearing
        last_error, error_category, retries and next_attempt_at) so the next download
        cycle re-attempts them. `state` defaults to failed + permanently_failed when
        omitted; supplying a non-retryable state is rejected. Optionally scoped to one
        series. Returns the number of chapters reset. On success this also triggers an
        immediate download cycle (the same coalescing trigger as POST
        /api/downloads/run) so the reset chapters do not wait for the next timer tick.
      tags:
        - downloads
      security:
        - BearerAuth: []
      parameters:
        - name: state
          in: query
          required: false
          description: Comma-separated retryable states to reset (default failed,permanently_failed). A non-retryable state is rejected.
          schema:
            type: string
          example: permanently_failed
        - name: series_id
          in: query
          required: false
          description: Restrict the reset to a single series.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The number of chapters reset to wanted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryAllResult"
        "400":
          description: A non-retryable or unknown state, or an invalid series_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chapters/{id}/retry:
    post:
      operationId: retryChapter
      summary: Reset one failed chapter to wanted
      description: |
        Resets a single failed or permanently_failed chapter back to wanted so the
        next download cycle re-attempts it, clearing the failure bookkeeping
        (last_error, error_category, retries, next_attempt_at). This is a state reset,
        never a delete (the never-auto-delete invariant holds — a failed chapter has no
        downloaded file). Returns 409 when the chapter is not in a retryable state. On
        success this also triggers an immediate download cycle (the same coalescing
        trigger as POST /api/downloads/run) so the chapter does not wait for the next
        timer tick.
      tags:
        - downloads
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Chapter UUID.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Chapter reset to wanted.
        "400":
          description: Malformed chapter id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No chapter with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Chapter is not in a retryable state (only failed/permanently_failed may be retried).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/downloads/run:
    post:
      operationId: runDownloads
      summary: Trigger an immediate download cycle ("Download now")
      description: |
        Starts a download cycle immediately instead of waiting for the next
        `jobs.download_interval` timer tick — the manual counterpart to the
        automatic triggers already fired by Adopt, provider re-rank, and the
        retry endpoints. The underlying trigger is non-blocking and cap-1
        coalescing, so repeated calls (e.g. a double-click) collapse into at
        most one extra cycle. This does NOT bypass the per-source circuit
        breaker or backoff — a cooled-down/blocked source's chapters still wait
        out their cooldown; it only starts the cycle sooner. Returns 202
        immediately; the cycle itself runs in the background (progress is
        visible via the existing cycle.start/cycle.done/download.* SSE stream).
      tags:
        - downloads
      security:
        - BearerAuth: []
      responses:
        "202":
          description: The download cycle was accepted and is starting in the background.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDownloadsResult"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/scan:
    post:
      operationId: scanLibrary
      summary: Launch an async scan of on-disk storage for importable series
      description: |
        Launches a background walk of the storage root that upserts one
        staging row per on-disk series (never downgrading an already-imported
        row). Use this to discover series that exist on disk but are not yet
        tracked in the DB (e.g. after a Kaizoku.GO migration).

        The scan runs asynchronously and streams progress over the
        `/api/progress` SSE stream as `scan.start` (fired once, when the walk
        begins), `scan.progress` (fired after each series is staged, carrying
        `processed`/`total`/`path`), and `scan.done` (fired once, carrying the
        final `total`/`found`, or `error` if the walk itself failed) — this
        avoids blocking the request for a 1000+ series NFS walk, which could
        otherwise trip a gateway timeout (e.g. a Cloudflare Tunnel's edge
        limit). Only one scan may run at a time; see the 409 response.
      tags:
        - library
      security:
        - BearerAuth: []
      responses:
        "202":
          description: The scan was launched; watch /api/progress for scan.* events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStarted"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A scan is already in flight (single-flight guard).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStarted"

  /api/library/imports:
    get:
      operationId: listImports
      summary: List staged library-import entries
      description: |
        Returns a page of the staged entries from a prior scan, optionally
        filtered by status. An empty/absent status returns every staged
        entry. Paginated via limit/offset so a 1000+ series library loads
        incrementally.
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter to one staging status.
          schema:
            type: string
            enum: [pending, imported, skipped]
        - name: limit
          in: query
          required: false
          description: Page size (default 50, capped at 200).
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          required: false
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: The staged entries matching the filter, paginated.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoundSeries"
        "400":
          description: Unknown status value, or an invalid pagination value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/imports/match:
    get:
      operationId: matchImport
      summary: Search Suwayomi sources for a staged entry's title
      description: |
        Searches every Suwayomi source for the staged entry's title and
        returns the grouped candidates, so the owner can pick one to pass as
        `match` on the subsequent import call. `path` is a REQUIRED query
        param (a filesystem path, never a URL path segment).
      tags:
        - library
      security:
        - BearerAuth: []
      parameters:
        - name: path
          in: query
          required: true
          description: The staged entry's on-disk path (as returned by scan/list).
          schema:
            type: string
      responses:
        "200":
          description: Cross-source search results, grouped by title similarity.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchGroup"
        "400":
          description: Missing or empty path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/imports/skip:
    post:
      operationId: skipImport
      summary: Skip a staged library-import entry
      description: |
        Marks a staged entry as "skipped" — the owner's "leave this on disk,
        don't import it" action. Purely a status flip: no disk I/O, no row
        deletion. Idempotent (skipping an already-skipped entry is a no-op
        success).
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkipRequest"
      responses:
        "204":
          description: Entry marked skipped.
        "400":
          description: Missing or empty path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No staged entry with that path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/import:
    post:
      operationId: importSeries
      summary: Import a staged entry without re-downloading
      description: |
        Registers a staged entry's on-disk chapters as already downloaded (no
        re-download), optionally attaching an owner-matched Suwayomi source
        via `match`, and marks the entry imported. Idempotent: re-importing
        the same path re-runs the reconcile without creating a duplicate
        series. Returns the imported series detail (§16 round-trip).
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRequest"
      responses:
        "200":
          description: Entry imported. Returns the imported series detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "400":
          description: Missing path, or an invalid/incomplete match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No staged entry with that path, or no such Suwayomi source/manga.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The matched source is already attached to this series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/import/batch:
    post:
      operationId: importBatch
      summary: Bulk disk-only import of many staged entries
      description: |
        Disk-only imports every path in `paths` (mirrors POST
        /api/library/import with no `match`) — a single request for a
        1000+ series migration instead of N sequential calls. Partial
        success by design: a bad path (e.g. never staged by a prior scan) is
        recorded in the response's `failed` list and never aborts the rest
        of the batch. Always 200 for a well-formed request — the per-path
        failures ARE the result, not a top-level error.
      tags:
        - library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchImportRequest"
      responses:
        "200":
          description: Batch processed. See `imported`/`failed` for the per-path outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportResult"
        "400":
          description: Empty paths list, or more than 500 paths in one request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/settings:
    get:
      operationId: listSettings
      summary: List runtime-tunable settings
      description: |
        Returns the closed allowlist of runtime-tunable settings, each with its
        current resolved value (DB override if set, else the env-config default),
        the default, and type + unit metadata for the UI. Structural settings
        (storage, DB, auth, Suwayomi) are env-only and not listed here.
      tags:
        - settings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The tunable allowlist in stable order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSettings
      summary: Update runtime-tunable settings
      description: |
        Applies a batch of key/value updates to the runtime tunables, all-or-nothing:
        an unknown key (outside the allowlist) or an out-of-bounds value rejects the
        whole batch with 400 naming the offending key — no partial write lands. A
        change takes effect on the next cycle without a restart (read-at-use). Returns
        the updated settings list so the caller sees the persisted values without a
        refetch (§16).
      tags:
        - settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdateRequest"
      responses:
        "200":
          description: Settings updated. Returns the full updated settings list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
        "400":
          description: An unknown key, an out-of-bounds value, or an empty batch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/metrics:
    get:
      operationId: listSourceMetrics
      summary: List per-source search-performance metrics
      description: |
        Returns every source's rolling search-performance snapshot (slowest first),
        each with a derived "isSlow" flag computed against the current slow
        threshold. Backs the source-metrics screen and the anti-bot warm-up
        decision (which sources are cold/slow).
      tags:
        - sources
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The per-source metrics, sorted by EWMA latency descending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceMetric"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/warmup:
    post:
      operationId: warmupSources
      summary: Trigger an anti-bot session warm-up pass
      description: |
        Kicks off a full warm-up pass over every enabled source (a cheap Browse
        call that refreshes each source's cached anti-bot challenge clearance), so
        interactive search stays fast. The pass warms sources SERIALLY and — with
        slow anti-bot sources — runs for MINUTES, so it runs on a detached,
        time-bounded background goroutine: this endpoint returns 202 immediately
        with {started:true} and never blocks on the pass. Per-source progress and
        failures surface in GET /api/sources/metrics (lastWarmedAt / lastError),
        not in this response.
      tags:
        - sources
      security:
        - BearerAuth: []
      responses:
        "202":
          description: The warm-up pass was accepted and is running in the background.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceWarmStarted"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/system:
    get:
      operationId: getSystem
      summary: Read-only env-structural system information
      description: |
        Returns credential-free structural configuration values for the Settings
        → Library pane's System-info card. Structural settings (storage path,
        server port, database host:port/name) are env-only and not runtime-tunable.
        Password and username are intentionally excluded from the database field.
      tags:
        - settings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Credential-free structural configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/System"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/settings:
    get:
      operationId: getSuwayomiSettings
      summary: Read Suwayomi FlareSolverr/SOCKS settings
      description: |
        Returns the FlareSolverr (Cloudflare-bypass) + SOCKS-proxy subset of the
        active Suwayomi's server-global settings. A pure passthrough — Tsundoku
        stores none of these values. An upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The current FlareSolverr + SOCKS settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuwayomiSettings"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSuwayomiSettings
      summary: Update Suwayomi FlareSolverr/SOCKS settings
      description: |
        Applies a PARTIAL update of the FlareSolverr + SOCKS subset: only the
        provided fields are sent to Suwayomi, so no unset setting is clobbered.
        The settings are RE-READ after the write and returned so the caller sees
        the persisted values without a refetch (§16). A validation failure
        (bad SOCKS version/port, malformed URL, empty body) is a 400; an upstream
        Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuwayomiSettingsUpdate"
      responses:
        "200":
          description: Settings updated. Returns the refreshed FlareSolverr + SOCKS settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuwayomiSettings"
        "400":
          description: A validation failure (bad SOCKS version/port, malformed URL, or empty body).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions:
    get:
      operationId: listExtensions
      summary: List Suwayomi extensions
      description: |
        Returns every Suwayomi extension (installed + available). A pure
        passthrough — Tsundoku stores none of this. An upstream Suwayomi failure
        is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The full extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/refresh:
    post:
      operationId: refreshExtensions
      summary: Refresh available extensions from repos
      description: |
        Re-fetches the available-extensions list from the configured repos
        ("check for updates") and returns the refreshed list. An upstream
        Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/repos:
    get:
      operationId: getExtensionRepos
      summary: Read extension repo URLs
      description: Returns the configured extension repo URL list.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The configured repo URL list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionRepos"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: setExtensionRepos
      summary: Replace extension repo URLs
      description: |
        REPLACES the extension repo URL list (replace, not merge). An empty array
        clears all repos. Each entry must be an absolute http(s) URL. The list is
        RE-READ after the write and returned (§16). A validation failure is a 400;
        an upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtensionReposUpdate"
      responses:
        "200":
          description: Repos replaced. Returns the refreshed repo URL list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionRepos"
        "400":
          description: A validation failure (missing/null repos, blank or non-absolute URL).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}/install:
    post:
      operationId: installExtension
      summary: Install an extension
      description: |
        Installs the extension identified by pkgName, then RE-READS and returns
        the full extension list so the caller observes the post-mutation state
        (§16). A blank pkgName is a 400; an upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: Installed. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}/update:
    post:
      operationId: updateExtension
      summary: Update an extension
      description: |
        Updates the installed extension identified by pkgName, then RE-READS and
        returns the full extension list (§16). A blank pkgName is a 400; an
        upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: Updated. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/suwayomi/extensions/{pkgName}:
    delete:
      operationId: uninstallExtension
      summary: Uninstall an extension
      description: |
        Uninstalls the extension identified by pkgName, then RE-READS and returns
        the full extension list (§16) — the uninstalled entry may drop out. A
        blank pkgName is a 400; an upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: Uninstalled. Returns the refreshed extension list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Extension"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/extensions/{pkgName}/icon:
    get:
      operationId: getExtensionIcon
      summary: Extension icon image
      description: |
        Streams the extension's icon image, proxied from Suwayomi. Suwayomi's own
        iconUrl is a cross-origin URL the browser cannot load directly, so this
        endpoint looks the extension up by pkgName among Extensions() and streams
        that entry's own reported icon (Suwayomi's REST icon path, confirmed live:
        "/api/v1/extension/icon/{apkFileName}") as a binary blob. Returns 404 when
        pkgName is unknown, 502 when Suwayomi fails to fetch the icon.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: The icon image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No extension with that pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable, returned a GraphQL error, or failed to fetch the icon.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/sources/{sourceId}/enabled:
    patch:
      operationId: setSourceEnabled
      summary: Toggle a source's per-language enable/disable state
      description: |
        Writes the CLIENT-CONVENTION enable/disable flag for one source (Suwayomi
        has no server-side "disabled source" concept — the flag lives in a
        per-source metadata key). Disabling hides the source from Tsundoku's
        Discover/Search/Browse source lists but does NOT stop refreshing a series
        already adopted from it, and does NOT delete the flag on re-enable.
        Applies the write then RE-READS the authoritative state (§16 round-trip).
        A blank sourceId or a missing `enabled` field is a 400; a sourceId absent
        from the post-write re-read is a 404; any upstream Suwayomi failure
        (the write or the re-read) is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          description: The Suwayomi source id.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSourceEnabledRequest"
      responses:
        "200":
          description: The authoritative enable/disable state after the write.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceEnabled"
        "400":
          description: A blank sourceId, invalid JSON body, or a missing `enabled` field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The source was absent from the post-write re-read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/suwayomi/extensions/{pkgName}/preferences:
    get:
      operationId: getExtensionPreferences
      summary: List an extension's per-source preferences
      description: |
        Resolves the extension's sources (one per language) and returns each
        source's configurable preferences, grouped by source. A pure passthrough —
        Tsundoku stores none of this. Preferences are POSITION-indexed for writes;
        the FE must use a fresh read's positions and never cache them. A blank
        pkgName is a 400; any upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      responses:
        "200":
          description: The extension's preferences grouped by source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcePreferencesBySource"
        "400":
          description: A blank pkgName.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: setExtensionPreference
      summary: Write one source preference by position
      description: |
        Writes a single preference (identified by sourceId + position) and returns
        the FULL refreshed preference list for that source (§16 round-trip — the FE
        re-derives fresh positions from it). value's JSON type must match the
        variant at that position (boolean → CheckBox/Switch, string → List/EditText,
        array → MultiSelectList); a mismatch or an out-of-range position is a 400.
        Any upstream Suwayomi failure is a 502.
      tags:
        - suwayomi
      security:
        - BearerAuth: []
      parameters:
        - name: pkgName
          in: path
          required: true
          description: The extension package name (its identity).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSourcePreferenceRequest"
      responses:
        "200":
          description: The refreshed preference list for the written source.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourcePreference"
        "400":
          description: A validation failure (blank sourceId, missing/negative or out-of-range position, or a value whose type doesn't match the variant).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Suwayomi was unreachable or returned a GraphQL error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
