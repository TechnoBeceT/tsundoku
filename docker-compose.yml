# docker-compose.yml — self-hosted Tsundoku stack.
#
# Two services:
#   tsundoku — the all-in-one image (Go API + Nuxt SPA + the bundled engine-host:
#              a JVM extension-host that loads Mihon extensions + Chromium/KCEF for
#              WebView sources). The engine-host is baked into the image at build
#              time and started by the entrypoint on localhost:7777; the Go server
#              is a pure client of it. (Suwayomi has been fully removed.)
#   postgres — the PostgreSQL database Tsundoku stores its library metadata in
#
# Quick start:
#   1. Change TSUNDOKU_AUTH_SECRET below to a long random string (see comment).
#   2. docker compose up -d --build
#   3. Open http://<host>:9833
#
# Data persists in two bind mounts next to this file:
#   ./config -> app + engine-host data (installed extension APKs, per-source prefs,
#               bundled KCEF/Chromium) + the Go-side extension-.apk byte cache
#   ./series -> the manga library (CBZ + ComicInfo.xml, ready for Komga)
#
# First boot needs outbound internet: the engine-host installs the required Mihon
# extensions from the configured repos (reconcile-on-boot provisions them from the
# Tsundoku DB), then caches them under ./config.

services:
  tsundoku:
    build: .
    container_name: tsundoku
    ports:
      - "9833:9833"
    environment:
      # Run as this host user so files on the bind mounts stay host-accessible.
      PUID: "1000"
      PGID: "1000"

      # REQUIRED: replace with a long random string (>= 16 characters), e.g.
      # `openssl rand -hex 32`. This placeholder is intentionally too SHORT, so
      # the server FAILS TO START until you change it — there is no usable
      # insecure default (an un-edited deploy hard-stops instead of booting with
      # a publicly-known, forgeable token secret).
      TSUNDOKU_AUTH_SECRET: "CHANGE_ME"

      # Set to "true" ONLY when serving Tsundoku behind HTTPS. Over plain HTTP
      # (typical LAN/LXC access) it must be "false" or the browser drops the
      # session cookie and login won't stick.
      TSUNDOKU_AUTH_COOKIESECURE: "false"

      # Database connection — points at the postgres service below.
      TSUNDOKU_DATABASE_HOST: postgres
      TSUNDOKU_DATABASE_PORT: "5432"
      TSUNDOKU_DATABASE_USER: tsundoku
      TSUNDOKU_DATABASE_PASSWORD: tsundoku
      TSUNDOKU_DATABASE_NAME: tsundoku
      TSUNDOKU_DATABASE_SSLMODE: disable

      # --- Engine-host (the source engine) ------------------------------
      # The engine-host is bundled in the image and started by the entrypoint on
      # localhost:7777; the Go server connects to it at TSUNDOKU_ENGINE_URL
      # (default http://localhost:7777 — no need to set it here). On boot,
      # reconcile provisions the engine-host from the Tsundoku DB (installs the
      # required extensions from their repos, pushes source prefs + FlareSolverr/
      # SOCKS config), so an updated deployment brings the existing library back
      # up with no manual step. Optional knobs (defaults are sensible):
      #   TSUNDOKU_ENGINE_HTTPTIMEOUT: "3m"     # per-request deadline to the engine-host
      #   TSUNDOKU_ENGINE_SEARCHTIMEOUT: "85s"  # overall deadline for one multi-source search fan-out
      #   TSUNDOKU_ENGINE_RUNTIMEDIR: "/config/engine-cache"  # Go-side extension-.apk byte cache (image default)
    volumes:
      - ./config:/config
      - ./series:/series
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: tsundoku-postgres
    environment:
      POSTGRES_DB: tsundoku
      POSTGRES_USER: tsundoku
      POSTGRES_PASSWORD: tsundoku
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Optional: expose Postgres on the host for debugging (host 5433 -> 5432).
    # Left commented out so the database stays container-internal by default
    # (Tsundoku reaches it over the compose network). Uncomment only if you need
    # host access — and change POSTGRES_PASSWORD above before you do.
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsundoku"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
